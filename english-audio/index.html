<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg: #0d1117;
            --card-bg: #161b22;
            --border: #30363d;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --success: #3fb950;
            --warning: #d29922;
        }
        body {
            font-family: 'SF Mono', 'Monaco', 'Consolas', monospace;
            background: var(--bg);
            color: var(--text-primary);
            line-height: 1.5;
            font-size: 13px;
        }
        
        /* Header */
        header {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .logo {
            font-weight: 600;
            color: var(--text-primary);
        }
        .breadcrumb {
            color: var(--text-secondary);
            font-size: 12px;
        }
        .breadcrumb span {
            color: var(--accent);
        }
        .status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--success);
        }
        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* Main */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 16px;
        }
        .stat-label {
            color: var(--text-secondary);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }
        .stat-value {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .stat-change {
            font-size: 12px;
            margin-top: 4px;
        }
        .stat-change.up { color: var(--success); }
        .stat-change.down { color: #f85149; }
        
        /* Main Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 24px;
        }
        
        /* Chart Area */
        .chart-panel {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 20px;
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }
        .panel-title {
            font-weight: 600;
            color: var(--text-primary);
        }
        .panel-controls {
            display: flex;
            gap: 8px;
        }
        .btn {
            background: #21262d;
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover {
            background: #30363d;
        }
        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }
        .btn-primary:hover {
            background: #3f8ef7;
        }
        
        /* Fake Chart */
        .chart-container {
            height: 200px;
            display: flex;
            align-items: flex-end;
            gap: 4px;
            padding: 20px 0;
        }
        .chart-bar {
            flex: 1;
            background: linear-gradient(180deg, var(--accent) 0%, rgba(88, 166, 255, 0.1) 100%);
            border-radius: 2px 2px 0 0;
            transition: height 0.3s;
        }
        
        /* Data Table */
        .data-panel {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
        }
        .table-header {
            display: grid;
            grid-template-columns: 60px 1fr 80px;
            padding: 12px 16px;
            background: #21262d;
            border-bottom: 1px solid var(--border);
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-secondary);
            letter-spacing: 0.05em;
        }
        .table-body {
            max-height: 500px;
            overflow-y: auto;
        }
        .table-row {
            display: grid;
            grid-template-columns: 60px 1fr 80px;
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .table-row:hover {
            background: #21262d;
        }
        .table-row.active {
            background: rgba(88, 166, 255, 0.1);
            border-left: 3px solid var(--accent);
        }
        .timestamp {
            color: var(--text-secondary);
            font-family: 'SF Mono', monospace;
            font-size: 11px;
        }
        .data-content {
            color: var(--text-primary);
            padding-right: 12px;
        }
        .data-cn {
            color: var(--text-secondary);
            font-size: 11px;
            margin-top: 4px;
        }
        .status-badge {
            text-align: right;
            font-size: 11px;
        }
        .status-badge.playing {
            color: var(--success);
        }
        .status-badge.pending {
            color: var(--text-secondary);
        }
        
        /* Player Controls */
        .player-bar {
            background: var(--card-bg);
            border-top: 1px solid var(--border);
            padding: 16px 24px;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
        }
        .player-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 24px;
        }
        .player-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .player-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .player-btn:hover {
            background: #30363d;
            color: var(--text-primary);
        }
        .play-btn {
            width: 40px;
            height: 40px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .play-btn:hover {
            background: #3f8ef7;
        }
        .progress-container {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .time {
            font-family: 'SF Mono', monospace;
            font-size: 11px;
            color: var(--text-secondary);
            min-width: 40px;
        }
        .progress-bar {
            flex: 1;
            height: 4px;
            background: #30363d;
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            width: 0%;
            transition: width 0.1s linear;
        }
        .volume-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .volume-slider {
            width: 80px;
            height: 4px;
            background: #30363d;
            border-radius: 2px;
            cursor: pointer;
        }
        
        /* Back Link */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 12px;
            margin-bottom: 16px;
        }
        .back-link:hover {
            color: var(--accent);
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #484f58;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <div class="logo">📊 Analytics</div>
            <div class="breadcrumb">dashboard / <span>session-view</span></div>
        </div>
        <div class="status">
            <div class="status-dot"></div>
            Live
        </div>
    </header>

    <div class="container">
        <a href="../" class="back-link">← Back to Dashboard</a>
        
        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Session Duration</div>
                <div class="stat-value" id="statDuration">00:00</div>
                <div class="stat-change up">+0.0% from baseline</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Data Points</div>
                <div class="stat-value" id="statPoints">0</div>
                <div class="stat-change up">+0.0% efficiency</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Throughput</div>
                <div class="stat-value" id="statThroughput">0 MB/s</div>
                <div class="stat-change down">-0.0% latency</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Status</div>
                <div class="stat-value" style="color: var(--success);">Active</div>
                <div class="stat-change">System nominal</div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-grid">
            <!-- Chart Panel -->
            <div class="chart-panel">
                <div class="panel-header">
                    <div class="panel-title">Real-time Metrics</div>
                    <div class="panel-controls">
                        <button class="btn">Export</button>
                        <button class="btn">Refresh</button>
                    </div>
                </div>
                <div class="chart-container" id="chart">
                    <!-- Bars will be generated by JS -->
                </div>
            </div>

            <!-- Data Table -->
            <div class="data-panel">
                <div class="table-header">
                    <div>ID</div>
                    <div>Payload</div>
                    <div>Status</div>
                </div>
                <div class="table-body" id="dataTable">
                    <!-- Rows will be generated by JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Player Bar -->
    <div class="player-bar">
        <div class="player-content">
            <div class="player-controls">
                <button class="player-btn" onclick="rewind()">⏪</button>
                <button class="play-btn" onclick="togglePlay()" id="playBtn">▶</button>
                <button class="player-btn" onclick="forward()">⏩</button>
            </div>
            <div class="progress-container">
                <div class="time" id="currentTime">00:00</div>
                <div class="progress-bar" onclick="seek(event)">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="time" id="duration">00:00</div>
            </div>
            <div class="volume-controls">
                <span style="color: var(--text-secondary); font-size: 12px;">🔊</span>
                <input type="range" class="volume-slider" min="0" max="100" value="80" onchange="setVolume(this.value)">
            </div>
        </div>
    </div>

    <audio id="audioPlayer" preload="metadata">
        <source src="../audio.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('audioPlayer');
        const playBtn = document.getElementById('playBtn');
        const progressFill = document.getElementById('progressFill');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const dataTable = document.getElementById('dataTable');
        const chart = document.getElementById('chart');
        
        let isPlaying = false;
        let activeRowIndex = -1;

        // Sample data - replace with actual subtitles
        const subtitles = [
            { id: '001', en: 'Marilyn, you want coffee or tea?', cn: '玛丽琳，你喝咖啡还是喝茶？', time: 3 },
            { id: '002', en: 'Coffee, please.', cn: '请给我咖啡。', time: 6 },
            { id: '003', en: 'I am so excited! At this time tomorrow morning, Grandpa will be sitting in the kitchen with us.', cn: '我太激动了！明天早上的这个时候，你爷爷就会和我们一起坐在这厨房里啦。', time: 8 },
            { id: '004', en: 'When does he arrive?', cn: '他什么时候到？', time: 13 },
            { id: '005', en: 'At six o\'clock this evening.', cn: '今天晚上 6 点。', time: 15 },
            { id: '006', en: 'By plane?', cn: '是坐飞机来吗？', time: 18 },
            { id: '007', en: 'No, by train.', cn: '不，是坐火车来。', time: 20 },
            { id: '008', en: 'Are we picking him up at the station?', cn: '我们去车站接他吗？', time: 22 },
            { id: '009', en: 'Not Grandpa. He doesn\'t want anybody picking him up. He likes to be independent.', cn: '你爷爷可不需要，他不愿意让别人接他，他喜欢独来独往。', time: 25 },
            { id: '010', en: 'Huh.', cn: '哦。', time: 30 },
            { id: '011', en: 'Oh, let\'s go upstairs and prepare Grandpa\'s room.', cn: '噢，咱们上楼去给爷爷收拾一下房间吧。', time: 32 },
            { id: '012', en: 'Great! Let\'s do it!', cn: '好极了！走吧。', time: 36 },
        ];

        // Initialize
        function init() {
            renderTable();
            renderChart();
            
            audio.addEventListener('loadedmetadata', () => {
                durationEl.textContent = formatTime(audio.duration);
            });
            
            audio.addEventListener('timeupdate', updateProgress);
            audio.addEventListener('ended', () => {
                isPlaying = false;
                playBtn.textContent = '▶';
            });
        }

        function renderTable() {
            dataTable.innerHTML = subtitles.map((sub, index) => `
                <div class="table-row" id="row-${index}" onclick="seekTo(${sub.time})">
                    <div class="timestamp">${sub.id}</div>
                    <div>
                        <div class="data-content">${sub.en}</div>
                        <div class="data-cn">${sub.cn}</div>
                    </div>
                    <div class="status-badge pending" id="status-${index}">pending</div>
                </div>
            `).join('');
        }

        function renderChart() {
            for (let i = 0; i < 40; i++) {
                const bar = document.createElement('div');
                bar.className = 'chart-bar';
                bar.style.height = Math.random() * 100 + '%';
                chart.appendChild(bar);
            }
        }

        function updateProgress() {
            const currentTime = audio.currentTime;
            const duration = audio.duration;
            
            if (duration) {
                const percent = (currentTime / duration) * 100;
                progressFill.style.width = percent + '%';
                currentTimeEl.textContent = formatTime(currentTime);
                
                // Update active row
                updateActiveRow(currentTime);
                
                // Update chart animation
                updateChart(currentTime);
                
                // Update stats
                updateStats(currentTime);
            }
        }

        function updateActiveRow(time) {
            let newIndex = -1;
            for (let i = subtitles.length - 1; i >= 0; i--) {
                if (time >= subtitles[i].time) {
                    newIndex = i;
                    break;
                }
            }
            
            if (newIndex !== activeRowIndex) {
                document.querySelectorAll('.table-row').forEach(row => row.classList.remove('active'));
                document.querySelectorAll('.status-badge').forEach(badge => {
                    badge.textContent = 'pending';
                    badge.classList.remove('playing');
                });
                
                if (newIndex >= 0) {
                    const row = document.getElementById(`row-${newIndex}`);
                    if (row) {
                        row.classList.add('active');
                        row.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        const status = document.getElementById(`status-${newIndex}`);
                        status.textContent = 'active';
                        status.classList.add('playing');
                    }
                }
                activeRowIndex = newIndex;
            }
        }

        function updateChart(time) {
            const bars = document.querySelectorAll('.chart-bar');
            bars.forEach((bar, i) => {
                bar.style.height = (Math.random() * 50 + 25) + '%';
            });
        }

        function updateStats(time) {
            document.getElementById('statDuration').textContent = formatTime(time);
            document.getElementById('statPoints').textContent = activeRowIndex + 1;
            document.getElementById('statThroughput').toFixed(2) + ' MB/s';
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function togglePlay() {
            if (isPlaying) {
                audio.pause();
                playBtn.textContent = '▶';
            } else {
                audio.play();
                playBtn.textContent = '⏸';
            }
            isPlaying = !isPlaying;
        }

        function rewind() {
            audio.currentTime = Math.max(0, audio.currentTime - 10);
        }

        function forward() {
            audio.currentTime = Math.min(audio.duration, audio.currentTime + 10);
        }

        function seek(event) {
            const rect = event.target.getBoundingClientRect();
            const percent = (event.clientX - rect.left) / rect.width;
            audio.currentTime = percent * audio.duration;
        }

        function seekTo(time) {
            audio.currentTime = time;
            if (!isPlaying) {
                togglePlay();
            }
        }

        function setVolume(value) {
            audio.volume = value / 100;
        }

        init();
    </script>
</body>
</html>
