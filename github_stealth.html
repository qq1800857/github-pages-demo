ry: I promise I won't leave early.", "Susan: It was for a good reason.", "Harry: You know something?", "Susan: What?", "Harry: I think we're going to be good friends. Good night, Susan.", "Susan: Good night, Harry, Have a safe trip home.", "Susan: Are you all right?", "Harry: Sorry.", "Susan: I never liked that umbrella stand.", "Susan: Good night, Harry."]}, {"title": "Job: ubuntu-latest (matrix 7/30)", "mp3": "Episode 3 Grandpa's Trunk ACT I.mp3", "text": ["Watch the video then answer the question: Who is going to come?", "[ She takes the tea kettle off the stove. ]", "Ellen: Marilyn, you want coffee or tea?", "Marilyn: Coffee, please.", "Ellen: I am so excited! At this time tomorrow morning, Grandpa will be sitting in the kitchen with us.", "Marilyn: When does he arrive?", "Ellen: At six o'clock this evening.", "Marilyn: By plane?", "Ellen: No, by train.", "Marilyn: Are we picking him up at the station?", "Ellen: Not Grandpa. He doesn't want anybody picking him up. He likes to be independent.", "Marilyn: Huh.", "Ellen: Oh, let's go upstairs and prepare Grandpa's room.", "Marilyn: Great!  Let's do it!", "[ Ellen and Marilyn get up to leave. Richard and Robbie enter the kitchen. ]", "Richard: Good morning, Mom.", "Robbie: Morning.", "Ellen: Well, hi, fellas.", "Richard: Hello.", "Marilyn: Hi, honey.", "Richard & Robbie: Morning, Marilyn.", "Marilyn: We are going upstairs to set up Grandpa's room. There's coffee ready.", "[ Ellen and Marilyn go upstairs. Richard and Robbie begin to make breakfast. ]", "Robbie: I'm really excited about seeing Grandpa.", "Richard: Me, too. Milk, please.", "Robbie: He's so funny. He always makes me laugh. I hope Grandpa's going to like living with us.", "Richard: I think he will. It just takes time to feel comfortable in a new place.", "Robbie: Won't he miss being in Florida?", "Richard: Well, he will. But I think he'll like being here with the family.", "Robbie: Are you sure about that? It's crazy here most of the time.", "Richard: But it's fun.", "Robbie: That's for sure.", "Richard: You know, maybe I'll put together some photos of Grandpa as a \"welcome\" present.", "Robbie: That's a neat idea. What can I do? [ He thinks. ]", "Robbie: I've got it! I have a picture of Grandpa and Dad and me in my wallet. It's from the Fathers and Sons' Breakfast at my junior high school graduation. [ He takes out his wallet and shows the picture to Richard.]", "Richard: [ He looks at the picture. ] Oh, I remember this picture.", "Robbie: I'd really like to pick up Grandpa at the railroad station.", "Richard: Railroad stations or airports --Grandpa always tells us he'll get here by himself.", "Robbie: He's something!", "[ Upstairs in the Stewarts' home. Ellen and Marilyn are preparing Grandpa's Room. ]", "Marilyn: [ She points to the trunk. ] Is this all Grandpa's stuff?", "Ellen: That's it. But I'm sure he has a few bags with him on the train.", "Marilyn: What's inside?", "Ellen: I don't know. It's locked.", "Philip: [ He enters. ] Hi.", "Ellen: Oh, hi, darling.", "Marilyn: Morning, Philip.", "Philip: I want to put some of my good hangers in Grandpa's closet. You know I'm very excited about his arrival.", "Ellen: We are, too. Susan called early this morning. She's unhappy because she's had to go to Chicago on a business trip and can't leave till tonight. She wants to be here for Grandpa.", "Philip: Well, Grandpa will be disappointed, too. He loves Susan. She always reminds him of Grandma. Well, how's everything here?", "Marilyn: Fine. We were just wondering about this trunk.", "Ellen: It's locked.", "Philip: Oh. [ He takes a key from his pocket. ] I have the key. Grandpa sent it to me.", "[ He tries to put the key into the lock of the trunk. ]"]}, {"title": "Job: macos-latest (matrix 8/30)", "mp3": "Episode 3 Grandpa's Trunk ACT II.mp3", "text": ["Watch the video then answer the question: Does he want to stay?", "Elsa Tobin: Excuse me. Is this seat taken?", "Malcolm Stewart: No, it's not taken.", "Elsa Tobin: Oh, thank you.", "Malcolm Stewart: Oh, let me help you with this. [ he puts her suitcase in the overhead rack. ]", "Elsa Tobin: Oh, thank you.", "Malcolm Stewart: Do you want to sit by the window?", "Elsa Tobin: No, no, no. I like the aisle seat better. Please, you sit by the window. [ They sit down. ]", "Malcolm Stewart: My name is Stewart... Malcolm Stewart. Pleased to meet you. [ They shake hands. ]", "Elsa Tobin: I'm Elsa Tobin. How do you do?", "Malcolm Stewart: Do you live in New York?", "Elsa Tobin: No, no. I'm from Florida.", "Malcolm Stewart: I am, too. But didn't you just get on?", "Elsa Tobin: No, no. I just changed my seat. A man next to me was smoking, and smoke really bothers me.", "Elsa Tobin: Where are you from in Florida?", "Malcolm Stewart: Titusville. It's near Orlando.", "Elsa Tobin: Small world. I'm from Titusville, too.", "Malcolm Stewart: Really? What part?", "Elsa Tobin: My husband and I live near Spaceport.", "Malcolm Stewart: I know that area. My house is only a few miles from Spaceport. Do you still live there?", "Elsa Tobin: Oh yes, yes. My husband's there now.", "Elsa Tobin: He couldn't take time off to come to New York with me. Do you still live there?", "Malcolm Stewart: No. I sold the house and the furniture, put a few personal things in an old trunk, and shipped it to my children in New York. That's my destination.", "Elsa Tobin: Are you married?", "Malcolm Stewart: My wife died four years ago. She was a wonderful woman. A real friend.", "Elsa Tobin: I'm sorry. Really, I'm sorry.", "Malcolm Stewart: Lots of wonderful memories. We were married almost fifty years. Well, forty-seven, to be exact.", "Elsa Tobin: John and I celebrate our fortieth anniversary next month.", "Malcolm Stewart: Oh, congratulations! That's nice. What does John do?", "Elsa Tobin: He's an aerospace engineer and works for Orlando Aircraft Corporation. He started with them almost forty years ago. What do you do?", "Malcolm Stewart: I just retired. Had my own company. A construction company. Roads, bridges, big stuff. But I just sold it and retired.", "[ A conductor walks over to them. he asks to see Mrs. Tobin's ticket. ]", "Conductor: Excuse me, ma'am. Ticket, please.", "Elsa Tobin: [ to Grandpa] Would you kindly hold these keys, please? I have a ticket, I know. I was in the smoking section.", "Conductor: It's OK, lady. Take your time.", "Malcolm Stewart: I'm sure it's in your purse, Mrs. Tobin.", "Elsa Tobin: Oh, here it is. [ She finds the ticket in her handbag and gives it to the conductor. ]", "Malcolm Stewart: And here are your keys.", "Malcolm Stewart: Thank you.", "[ The conductor moves on. ]", "Malcolm Stewart: Do you have family in New York?", "Elsa Tobin: No, no. But I do have very close friends in New York City.", "Elsa Tobin: We like to go to the theater together. You said you have family in New York.", "Malcolm Stewart: Yes, indeed. A son and his wife and their three children -- my grandchildren.", "Elsa Tobin: You must be excited.", "Malcolm Stewart: I can't wait, to see them!", "Elsa Tobin: Are you going to live with them?", "Malcolm Stewart: Yes.", "Elsa Tobin: Permanently?", "Malcolm Stewart: Well... they want me to, but it's too early to know for sure. I'm pretty independent.", "Malcolm Stewart: I tried to teach my kids the importance of independence, but I'm not sure I want to be alone.", "Malcolm Stewart: Some people don't mind being alone. I do.", "Elsa Tobin: I understand. But tell me. Why did you stop working?", "Malcolm Stewart: I retired because... I wanted to be with my family.  I didn't want to be alone anymore!"]}, {"title": "Job: windows-latest (matrix 9/30)", "mp3": "Episode 3 Grandpa's Trunk ACT III.mp3", "text": ["Watch the video then answer the question: What's inside the trunk?", "[ On the Amtrak train later that day. The train is arriving in New York City. ]", "Announcer: Ladies and gentlemen, Amtrak is happy to announce our arrival in New York City. The train will be stopping in five minutes. Please check to be sure you have your belongings. And have a good stay in the Big Apple. Thank you.", "Elsa Tobin: Well, here we are.  It was so nice meeting you, Mr. Stewart.", "Malcolm Stewart: And nice meeting you, too, Mrs. Tobin. Please look us up. We're in the phone book. Dr. Philip Stewart, in Riverdale.", "Elsa Tobin: Your son?", "Malcolm Stewart: That's right. And have a good time in New York.", "Elsa Tobin: And don't be so independent. You're very lucky to have a caring family.", "Robbie: When can we go fishing?", "Grandpa: Robbie, we'll go fishing soon, and we'll take your dad with us.", "Philip: I'm ready, Grandpa. You name the day.", "Ellen: That's a great idea, Grandpa! Philip needs a day off.", "Robbie: [ to Richard] Let's give him our presents --now.", "Richard: Good idea.", "Grandpa: Presents --for me?", "Richard: [ He gives his present to Grandpa. ] From me and Marilyn.", "Robbie: And this one's from me. I looked all over the house to find it.", "Grandpa: [ He unwraps the presents. They contain photographs of him with the family. ] Richard, these are terrific pictures. This one really brings back memories. You remember that day, Robbie?", "Robbie: I sure do. It was fun.", "Grandpa: [ He looks at a photo of himself and susan. ] Oh, I'm sorry Susan isn't here. I miss her very much.", "Ellen: She feels bad, too, Grandpa. She called to say the plane was delayed. You know airports.", "Grandpa: I can't wait to see her. She looks just like Grandma at that age. I'd better unpack.  I started traveling twenty-four hours ago.", "Grandpa: [ He gets up. ] I'm not so young anymore.", "Ellen: Don't you want something to eat?", "Grandpa: No, thanks. After a good night's sleep, I'll enjoy breakfast even more.", "Philip: Well, come on, Dad. Ellen and I'll take you to your room.", "Robbie: I'm sure glad you're here, Grandpa.", "Richard: Good night, Grandpa.", "Marilyn: Pleasant dreams.", "[ The family leaves the living room. Ellen, Philip, and Grandpa go upstairs to Grandpa's room. ]", "Grandpa: Philip, do you have the key to the trunk?", "Philip: I have the key, but it doesn't work. [ He gives the key to Grandpa. ]", "Grandpa: [ He tries the key, but it doesn't unlock the trunk. ] I sent the wrong key. I have something for you. I made it myself. I think you'll enjoy it. I researched it for over a year. It's our family tree.", "Ellen: [ She looks at it. ] Oh, Grandpa! How exciting!", "Philip: Fabulous! Why, I didn't know that your grandfather was born in Germany.", "Grandpa: Lots of interesting information about our family. A gift from me.", "Ellen: Thank you so much. [ She hugs Grandpa. ]", "Susan: [ She rushes into the room. ] Grandpa! Grandpa! Oh, Grandpa, I'm so happy to see you!", "Grandpa: [ He looks at her. ] Oh, you look so beautiful, Susan. My granddaughter. Like I always said, you look just like Grandma.", "Philip: [ to Grandpa ] I think you're going to be very happy here with us.", "Ellen: I know you will.", "Grandpa: I don't feel alone anymore."]}, {"title": "Job: ubuntu-latest (matrix 10/30)", "mp3": "Episode 4 A Piece of Cake ACT I.mp3", "text": ["Watch the video then answer the question: Why do they make a bet?", "[ Outside the stewarts' house early Friday evening. Marilyn Stewart rides to the house on a bicycle. Inside, her husband Richard is looking at photos in his album. Marilyn enters and sits on the floor. ]", "Marilyn: I am exhausted. My new exercise class is so hard.", "Richard: Your new exercise class?", "Marilyn: Yeah. My new advanced exercise class.", "Richard: Why advanced?", "Marilyn: My instructor thought that the beginner's class was too easy for me.", "Richard: [ He laughs because she looks so tired. ] Too easy for you? [ He helps her stand up. ]", "Marilyn: Don't laugh. In the beginner's class, they give you a chance to rest between exercises.", "Richard: So?", "Marilyn: The advanced class is nonstop.", "Richard: [He teases her. ] I lift weights every morning for sixty minutes without stopping. [ He shows her his arm muscle. ] No problem.", "Marilyn: Listen, Richard, doing aerobics for an hour is a lot different than lifting weights.", "Richard: Yeah. Quite a bit different.  I think aerobics is easy.  I could work out in your class with no problem.", "Marilyn: You think so?", "Richard: Oh, without a doubt. When's the next class?", "Marilyn: Tomorrow morning at ten o'clock. Try it.", "Richard: Tomorrow morning after lifting weights, I'll try aerobics. [ He snaps his fingers. ] It's a snap. Tomorrow morning at ten o'clock.", "[ In Richard and Marilyn's room the next morning. Richard is lifting weights. Marilyn is sewing. ]", "Marilyn: Aren't you going to the aerobics class this morning?", "Richard: [ He finishes exercising and puts the weights on the floor. ] Of Course. Easy. [ He snaps his fingers. ] No sweat.", "Marilyn: You are not going to be able to move after this and the aerobics class.", "Richard: Are you kidding me? It's going to be a piece of cake.", "[ Marilyn shakes her head no. ]", "Richard: You want to bet?", "Marilyn: Yeah. What's the bet?", "Richard: I bet I can go one hour in your class this morning and not feel a thing!", "Marilyn: The bet is -- I win, and you cook dinner for the entire family.  Or you win, and I cook dinner for the entire family.", "Richard: [ He shakes her hand. ] It's a bet.", "Marilyn: Ok. Call my instructor, Jack Davis, right now. His number is 555-8842. The advanced class starts at ten o'clock.", "Richard: Well, it's eight twenty now.", "Marilyn: It only takes eight minutes by bicycle to the aerobics class. Give him a call.", "[ Richard calls jack Davis. ]", "Jack Davis: Davis Aerobics Center for Good Health.", "Richard: Jack Davis, please.", "Jack Davis: This is Jack Davis.", "Richard: Hello. This is Richard Stewart. My wife, Marilyn Stewart, is a member of your program. I'd like to come to the ten o'clock advanced class this morning.", "Jack Davis: Oh, fine, fine. Be here a few minutes early. You need to complete some forms before the class.", "Richard: Thanks. I'm on my way over.", "Jack Davis: Good-bye.", "Richard: Bye-bye. [ He hangs up. ] It's all set. I'm going. [ He puts his camera bag over his shoulder. ]", "Marilyn: Bye.", "Richard: See you later.", "[ They kiss. ]", "Marilyn: Good luck.", "Richard: Don't forget about the bet. Dinner for the entire family. And that includes Susan.", "Marilyn: Don't you forget.", "[ Richard snaps his fingers and leaves. Marilyn snaps her fingers and smiles. ]"]}, {"title": "Job: macos-latest (matrix 11/30)", "mp3": "Episode 4 A Piece of Cake ACT II.mp3", "text": ["Watch the video then answer the question: Who's going to win the bet.", "[ Outside, on a busy street in Riverdale. Inside, the Davis Aerobics Center for Good Health. Jack Davis is taking Richard's blood pressure. ]", "Jack Davis: OK, Richard. That's terrific. Your pressure is 120 over 75, and that's fine. Now stand up, please.", "Jack Davis: [ Richard stands up, and jack takes his blood pressure again. ] Good, it's 122 over 80. You can sit down now. When was your last complete physical?", "Richard Stewart: [ He thinks. ] Six months ago.", "Jack Davis: Good. Do you have any back or knee problems?", "Richard Stewart: Nope. I am in perfect health.", "Jack Davis: What do you do for a living, Mr. Stewart?", "Richard Stewart: I'm a photographer.", "Jack Davis: Interesting. What do you photograph?", "Richard Stewart: Everything. The American scene. People, places, events.", "Jack Davis: Did you ever think of photographing an aerobics class?", "Richard Stewart: No... I can't remember taking pictures of people exercising.", "Jack Davis: But don't you think it'd be a good subject?", "Richard Stewart: Sure.", "Jack Davis: I need some good photos for my advertising, Mr. Stewart.", "Jack Davis: Maybe you can photogragh a class, and I can give you and Mrs. Stewart a month of classes — free.", "Richard Stewart: When can I photograph a class?", "Jack Davis: Anytime.", "Richard Stewart: How about today?", "Jack Davis: Terrific!", "[ In the exercise classroom at the Davis Aerobics center. Jack Davis and another instructor are about to teach a class. Richard is taking many photographs. ]", "Jack Davis: [ He enters. ] Hi.", "Instructor: Oh, hi.", "Jack Davis: Are we ready to go?", "Instructor: Yeah. Yeah. [ To students ] Let's get in our lines. We're going to take it slow first.  Stretch up... and we're going to go left first ... 2,3,4 ... now switch. ... OK, hold to the right. Sunrises. Stretch it out. Flat back. Bring it up ... and twists ... and side ... 2, 3 ... and left ... push ... push ... turn ... hit the floor.", "Instructor: Take it side again .... OK, and switch. Stretch it out. And we're going to warm down with a tango. Left, right. Enjoy it.", "[ In Richard and Marilyn's room later that day. Marilyn is alone, waiting for Richard. She is folding some towels. Richard sings and dances into the room. ]", "Marilyn Stewart: Richard, did you go to the Davis Aerobics class today?", "Richard Stewart: [ He takes off his camera and film bags and dances around the room. ] Yes, I went to the aerobics class today.", "Marilyn Stewart: What is wrong with you?", "Richard Stewart: Nothing. I am in excellent health.", "Richard Stewart: [ He starts dancing with Marilyn. ] I have ideal blood pressure. A perfect heart. In other words, I'm in wonderful condition.", "Marilyn Stewart: Richard, did you go to the aerobics class, really?", "Richard Stewart: And don't forget to invite Susan for dinner.", "Marilyn Stewart: [ not paying attention ] And your legs don't hurt?", "Richard Stewart: [ He jumps up and down. ] Hurt? What do you mean?", "Marilyn Stewart: What about your arms? Lift your arms up like this.", "Marilyn Stewart: [ She lifts up her arms to show him, and he lifts his arms. ] And they don't hurt not even a little?", "Richard Stewart: Nope.", "Marilyn Stewart: You are in great condition. I can't believe it!"]}, {"title": "Job: windows-latest (matrix 12/30)", "mp3": "Episode 4 A Piece of Cake ACT III.mp3", "text": ["Watch the video then answer the question: Who's going to cook dinner tonight?", "[ In the Stewarts' kitchen a little later. Richard is drinking a soda. Marilyn is writing a grocery list. ]", "Marilyn: [ counting... ] Grandpa, Ellen, Philip, Robbie, you and me. That's six steaks.", "Richard: Don't forget Susan.", "Marilyn: Seven steaks. Cooking dinner for the entire family is not so easy.", "Marilyn: [ She points to her list. ] The shopping: the salad : tomatoes, lettuce, cucumbers, and onions. The main course : steak and potatoes.", "Marilyn: Richard, how much broccoli do I need for seven people?", "Richard: Marilyn, I have to tell you something. At today's exercise class...", "Marilyn: Yes, Richard.", "Richard: Well, I didn't really exercise.", "Marilyn: I knew it!", "Richard: I wanted to, but Jack Davis needed a photographer. [ He laughs. ] I'm sorry, Marilyn.", "Marilyn: I don't understand. Did you exercise or not?", "Richard: No. Instead of exercising, I photographed the class.", "Marilyn: And you didn't exercise?", "Richard: No.", "Marilyn: There's another advanced class today at four o'clock. We'll go together.", "Richard: What about the bet?", "Marilyn: Oh, the bet is still on, but you shop for the groceries. Remember, you win, and I cook dinner for the entire family.", "Richard: You win, and I cook dinner for the entire family.", "Marilyn: Including Susan. Four o'clock at the advanced exercise class. With me.", "[ They shake hands and laugh. ]", "[ Later, at the aerobics class. Marilyn and Richard are exercising to music. They are following the instructor's and Jack's directions. ]", "Jack: Don't forget to breathe.", "Instructor: Skip, hop, front.  Twist... again.... OK, now... scissors.", "Richard: This is fun. It's a piece of cake.", "Marilyn: Yeah. Just wait.", "Instructor: 5, 6, 7, go right, 1, 2, back, 2, 3 , 1, 2, 3, pony, pony... 1, 2, 3, kick... 1, 2, 3, kick... pony. And twist, twist.", "Ja eve me.", "Alexandra: And if you don't? ... Can I adopt the dog?", "Worker: Why, yes. If the owners don't claim the dog in forty-eight hours, then you can apply for adoption.", "Alexandra: How do I do that?", "Worker: You really want to?", "Robbie: Yes, I'm serious. If no one comes to claim Gemma, I'd like to adopt her.", "Worker: It's not difficult."]}, {"title": "Job: windows-latest (matrix 21/30)", "mp3": "Episode 7 Man's Best Friend ACT III.mp3", "text": ["Watch the video then answer the question:", "Linda: OK. If you want to adopt an animal, first we need to know some references .", "Alexandra: References? People we know? Friends, teachers....", "Linda: We need to talk to some people about you. We want to be sure that you're responsible and that you can take good care of an animal.", "Linda: Then you have to fill out this form about your family background.", "Robbie: Is that it?", "Linda: No, there's more. We need to know about your history with animals . Have you ever owned an animal?", "Robbie: Yes. We had a cat when I was eight years old. I love cats.", "Linda: Do you have any animals now?", "Robbie: Unfortunately, no.", "Linda: We also like to know your reasons for wanting an animal.", "Robbie: Just to hold it and cuddle with it. Just to have as a pet. I love animals. To have a friend -- a pal. You know, man's best friend is his dog.", "Linda: And one thing more. If you're under twenty-one years of age ... then an adult must sign for you.", "Robbie: Uh-oh. No problem. My parents will think it's a good idea. I'll be back with them.", "Waiter: Ready, folks?", "Robbie: Are you ready, Alexandra?", "Alexandra: Yes, I'm ready. I'll have the chef's salad , please.", "Robbie: I will have a cheeseburger, medium rare , with raw onion, and french fries, please.", "Waiter: Anything to drink?", "Alexandra: A diet cola , please.", "Robbie: Ginger ale with lots of ice for me, thank you.", "Robbie: Hello. Stewart residence.", "Linda: Hello. Is Robbie Stewart there? This is Linda Aborn from the animal shelter.", "Linda: We have good news and bad news , Robbie. The good news is that the Levinsons have come by to pick up the dog. The bad news is, you won't be able to adopt the dog.", "Robbie: That's OK. Thanks, Linda. Bye.", "Alexandra: The owners claimed Gemma?", "Robbie: That's right. I'm glad for the dog.", "Alexandra: I guess I am, too. Come on. Let's dance."]}, {"title": "Job: ubuntu-latest (matrix 22/30)", "mp3": "Episode 8 You're Going to Be Fine ACT I.mp3", "text": ["Watch the video then answer the question:", "Molly, I need your special talent for handling special matters. Molly, Like what special matters? Well, I have a scheduling problem.", "我需要你处理特殊情况的特殊才能。 什么样的特殊情况？ 嗯，我在安排工作方面遇到困难。", "Yes? I have three tonsillectomies set for Friday with Dr. Earl. Yes?", "是吗？ 我安排好要和Earl大夫在星期五进行三个扁桃腺切除手术。 是吗？", "I need to fit a fourth operation into his schedule. And ... I know you can do it. Who's thepatient?", "我得在他的工作日程上再加第四个手术。 这……我知道你能做到。 病人是谁？", "Carl Herrera. Carl Herrera。 The boy has infected tonsils, and we should remove them as soonas possible. Well, I'll try to arrange the schedule, Dr. Stewart.", "这孩子的扁桃腺受到感染了， 我们要尽快把它切除。 好吧，我尽力去安排，Stewart大夫。", "But it's not going to be easy. I know you'll be able to take care of it. Well, Mrs. Herrera,", "不过，这事可不容易。 我知道你能够处理好这件事。 你好，Herrera太太，", "Carl will be perfectly fine after we remove his tonsils. Thank you for your reassurance, Dr. Stewart. He's had so many colds and sore throats recently.", "切除扁桃腺之后，Carl会完全恢复健康的。 谢谢你消除了我的顾虑，Stewart大夫。 他最近常常感冒，并且喉咙痛。", "Well, it's a very easy operation, Carl. You won't feel a thing. But when do they do it?", "这是个很简单的手术，Carl。 你一点感觉也没有。 但是什么时候动手术？", "This Friday. But Saturday's my birthday. Well, we could reschedule the operation, Mrs. Herrera,", "这个星期五。 但星期六是我的生日。 这样吧，我们可以重新安排手术时间，Herrera太太。", "but I don't want to put it off too long. No, I think it's important to do it now. We can have abirthday party for you, Carl,", "但我希望不要拖得太久。 不，我觉得还是应该现在动手术。 我们可以给你举行生日派对，Carl，", "When you come out of the hospital. But it won't be on my birthday. But your health is moreimportant, Carl. Believe me.", "在你病好出院后。 但是那就不是在我生日那天了。 可是你的身体更重要，Carl。相信我的话。", "I don't want my tonsils out. Nurse Baker, would you come in, please? Hello, Mrs. Herrera. Hi, Carl, how you doing?", "我不想把扁桃腺割掉。", "I don't want my tonsils out. Come with me, Carl. You and I will talk this over.", "我不想切除扁桃腺。 跟我来，Carl。 我俩商量商量。", "She has a special way with kids. She sure does. Carl, does your throat hurt?", "她对孩子很有一套。 她的确如此。 Carl，你喉咙痛吗？", "Yes. OK. Do you want to get better? Yes.", "是的。 好，你想把病治好吗？ 是的。", "OK. We want you to get better, too. You'll have your tonsils out tomorrow, and you won't get somany colds anymore.", "我们也希望你能尽快康复。 明天，你的扁桃腺切除后， 你就不会老患感冒了。", "But if I have my tonsils out tomorrow, I'll miss my birthday party on Saturday. I know.", "但是，我如果明天切除扁桃腺， 就会错过星期六的生日派对。 我知道。", "It's a problem, isn't it? Let me try to work something out. What?", "这确实是个问题，不是吗？ 让我想个办法解决。 什么办法？", "I have to think about it. You're fooling me. Oh, I'm not, Carl.", "我得想一想。 你想骗我。 噢，我不骗你，Carl。", "Give me a chance to think about it, and I'll come up with something. A surprise?", "给我一个机会想想， 我会想出一个办法的。 一个惊喜？", "Maybe. But you just put on your pajamas and robe, and I'll think of a surprise.", "也许是。 你先把你的睡衣裤和长袍穿上， 我来想出一个绝好的主意。", "Will it hurt? No. There are other boys and girls here, and they're having their tonsils out.", "会痛吗？ 不痛。 还有其他男孩女孩在这，他们也将切除扁桃腺。", "You'll meet them. I don't want to.", "你会见到他们的。 我不想见。", "Change your clothes, Carl. Everything will be just fine.", "把衣服换了，Carl。 一切都会安好的。"]}, {"title": "Job: macos-latest (matrix 23/30)", "mp3": "Episode 8 You're Going to Be Fine ACT II.mp3", "text": ["Watch the video then answer the question:", "OK. 好。", "Do you know how to play charades? 你们会打哑谜吗？", "Frank, you've never played charades? Frank，你从来没玩过哑谜。", "Nope. 没有。", "Carl, you're sure you've never played? Carl 你肯定你从没玩过吗？", "OK, Betty, Tim, and Frank. 好，Betty，Tim，Frank。", "We're going to play charades. 我们来玩哑谜。", "Frank, you can learn as we go. Frank 我们玩，你跟着学。", "And, Carl, you join in at any time. 还有Carl，你随时都可以加入。", "OK, let me think. 好，让我想想。", "OK, I've got one. 好，我有了。", "All right. 行了。", "A movie! 电影！", "A movie! 电影！", "Right. 对。", "A movie. 电影。", "OK. 好。", "Six words. 六个字。", "It has six words. 有六个字。", "That's easy. 这很容易。", "I can play. 我也能玩。", "Good. OK. 好的。", "We've got a movie. 我们知道是一部电影。", "The title ... 名字是……", "Six words. 有六个字。", "Right. 对。", "First word ... 第一个字……", "Sounds like.（听来）像……", "You got that part right. 你们这一部份猜对了。", "Yes. 是的。", "Sounds like ...（听来）像……", "Sounds like what? （听来）像什么？", "Sounds like no. （听来）像 no 。", "Absolutely right, Frank. 完全正确 Frank。", "Sounds like no. （听来）像 no 。", "OK. 好。", "We've got a movie. 我们知道是一部电影。", "Six words. 六个字。", "The first word sounds like no. 第一个字音像no。", "Row. Row. Row。 Row。", "Go. Go。", "Nope. 不对。", "Show. Show。", "That's it--show. 就是它，show。", "No ... OK ... 不是……好……", "Snow. 雪。", "Absolutely right, Betty. 完全正确 Betty。", "Sounds like no -- snow. 音像no，Snow。", "OK, a movie. Six words. 好，一部电影。六个字。", "The first word is snow. 第一个字是Snow 。", "This is fun. 很有意思。", "Oh, OK. 噢，好了。", "The fifth word. 第五个字。", "Right, fifth word. 对，第五个字。", "Seven? Seven?", "Absolutely right. 完全正确。", "Very good. 很好。", "The fifth word is seven. 第五个字是seven。", "OK, we've got a movie. 好，我们知道是一部电影。", "The first word is snow. 第一个字是“snow”。", "Fifth word, seven. 第五个字是“seven”。", "I got it! 我知道了。", "I got it! 我知道了。", "Snow White and the Seven Dwarfs. Snow White and the Seven Dwarfs〔白雪公主和七矮人〕", "I got it. 我猜对了。", "I got it. 我猜对了。", "Frank, you got it. Frank，你猜对了。", "Betty, you had it, but you didn't say it. Betty，你知道答案，但是你没有说出来。", "I knew it. 我现在知道了 。", "Carl, now you know charades. Carl，现在你知道什么是哑谜了。", "Why don't you join us? 你何不参加入我们的游戏呢？", "I don't like charades. 我不喜欢哑谜。", "It's for babies. 这是给婴儿玩的。", "Oh, I like it. 噢，我喜欢哑谜。", "Well, they're babies. 嗯，他们都是婴儿。", "You're a sore loser. 你是个输不起的家伙。", "Yeah. 对。", "No arguing. 别争了。", "Save your voices. 留着点嗓子。", "Between now and tomorrow 从现在起到明天", "you're all going to have your tonsils out. 你们都要切除扁桃腺。", "And you won't be able to speak for a while. 有一段时间，你们没有办法讲话。", "So save your voices till then. 所以，省着点嗓子。", "Hi, gang. Hi, everybody. 嗨，各位。", "Well, what's going on? 噢，怎么啦？", "I sure I am glad to see you, Dr. Stewart. 真高兴见到你来，Stewart大夫。", "This is a rough group. 这是一群粗野的孩子。", "I didn't want to play charades, 我不想玩哑谜。", "so they're angry at me. 所以他们生我的气。?", "Why don't you want to play? 你为什么不玩？", "Because I don't want to be here. 因为我不想呆在这儿。", "I don't want my tonsils out. 我不想切除扁桃腺。", "Why not? 为什么不想？", "Because my birthday is tomorrow. 因为明天是我的生日。", "My mother promised me a birthday party with a clown. 我妈妈答应给我安排一个有小丑的生日派对。", "But you can have one when you go home, Carl. 但你回去以后还可以办一个呀，Carl。", "But my birthday is tomorrow. 但是我的生日就在明天。", "I'm sorry, Carl. 很抱歉，Carl。", "Carl, you'll have your party when you go home, Carl，你回去以后就可以开个生日派对了。", "But it won't be on my birthday! 但那就不是在我生日那天了！", "And you promised me a surprise. 而且你答应给我一个惊喜。"]}, {"title": "Job: windows-latest (matrix 24/30)", "mp3": "Episode 8 You're Going to Be Fine ACT III.mp3", "text": ["Watch the video then answer the question:", "It hurts, doesn't it? 有点痛，是不是？", "You'll feel better tomorrow, Betty, believe me. 明天你就会好些，Betty，相信我。", "Only one day, and it won't hurt as much. 只要一天，就不会像现在这样痛了。", "Do you feel like eating? 想吃东西吗？", "Having some dinner? 吃点晚餐？", "Oh, don't look so sad. 噢，别显得那么无精打采。", "Let me tell you about your dinner. 我告诉你晚餐是什么。", "It's ice cream. 是冰淇淋喔。", "Ice cream. 冰淇淋。", "All kinds of flavors. 各种口味的都有。", "Chocolate. 巧克力的。", "Strawberry? 草莓的？", "Vanilla? 香草的？", "Vanilla, too? 香草的，也有吗？", "I see you're feeling better already, Betty. 我看得出来你已经感觉好些了，Betty。", "So you will have dinner? 那么要吃晚饭吗？", "OK, honey, we'll see to it 好，亲爱的，我们设法", "that you have strawberry and vanilla ice cream. 让你吃到草莓和香草的冰淇淋。", "Just rest now. 现在好好休息。", "You need some rest to help you get better quickly. 需要多休息才会好得快。", "Hi, Frank. 嗨，Frank。", "How you doing? 你怎么样了？", "Oh, come on now. 噢，别这样了。", "You're a big boy. 你是个大孩子了", "It doesn't hurt that much, does it? 它没有那么痛，是吗？", "Oh, I'm sorry it hurts so much, 啊，我很抱歉让你这么难受。", "and you won't be able to have dinner. 你没有办法吃晚饭了。", "You're just going to have to have ice cream. 你只得吃冰淇淋了。", "Yes, ice cream. 对，冰淇淋。", "Lots of flavors. 有很多种口味的。", "Want to hear them? 你想听听吗？", "Chocolate? 巧克力？", "Then chocolate it is. 那就吃巧克力的。", "One scoop or two? 一勺还是两勺？", "Three scoops? 三勺？", "Then three it will be. 好，就三勺。", "You want three scoops also? 你也要三勺？", "Chocolate, too? 也是巧克力的吗？", "Well, I see you're feeling better. 嗯，我看得出你现在好些了。", "Well, at least you're acting like you feel better. 不过，至少你表情证明你感觉好多了。", "Three scoops of chocolate ice cream for Tim coming up. 给Tim的三勺巧克力冰淇淋马上送来。", "Hi, Carl. 嗨，Carl。", "How you doing? 你怎么样？", "I know it hurts. 我知道它痛。", "But it'll be better tomorrow. 但是明天就会好些了。", "In the meantime, what would you like? 对了，你想要点什么？", "Surprise. 惊喜。", "A surprise? 惊喜？", "I promised you a surprise, didn't I? 我答应过要给你一个惊喜，不是吗？", "And it wasn't just ice cream, was it? 这惊喜还不仅是冰淇淋，对吗?", "Your birthday is tomorrow, isn't it? 你生日是明天，对吧？", "Well, maybe, just maybe, 嗯，或许，只是或许，", "there will be a surprise. 会有一项让你惊喜的事。", "But first you have to smile. 但首先你得笑一笑。", "I just want to see one smile from you. 我就想看你笑一笑。", "No smile, no surprise. 不笑，就不给你惊喜。", "That's the deal. 这是交换条件。", "No smile, no surprise. 不笑，就没有惊喜。", "If you want a surprise, 如果你想要一个惊喜，", "then you've got to smile first. 你就得先笑一笑。", "How you all doing ? 你们大家怎么样？", "Well, I'm glad you're feeling better 我很高兴各位感觉好些", "because we have a little surprise for you today. 因为今天我们要给各位一个惊喜。", "It's Carl's birthday, 今天是Carl的生日。", "and we have Popo the Clown to entertain you. 我们请了小丑Popo来给大家表演助兴。", "And here he is--Popo the Clown. 这位就是小丑Popo。", "Happy birthday, Carl. 生日快乐，Carl。", "Happy birthday. 生日快乐。", "All right, everybody. 各位，你们好。", "OK, Carl. 好的，Carl。", "It's your birthday. 今天是你的生日。", "What 's your wish? 你有什么愿望？", "What would you like? 你想要什么？", "Hmm? 嗯？", "You want to play charades? 你想玩哑谜？"]}, {"title": "Job: ubuntu-latest (matrix 25/30)", "mp3": "Episode 9 It's Up to You ACT I.mp3", "text": ["Watch the video then answer the question:", "Who is it? 是谁?", "Dad. 爸爸。", "Come on in, Dad. 请进来,爸爸。", "I thought you might be hungry. 我想你大概饿了。", "I brought you a chicken sandwich and a glass of milk. 我替你带来一份鸡肉三明治和一杯牛奶。", "I am hungry. 我真是饿了。", "Thanks, Dad. 谢谢，爸爸。", "What time is it, anyway? 几点了，顺便问一下？", "Ten o'clock. 十点钟。", "What are you working on? 你在干什么？", "I'm writing a story for the high-school paper. 我正在为高中校刊写篇东西。", "Can't you finish it tomorrow? 你明天完成它不行吗？", "No, I have to turn it in in the morning. 不行，明天上午我要交上去。", "What's it about? 是关于什么的？", "I'm writing an article on the feelings about graduation. 我在写一篇关于毕业感觉的文章。", "And ... how do you feel? 那……你的感觉是什么？", "Me? 我吗？", "A little scared. 有点害怕。", "And excited, too. 也很兴奋。", "I felt the same way. 我当时也有这种感觉。", "The scary part's leaving home and moving to college. 害怕的是要离开家到学校去。", "Oh, leaving home is part of growing up. 呵，离开家是成熟过程的一部分。", "Well, don't work all night. 好啦，别通宵工作。", "I don't mind. 我不在乎。", "I enjoy writing. 我喜欢写作。", "Well, 那么，", "maybe you should think about becoming a writer. 也许你应该考虑成为一名作家。", "Maybe I should. 也许我该这样。", "You have lots of time to decide. 你有很多时间做决定。", "That's the worst part--making decisions. 最伤脑筋的是做决定。", "You'll be OK. 你不会有问题的。", "Good night, Son. 晚安，孩子。", "Good night, Dad. 晚安，爸爸。", "\"Hail to the victors valiant, “向勇敢的胜利者致敬。", "Hail to the conquering heroes, 向进取的英雄们致敬，", "Hail, Hail to Michigan, 致敬，向Michigan致敬,", "The champions of the West!\" 西部的优胜者 ！”", "Ah, good morning, Robbie. 啊，早安，Robbie。", "Good morning, Dad. 早安，爸爸。", "How's my grandson? 我的孙子怎样啦？", "Fine, Grandpa. Fine! 很好，爷爷。很好！", "What's all the cheering about? 这么高兴是为什么？", "Did the University of Michigan win another football game? 是不是Michigan大学赢得了一场足球赛", "Better than that. 比那种事更值得高兴。", "Tell him, Philip. 告诉他，Philip。", "I just spoke with Charley Rafer. 我刚和Charley Rafer通了电话。", "Who's Charley Rafer? 谁是Charley Rafer？", "He's the Dean of Admissions for the University of Michigan. 他是Michigan大学招生办主任。", "And it turns out he's a classmate of Philip's. 有意思的是，他和Philip是同班同学。", "We were both on the tennis team. 我们都是网球队的成员。", "Great! 真棒！", "It is great. 的确是太好了。", "He's going to be in New York tomorrow 明天他要在纽约", "to interview applicants for admission. 与申请入学者面谈。", "And he's agreed to fit you into his schedule. 他同意明天把你安排进他的名单 。", "But I may not want to go to Michigan. 但是我可能不去Michigan。", "It's one of the best schools in the country, Robbie. 这是全国最好的大学之一，Robbie。", "I studied medicine there. 我在那儿学医学。", "Your grandfather went to the Engineering School there. 你爷爷进那儿的工学院。", "I know that, but ... 这我知道，但是……", "You said you wanted to be a doctor like your father. 你说过你希望像爸爸一样成为一名医生。", "Not exactly. 还不一定。", "You couldn't pick a finer medical school than Michigan. 你再也找不到一所比Michigan大学更好的医学院了。", "Yes, I know that. 是的，我知道。", "Let's meet with Charley at the university club. 我们就去大学俱乐部见Charley吧。", "Ten o'clock tomorrow morning. 明早十点钟。", "It doesn't mean you're going to Michigan. 这并不是说你就要上Michigan大学。", "It doesn't mean you have to be a doctor. 也并不意味着你一定要当医生。", "But the interview will be good experience for you. 但这次面谈对你来讲是一次很好的经验。", "In that case, it's OK. 这么说，我就去。", "Dad, growing up means 爸爸，长大了意味", "making my own decisions, doesn't it? 我自己能做决定，对吧？", "You're right, Robbie. 你说得对，Robbie。", "But, like your Grandpa suggested, 但是，照你爷爷所建议的", "have the interview. 去参加这次面谈。", "And then make your own decision. 然后你自己做决定。", "That sounds fine. 这样听起来蛮好的。", "I know it's sudden, Robbie, 我知道这件事很突然，Robbie。", "but this is an important opportunity. 但这是一次很重要的机会。", "We'll head down there first thing tomorrow morning. 明早第一件事就是这。", "OK? 好吗？", "Sure, Dad. 一定，爸爸。", "I want you to know something, Son. 我希望你知道一件事，孩子。", "I'm ... very proud of you. 我很……以你为荣。", "Thanks, Dad. 谢谢你，爸爸。", "Well, I've got an appointment at the hospital. 好啦，我在医院有个会。", "I'll see you all at dinnertime. 吃晚饭时见面了。", "Bye, Dad. 再见，爸爸。", "Is something still wrong, Robbie? 还有什么不对的，Robbie？", "I'll be OK. 没什么。", "Going away to college for the first time 第一次离家上大学", "always makes one a little nervous. 总是让人有些紧张。", "I guess so. 我猜是这样。", "I'll be OK. I just need time to think. 我会适应的。我只是需要时间思考。"]}, {"title": "Job: macos-latest (matrix 26/30)", "mp3": "Episode 9 It's Up to You ACT II.mp3", "text": ["Watch the video then answer the question:", "Sorry, Robbie. Sorry to be late this morning, 对不起，Robbie。今天早上迟了点，", "but, well, we've still got some time for a cup of coffee. 不过，我们还有喝杯咖啡的时间。", "I can't wait to see my old pal Charley Rafer. 我真想早点见到老友Charley Rafer。", "Neither can I. 我也一样。", "So you thought about it, huh? 你考虑过了吗？", "Yes, I have, Dad. 是的，我考虑了，爸爸。", "Well, I'm glad. 那好，我很高兴。", "I knew you'd realize 我知道你会认识到", "that this interview could be an important experience for you. 这次面谈是一次很难得的经验。", "I came to that conclusion. 我的结论也是这样。", "That's very wise, Robbie. 这是很明智的，Robbie。", "Very wise. 非常明智。", "Now let's head off for the city and the university club. 现在我们进城去，到大学俱乐部。", "Thanks, Dad. 谢谢，爸爸。", "Thanks ... for what? 谢什么？", "Thanks for hearing me out. And ... 谢谢你听我的意见。而且……", "And ...? 而且……？", "And thanks for being such an understanding father. 而且谢谢你是这样一位善于了解我的父亲。", "Well, thank you, Robbie. Thank you. 嗯，谢谢你，Robbie。 谢谢你。", "Philip Stewart! Philip Stewart ！", "It's great to see you! 真高兴见到你！", "Charley Rafer--you look as young as ever. Charley Rafer ---你看起来就跟以前一样年轻。", "You must be Robbie. 你就是Robbie吧。", "Hi. 你好。", "Yes, this is my youngest son Robbie. 是的，这是我的小儿子Robbie。", "Robbie, I want you to meet Robbie，我要你见见", "one of the best tennis players on the Michigan team-- 当年Michigan球队最好的网球选手之一--", "Charley Rafer. Charley Rafer。", "Nice to meet you, Dean Rafer. 很高兴见到你，Rafer主任。", "Well, are you as good a tennis player as your dad? 嗯，你是否像爸爸那样是一名优秀的网球选手呢？", "No, I'm not very good at it. 不，我网球不行。", "Frankly, neither was I. 坦白的说，我当年也不行。", "Charley was the star of the team. Charley是当时队里的明星。", "Yeah. Thanks. 凑数的，谢谢你。", "Well, how're you been, Philip? 嗯，这些年来怎么样，Philip？", "Oh, working too hard. 噢，工作太累人了。", "Doesn't show. 倒是看不出来。", "How's Ellen? Ellen怎么样？", "Fine, thank you. 很好，谢谢。", "And how's Marge? Marge怎么样？", "She's still giving the toughest English history exams 她仍用最难的英语史试题考学生", "in the school and loving every minute of it. 在学校乐此不倦。", "And speaking of minutes, 谈到时间，", "I have interviews until noon, 我从现在到中午有一系列的面谈，", "so why don't we get right to work? 我们现在就开始工作，好吗？", "Can you have lunch with us later? 晚些时候，你能与我们一起共进午餐吗？", "I'd love to, Philip, but I'm afraid I can't. 我很想，Philip，但是我恐怕不行。", "I'm only here two days, 我只有两天时间，", "and I have interviews with twenty-six applicants. 而要面谈的申请人有二十六位。", "I understand. 我能了解。", "Well, thanks. 噢，谢了。", "I'll wait outside. 我到外面等。", "Good luck, Son. 祝你好运，孩子。", "Did you bring your transcript from high school? 你把高中的成绩单带来了吗？", "Yes, sir. 带来了，先生。", "Right here. 在这儿。", "Thank you. 谢谢。", "Please sit down. 请坐下。", "I see under \"activities\" that 我注意到在“活动”项目中提到", "you've been writing for the school paper. 你为校刊写文章。", "Yes, sir. 是的，先生。", "What kinds of articles have you written? 你写过一些什么样的文章？", "All kinds--sports, editorials, theater reviews. 各种各样的---体育，社论，剧评。", "You name it, I've written it. 你说得出的，我都写过。", "Hmmm. 嗯。", "Well, have you ever thought of becoming a journalist? 那好，你是否想过成为一名新闻记者？", "A professional writer? 职业写作人员？", "Not until recently. 最近才考虑到。", "Michigan has a fine School of Journalism. Michigan大学有一个很好的新闻学院。", "Yes, I know that. 是的，我知道。", "You seem to have some reservations. 看起来你还有些犹豫。", "I'm a little uncertain. 我有点犹豫不决。", "It's been very nice talking to you. 很高兴与你交谈。", "Nice talking to you, sir. 我也很高兴与您交谈，先生。", "One piece of advice. 给你一句忠告。", "The most important thing is for you to decide your own future. 最重要的是你要自己决定自己的未来。", "Yes, sir. 是的，先生。", "Good-bye, Dean Rafer. 再见，Rafer主任。", "Good-bye, Robbie. Good luck. 再见，Robbie，祝你好运。"]}, {"title": "Job: windows-latest (matrix 27/30)", "mp3": "Episode 9 It's Up to You ACT III.mp3", "text": [ const select = document.getElementById('episode-select');
const audio = document.getElementById('audio-player');
const container = document.getElementById('log-container');

episodes.forEach((ep, index) => {
    let option = document.createElement('option');
    option.value = index;
    option.innerText = ep.title;
    select.appendChild(option);
});

let currentCues = [];
let currentLineIndex = -1;

function parseTime(timeStr) {
    let parts = timeStr.trim().split(':');
    let secs = 0;
    if (parts.length === 3) {
        secs += parseInt(parts[0], 10) * 3600;
        secs += parseInt(parts[1], 10) * 60;
        secs += parseFloat(parts[2]);
    } else if (parts.length === 2) {
        secs += parseInt(parts[0], 10) * 60;
        secs += parseFloat(parts[1]);
    }
    return secs;
}

function parseVTT(vttText) {
    const lines = vttText.split(/\r?\n/);
    const cues = [];
    let i = 0;
    while (i < lines.length) {
        if (lines[i].includes('-->')) {
            let times = lines[i].split('-->');
            let start = parseTime(times[0]);
            let end = parseTime(times[1]);
            i++;
            let text = "";
            while (i < lines.length && lines[i].trim() !== "" && !lines[i].includes('-->')) {
                text += lines[i] + " ";
                i++;
            }
            cues.push({ start, end, text: text.trim() });
        } else {
            i++;
        }
    }
    return cues;
}

function renderTime(secs) {
    // Make timestamp look like a UTC ISO string typically found in Actions logs
    let d = new Date(secs * 1000);
    return "2026-03-12T" + d.toISOString().substr(11, 12) + "Z";
}

function alignTextToVTT(originalLines, vttCues) {
    let vttFull = vttCues.map(c => c.text).join(' ');
    let vttSim = vttFull.toLowerCase().replace(/[^a-z0-9]/g, '');
    
    let simToCue = [];
    let curSimIndex = 0;
    for (let i = 0; i < vttCues.length; i++) {
        let simQ = vttCues[i].text.toLowerCase().replace(/[^a-z0-9]/g, '');
        for (let j = 0; j < simQ.length; j++) {
            simToCue[curSimIndex++] = i;
        }
    }
    
    let aligned = [];
    let searchStart = 0;
    for (let i = 0; i < originalLines.length; i++) {
        let line = originalLines[i];
        let content = line.includes(':') ? line.substring(line.indexOf(':')+1) : line;
        let simLine = content.toLowerCase().replace(/[^a-z0-9]/g, '');
        
        if (simLine.length < 5) {
            let t = searchStart < simToCue.length ? vttCues[simToCue[searchStart]].start : 0;
            aligned.push({start: t, end: t + 1, text: line});
            continue;
        }
        
        let prefix = simLine.substring(0, Math.min(20, simLine.length));
        let matchIdx = vttSim.indexOf(prefix, Math.max(0, searchStart - 200)); 
        
        if (matchIdx === -1 && prefix.length > 10) {
           prefix = simLine.substring(0, 10);
           matchIdx = vttSim.indexOf(prefix, Math.max(0, searchStart - 200));
        }
        
        if (matchIdx !== -1) {
            let cueIdx = simToCue[matchIdx];
            let start = vttCues[cueIdx].start;
            
            searchStart = matchIdx + simLine.length;
            let endCueIdx = searchStart < simToCue.length ? simToCue[searchStart] : vttCues.length - 1;
            let end = vttCues[endCueIdx] ? vttCues[endCueIdx].end : start + 2;
            
            aligned.push({ start, end: Math.max(start + 0.5, end), text: line });
        } else {
            let t = searchStart < simToCue.length ? vttCues[simToCue[searchStart]].start : 0;
            aligned.push({ start: t, end: t + 1, text: line });
        }
    }
    
    for (let i = 1; i < aligned.length; i++) {
        if (aligned[i].start < aligned[i-1].start) {
            aligned[i].start = aligned[i-1].end;
            aligned[i].end = Math.max(aligned[i].start + 1, aligned[i].end);
        }
    }
    
    return aligned;
}

function renderLinesText(isVTT) {
    container.innerHTML = '';
    currentCues.forEach((cue, i) => {
        let div = document.createElement('div');
        div.className = 'log-line';
        div.id = 'line-' + i;
        
        let tsStr = isVTT ? renderTime(cue.start) : '2026-03-12T14:00:00.000Z';
        let ts = `<span class="timestamp">${tsStr}</span>`;
        
        let line = cue.text;
        if (line.includes(':')) {
            let parts = line.split(':');
            line = `<span class="speaker-name">[${parts[0].trim()}]</span> ${parts.slice(1).join(':')}`;
        } else {
            line = `<span>${line}</span>`;
        }
        
        div.innerHTML = ts + line;
        div.ondblclick = () => {
            if(isVTT) {
                audio.currentTime = cue.start;
                if(audio.paused) audio.play();
            }
            toggleHighlight(i);
        };
        container.appendChild(div);
    });
    toggleHighlight(0);
}

function loadEpisode(index) {
    const ep = episodes[index];
    audio.src = ep.mp3;
    audio.load();
    
    currentLineIndex = -1;
    
    currentCues = ep.text.map(t => ({ start: 0, end: 0, text: t }));
    renderLinesText(false);
    
    const vttFile = ep.mp3.replace('.mp3', '.vtt');
    fetch(vttFile)
        .then(res => {
            if(!res.ok) throw new Error("VTT file not found");
            return res.text();
        })
        .then(text => {
            if(!text.includes("WEBVTT")) throw new Error("Invalid VTT");
            let vttCues = parseVTT(text);
            currentCues = alignTextToVTT(ep.text, vttCues);
            renderLinesText(true);
        })
        .catch(err => {
            console.log("Could not load VTT file", err);
        });
}

audio.addEventListener('timeupdate', () => {
    if(!currentCues.length || currentCues[0].end === 0) return;
    
    const time = audio.currentTime;
    let activeIndex = -1;
    for(let i=0; i<currentCues.length; i++) {
        if(time >= currentCues[i].start && time <= currentCues[i].end + 0.5) {
            activeIndex = i;
            break;
        }
    }
    
    if(activeIndex !== -1 && activeIndex !== currentLineIndex) {
        toggleHighlight(activeIndex);
    }
});

function toggleHighlight(index) {
    document.querySelectorAll('.log-line.active').forEach(e => e.classList.remove('active'));
    currentLineIndex = index;
    let target = document.getElementById('line-' + index);
    if(target) {
        target.classList.add('active');
        // Prevent window scroll, only scroll the actions log container
        let containerRect = container.getBoundingClientRect();
        let targetRect = target.getBoundingClientRect();
        
        // Custom simple center scroll calculation
        if (targetRect.top < containerRect.top || targetRect.bottom > containerRect.bottom) {
            container.scrollTop = target.offsetTop - container.offsetHeight / 2;
        }
    }
}

document.addEventListener('keydown', (e) => {
    if(e.target.tagName === 'SELECT') return;

    if (e.code === 'Space') {
        e.preventDefault();
        if (audio.paused) audio.play();
        else audio.pause();
    } else if (e.code === 'ArrowRight') {
        audio.currentTime += 5;
    } else if (e.code === 'ArrowLeft') {
        audio.currentTime -= 5;
    } else if (e.code === 'ArrowDown') {
        e.preventDefault();
        if(currentLineIndex < episodes[select.value].text.length - 1) {
            toggleHighlight(currentLineIndex + 1);
        }
    } else if (e.code === 'ArrowUp') {
        e.preventDefault();
        if(currentLineIndex > 0) {
            toggleHighlight(currentLineIndex - 1);
        }
    }
});

loadEpisode(0);
</script>
</body>
</html>
