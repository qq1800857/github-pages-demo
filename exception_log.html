 it's fun.", "Robbie: That's for sure.", "Richard: You know, maybe I'll put together some photos of Grandpa as a \"welcome\" present.", "Robbie: That's a neat idea. What can I do? [ He thinks. ]", "Robbie: I've got it! I have a picture of Grandpa and Dad and me in my wallet. It's from the Fathers and Sons' Breakfast at my junior high school graduation. [ He takes out his wallet and shows the picture to Richard.]", "Richard: [ He looks at the picture. ] Oh, I remember this picture.", "Robbie: I'd really like to pick up Grandpa at the railroad station.", "Richard: Railroad stations or airports --Grandpa always tells us he'll get here by himself.", "Robbie: He's something!", "[ Upstairs in the Stewarts' home. Ellen and Marilyn are preparing Grandpa's Room. ]", "Marilyn: [ She points to the trunk. ] Is this all Grandpa's stuff?", "Ellen: That's it. But I'm sure he has a few bags with him on the train.", "Marilyn: What's inside?", "Ellen: I don't know. It's locked.", "Philip: [ He enters. ] Hi.", "Ellen: Oh, hi, darling.", "Marilyn: Morning, Philip.", "Philip: I want to put some of my good hangers in Grandpa's closet. You know I'm very excited about his arrival.", "Ellen: We are, too. Susan called early this morning. She's unhappy because she's had to go to Chicago on a business trip and can't leave till tonight. She wants to be here for Grandpa.", "Philip: Well, Grandpa will be disappointed, too. He loves Susan. She always reminds him of Grandma. Well, how's everything here?", "Marilyn: Fine. We were just wondering about this trunk.", "Ellen: It's locked.", "Philip: Oh. [ He takes a key from his pocket. ] I have the key. Grandpa sent it to me.", "[ He tries to put the key into the lock of the trunk. ]"]}, {"title": "Episode 3 Grandpa's Trunk ACT II", "mp3": "Episode 3 Grandpa's Trunk ACT II.mp3", "text": ["Watch the video then answer the question: Does he want to stay?", "Elsa Tobin: Excuse me. Is this seat taken?", "Malcolm Stewart: No, it's not taken.", "Elsa Tobin: Oh, thank you.", "Malcolm Stewart: Oh, let me help you with this. [ he puts her suitcase in the overhead rack. ]", "Elsa Tobin: Oh, thank you.", "Malcolm Stewart: Do you want to sit by the window?", "Elsa Tobin: No, no, no. I like the aisle seat better. Please, you sit by the window. [ They sit down. ]", "Malcolm Stewart: My name is Stewart... Malcolm Stewart. Pleased to meet you. [ They shake hands. ]", "Elsa Tobin: I'm Elsa Tobin. How do you do?", "Malcolm Stewart: Do you live in New York?", "Elsa Tobin: No, no. I'm from Florida.", "Malcolm Stewart: I am, too. But didn't you just get on?", "Elsa Tobin: No, no. I just changed my seat. A man next to me was smoking, and smoke really bothers me.", "Elsa Tobin: Where are you from in Florida?", "Malcolm Stewart: Titusville. It's near Orlando.", "Elsa Tobin: Small world. I'm from Titusville, too.", "Malcolm Stewart: Really? What part?", "Elsa Tobin: My husband and I live near Spaceport.", "Malcolm Stewart: I know that area. My house is only a few miles from Spaceport. Do you still live there?", "Elsa Tobin: Oh yes, yes. My husband's there now.", "Elsa Tobin: He couldn't take time off to come to New York with me. Do you still live there?", "Malcolm Stewart: No. I sold the house and the furniture, put a few personal things in an old trunk, and shipped it to my children in New York. That's my destination.", "Elsa Tobin: Are you married?", "Malcolm Stewart: My wife died four years ago. She was a wonderful woman. A real friend.", "Elsa Tobin: I'm sorry. Really, I'm sorry.", "Malcolm Stewart: Lots of wonderful memories. We were married almost fifty years. Well, forty-seven, to be exact.", "Elsa Tobin: John and I celebrate our fortieth anniversary next month.", "Malcolm Stewart: Oh, congratulations! That's nice. What does John do?", "Elsa Tobin: He's an aerospace engineer and works for Orlando Aircraft Corporation. He started with them almost forty years ago. What do you do?", "Malcolm Stewart: I just retired. Had my own company. A construction company. Roads, bridges, big stuff. But I just sold it and retired.", "[ A conductor walks over to them. he asks to see Mrs. Tobin's ticket. ]", "Conductor: Excuse me, ma'am. Ticket, please.", "Elsa Tobin: [ to Grandpa] Would you kindly hold these keys, please? I have a ticket, I know. I was in the smoking section.", "Conductor: It's OK, lady. Take your time.", "Malcolm Stewart: I'm sure it's in your purse, Mrs. Tobin.", "Elsa Tobin: Oh, here it is. [ She finds the ticket in her handbag and gives it to the conductor. ]", "Malcolm Stewart: And here are your keys.", "Malcolm Stewart: Thank you.", "[ The conductor moves on. ]", "Malcolm Stewart: Do you have family in New York?", "Elsa Tobin: No, no. But I do have very close friends in New York City.", "Elsa Tobin: We like to go to the theater together. You said you have family in New York.", "Malcolm Stewart: Yes, indeed. A son and his wife and their three children -- my grandchildren.", "Elsa Tobin: You must be excited.", "Malcolm Stewart: I can't wait, to see them!", "Elsa Tobin: Are you going to live with them?", "Malcolm Stewart: Yes.", "Elsa Tobin: Permanently?", "Malcolm Stewart: Well... they want me to, but it's too early to know for sure. I'm pretty independent.", "Malcolm Stewart: I tried to teach my kids the importance of independence, but I'm not sure I want to be alone.", "Malcolm Stewart: Some people don't mind being alone. I do.", "Elsa Tobin: I understand. But tell me. Why did you stop working?", "Malcolm Stewart: I retired because... I wanted to be with my family.  I didn't want to be alone anymore!"]}, {"title": "Episode 3 Grandpa's Trunk ACT III", "mp3": "Episode 3 Grandpa's Trunk ACT III.mp3", "text": ["Watch the video then answer the question: What's inside the trunk?", "[ On the Amtrak train later that day. The train is arriving in New York City. ]", "Announcer: Ladies and gentlemen, Amtrak is happy to announce our arrival in New York City. The train will be stopping in five minutes. Please check to be sure you have your belongings. And have a good stay in the Big Apple. Thank you.", "Elsa Tobin: Well, here we are.  It was so nice meeting you, Mr. Stewart.", "Malcolm Stewart: And nice meeting you, too, Mrs. Tobin. Please look us up. We're in the phone book. Dr. Philip Stewart, in Riverdale.", "Elsa Tobin: Your son?", "Malcolm Stewart: That's right. And have a good time in New York.", "Elsa Tobin: And don't be so independent. You're very lucky to have a caring family.", "Robbie: When can we go fishing?", "Grandpa: Robbie, we'll go fishing soon, and we'll take your dad with us.", "Philip: I'm ready, Grandpa. You name the day.", "Ellen: That's a great idea, Grandpa! Philip needs a day off.", "Robbie: [ to Richard] Let's give him our presents --now.", "Richard: Good idea.", "Grandpa: Presents --for me?", "Richard: [ He gives his present to Grandpa. ] From me and Marilyn.", "Robbie: And this one's from me. I looked all over the house to find it.", "Grandpa: [ He unwraps the presents. They contain photographs of him with the family. ] Richard, these are terrific pictures. This one really brings back memories. You remember that day, Robbie?", "Robbie: I sure do. It was fun.", "Grandpa: [ He looks at a photo of himself and susan. ] Oh, I'm sorry Susan isn't here. I miss her very much.", "Ellen: She feels bad, too, Grandpa. She called to say the plane was delayed. You know airports.", "Grandpa: I can't wait to see her. She looks just like Grandma at that age. I'd better unpack.  I started traveling twenty-four hours ago.", "Grandpa: [ He gets up. ] I'm not so young anymore.", "Ellen: Don't you want something to eat?", "Grandpa: No, thanks. After a good night's sleep, I'll enjoy breakfast even more.", "Philip: Well, come on, Dad. Ellen and I'll take you to your room.", "Robbie: I'm sure glad you're here, Grandpa.", "Richard: Good night, Grandpa.", "Marilyn: Pleasant dreams.", "[ The family leaves the living room. Ellen, Philip, and Grandpa go upstairs to Grandpa's room. ]", "Grandpa: Philip, do you have the key to the trunk?", "Philip: I have the key, but it doesn't work. [ He gives the key to Grandpa. ]", "Grandpa: [ He tries the key, but it doesn't unlock the trunk. ] I sent the wrong key. I have something for you. I made it myself. I think you'll enjoy it. I researched it for over a year. It's our family tree.", "Ellen: [ She looks at it. ] Oh, Grandpa! How exciting!", "Philip: Fabulous! Why, I didn't know that your grandfather was born in Germany.", "Grandpa: Lots of interesting information about our family. A gift from me.", "Ellen: Thank you so much. [ She hugs Grandpa. ]", "Susan: [ She rushes into the room. ] Grandpa! Grandpa! Oh, Grandpa, I'm so happy to see you!", "Grandpa: [ He looks at her. ] Oh, you look so beautiful, Susan. My granddaughter. Like I always said, you look just like Grandma.", "Philip: [ to Grandpa ] I think you're going to be very happy here with us.", "Ellen: I know you will.", "Grandpa: I don't feel alone anymore."]}, {"title": "Episode 4 A Piece of Cake ACT I", "mp3": "Episode 4 A Piece of Cake ACT I.mp3", "text": ["Watch the video then answer the question: Why do they make a bet?", "[ Outside the stewarts' house early Friday evening. Marilyn Stewart rides to the house on a bicycle. Inside, her husband Richard is looking at photos in his album. Marilyn enters and sits on the floor. ]", "Marilyn: I am exhausted. My new exercise class is so hard.", "Richard: Your new exercise class?", "Marilyn: Yeah. My new advanced exercise class.", "Richard: Why advanced?", "Marilyn: My instructor thought that the beginner's class was too easy for me.", "Richard: [ He laughs because she looks so tired. ] Too easy for you? [ He helps her stand up. ]", "Marilyn: Don't laugh. In the beginner's class, they give you a chance to rest between exercises.", "Richard: So?", "Marilyn: The advanced class is nonstop.", "Richard: [He teases her. ] I lift weights every morning for sixty minutes without stopping. [ He shows her his arm muscle. ] No problem.", "Marilyn: Listen, Richard, doing aerobics for an hour is a lot different than lifting weights.", "Richard: Yeah. Quite a bit different.  I think aerobics is easy.  I could work out in your class with no problem.", "Marilyn: You think so?", "Richard: Oh, without a doubt. When's the next class?", "Marilyn: Tomorrow morning at ten o'clock. Try it.", "Richard: Tomorrow morning after lifting weights, I'll try aerobics. [ He snaps his fingers. ] It's a snap. Tomorrow morning at ten o'clock.", "[ In Richard and Marilyn's room the next morning. Richard is lifting weights. Marilyn is sewing. ]", "Marilyn: Aren't you going to the aerobics class this morning?", "Richard: [ He finishes exercising and puts the weights on the floor. ] Of Course. Easy. [ He snaps his fingers. ] No sweat.", "Marilyn: You are not going to be able to move after this and the aerobics class.", "Richard: Are you kidding me? It's going to be a piece of cake.", "[ Marilyn shakes her head no. ]", "Richard: You want to bet?", "Marilyn: Yeah. What's the bet?", "Richard: I bet I can go one hour in your class this morning and not feel a thing!", "Marilyn: The bet is -- I win, and you cook dinner for the entire family.  Or you win, and I cook dinner for the entire family.", "Richard: [ He shakes her hand. ] It's a bet.", "Marilyn: Ok. Call my instructor, Jack Davis, right now. His number is 555-8842. The advanced class starts at ten o'clock.", "Richard: Well, it's eight twenty now.", "Marilyn: It only takes eight minutes by bicycle to the aerobics class. Give him a call.", "[ Richard calls jack Davis. ]", "Jack Davis: Davis Aerobics Center for Good Health.", "Richard: Jack Davis, please.", "Jack Davis: This is Jack Davis.", "Richard: Hello. This is Richard Stewart. My wife, Marilyn Stewart, is a member of your program. I'd like to come to the ten o'clock advanced class this morning.", "Jack Davis: Oh, fine, fine. Be here a few minutes early. You need to complete some forms before the class.", "Richard: Thanks. I'm on my way over.", "Jack Davis: Good-bye.", "Richard: Bye-bye. [ He hangs up. ] It's all set. I'm going. [ He puts his camera bag over his shoulder. ]", "Marilyn: Bye.", "Richard: See you later.", "[ They kiss. ]", "Marilyn: Good luck.", "Richard: Don't forget about the bet. Dinner for the entire family. And that includes Susan.", "Marilyn: Don't you forget.", "[ Richard snaps his fingers and leaves. Marilyn snaps her fingers and smiles. ]"]}, {"title": "Episode 4 A Piece of Cake ACT II", "mp3": "Episode 4 A Piece of Cake ACT II.mp3", "text": ["Watch the video then answer the question: Who's going to win the bet.", "[ Outside, on a busy street in Riverdale. Inside, the Davis Aerobics Center for Good Health. Jack Davis is taking Richard's blood pressure. ]", "Jack Davis: OK, Richard. That's terrific. Your pressure is 120 over 75, and that's fine. Now stand up, please.", "Jack Davis: [ Richard stands up, and jack takes his blood pressure again. ] Good, it's 122 over 80. You can sit down now. When was your last complete physical?", "Richard Stewart: [ He thinks. ] Six months ago.", "Jack Davis: Good. Do you have any back or knee problems?", "Richard Stewart: Nope. I am in perfect health.", "Jack Davis: What do you do for a living, Mr. Stewart?", "Richard Stewart: I'm a photographer.", "Jack Davis: Interesting. What do you photograph?", "Richard Stewart: Everything. The American scene. People, places, events.", "Jack Davis: Did you ever think of photographing an aerobics class?", "Richard Stewart: No... I can't remember taking pictures of people exercising.", "Jack Davis: But don't you think it'd be a good subject?", "Richard Stewart: Sure.", "Jack Davis: I need some good photos for my advertising, Mr. Stewart.", "Jack Davis: Maybe you can photogragh a class, and I can give you and Mrs. Stewart a month of classes — free.", "Richard Stewart: When can I photograph a class?", "Jack Davis: Anytime.", "Richard Stewart: How about today?", "Jack Davis: Terrific!", "[ In the exercise classroom at the Davis Aerobics center. Jack Davis and another instructor are about to teach a class. Richard is taking many photographs. ]", "Jack Davis: [ He enters. ] Hi.", "Instructor: Oh, hi.", "Jack Davis: Are we ready to go?", "Instructor: Yeah. Yeah. [ To students ] Let's get in our lines. We're going to take it slow first.  Stretch up... and we're going to go left first ... 2,3,4 ... now switch. ... OK, hold to the right. Sunrises. Stretch it out. Flat back. Bring it up ... and twists ... and side ... 2, 3 ... and left ... push ... push ... turn ... hit the floor.", "Instructor: Take it side again .... OK, and switch. Stretch it out. And we're going to warm down with a tango. Left, right. Enjoy it.", "[ In Richard and Marilyn's room later that day. Marilyn is alone, waiting for Richard. She is folding some towels. Richard sings and dances into the room. ]", "Marilyn Stewart: Richard, did you go to the Davis Aerobics class today?", "Richard Stewart: [ He takes off his camera and film bags and dances around the room. ] Yes, I went to the aerobics class today.", "Marilyn Stewart: What is wrong with you?", "Richard Stewart: Nothing. I am in excellent health.", "Richard Stewart: [ He starts dancing with Marilyn. ] I have ideal blood pressure. A perfect heart. In other words, I'm in wonderful condition.", "Marilyn Stewart: Richard, did you go to the aerobics class, really?", "Richard Stewart: And don't forget to invite Susan for dinner.", "Marilyn Stewart: [ not paying attention ] And your legs don't hurt?", "Richard Stewart: [ He jumps up and down. ] Hurt? What do you mean?", "Marilyn Stewart: What about your arms? Lift your arms up like this.", "Marilyn Stewart: [ She lifts up her arms to show him, and he lifts his arms. ] And they don't hurt not even a little?", "Richard Stewart: Nope.", "Marilyn Stewart: You are in great condition. I can't believe it!"]}, {"title": "Episode 4 A Piece of Cake ACT III", "mp3": "Episode 4 A Piece of Cake ACT III.mp3", "text": ["Watch the video then answer the question: Who's going to cook dinner tonight?", "[ In the Stewarts' kitchen a little later. Richard is drinking a soda. Marilyn is writing a grocery list. ]", "Marilyn: [ counting... ] Grandpa, Ellen, Philip, Robbie, you and me. That's six steaks.", "Richard: Don't forget Susan.", "Marilyn: Seven steaks. Cooking dinner for the entire family is not so easy.", "Marilyn: [ She points to her list. ] The shopping: the salad : tomatoes, lettuce, cucumbers, and onions. The main course : steak and potatoes.", "Marilyn: Richard, how much broccoli do I need for seven people?", "Richard: Marilyn, I have to tell you something. At today's exercise class...", "Marilyn: Yes, Richard.", "Richard: Well, I didn't really exercise.", "Marilyn: I knew it!", "Richard: I wanted to, but Jack Davis needed a photographer. [ He laughs. ] I'm sorry, Marilyn.", "Marilyn: I don't understand. Did you exercise or not?", "Richard: No. Instead of exercising, I photographed the class.", "Marilyn: And you didn't exercise?", "Richard: No.", "Marilyn: There's another advanced class today at four o'clock. We'll go together.", "Richard: What about the bet?", "Marilyn: Oh, the bet is still on, but you shop for the groceries. Remember, you win, and I cook dinner for the entire family.", "Richard: You win, and I cook dinner for the entire family.", "Marilyn: Including Susan. Four o'clock at the advanced exercise class. With me.", "[ They shake hands and laugh. ]", "[ Later, at the aerobics class. Marilyn and Richard are exercising to music. They are following the instructor's and Jack's directions. ]", "Jack: Don't forget to breathe.", "Instructor: Skip, hop, front.  Twist... again.... OK, now... scissors.", "Richard: This is fun. It's a piece of cake.", "Marilyn: Yeah. Just wait.", "Instructor: 5, 6, 7, go right, 1, 2, back, 2, 3 , 1, 2, 3, pony, pony... 1, 2, 3, kick... 1, 2, 3, kick... pony. And twist, twist.", "Jack: OK. Let's pick up the pace.", "[ Richard is getting tired. ]", "Marilyn: How are you doing, Richard?", "Richard: I can barely move.", "Instructor: 2, 3, 4, front. Now we're going to run it off. Front... knees up, knees up.", "Jack: OK. Finish off by jogging in place. OK. Keep those knees up. All right. That's it for today. Thank you, everyone. See you next week.", "Richard: [ to Marilyn ] Thank you, Jack, but no thank you.", "Marilyn: The advanced exercise class is not so easy, huh?", "[ Richard slowly falls to the floor. ]", "Richard: No, no, you were right. I was wrong.", "Marilyn: Come on, Richard. Get up. Let's go. You have to cook dinner for the entire family.", "Richard: Marilyn, I'm exhausted. I can't move.", "Marilyn: Oh, you'll do it. It's a piece of cake. [ She snaps her fingers. ]", "Jack: Excuse me, Richard, Marilyn.", "Richard: You are a terrific instructor, Jack.", "Jack: Thanks. But I have a question. Is this your very first advanced aerobics class?", "Richard: [ He laughs. ] Yes, it is.", "Jack: You are in great shape, Richard. Very few people last in this class for the full hour the very first time.", "Marilyn: It's true. You are in great shape.", "Richard: Thanks!", "Marilyn: I think we'll cook dinner together.", "[ They smile and kiss. ]"]}, {"title": "Episode 5 The Right Magic ACT I", "mp3": "Episode 5 The Right Magic ACT I.mp3", "text": ["Watch the video then answer the question: What does Philip decide to do?", "[ In the Stewarts' house early Saturday morning. Grandpa is making breakfast as Robbie enters. ]", "Robbie: Hi, Grandpa.", "Grandpa: Hi, Robbie.", "Robbie: Can I help?", "Grandpa: Yes, indeed. Hand me two eggs from the refrigerator, and I'll make you two fried eggs.", "Robbie: How about some bacon?", "Grandpa: I made enough for an army. You going to the baseball game today?  It's a perfect day for it --a little cloudy but nice and warm.", "Robbie: Dad and I were planning to go to the game, but he has to work today, and my friends don't want to go.  It's not an important game, anyway.", "Grandpa: Do you have any other plans for the day?", "Robbie: I'll work on my computer. I have a new math program, and I want to learn how to use it.", "Grandpa: Maybe you can teach me how to work on a computer someday.", "Robbie: Anytime. It's really easy, but, like anything, you need to work at it, Grandpa.", "[ They begin to eat breakfast. ]", "Robbie: [eating ] This bacon is great. I love crispy bacon.", "Grandpa: Oh, what are you doing tomorrow?", "Robbie: Nothing much.", "Grandpa: Well, maybe your dad and I could take you fishing with us.", "Robbie: I'd like that, but ...", "Grandpa: But what?", "Robbie: But Dad is always so busy.", "Grandpa: Well, can you come fishing with me tomorrow?", "Robbie: Sure, I can.", "[ Later that morning. Philip is eating breakfast quickly. He is speaking with Grandpa. ]", "Grandpa: Robbie says you can't take him to the game today.", "Philip: I really feel bad about it, but they need me at the hospital today, in the children's ward.", "Grandpa: I understand.", "Philip: Maybe we can spend some time together next weekend.", "Grandpa: Definitely. We should. You and Robbie and me. Remember our first fishing trip?", "Philip: I sure do.... Well, I've got to run, Dad. See you later. [ He leaves. ]", "[ On the patio later that day. Grandpa is looking at some fishing gear, things he will need for catching fish. Philip enters. ]", "Philip: Going fishing?", "Grandpa: I'm thinking about it.... So, how's work?", "Philip: Oh, the usual problems.", "Grandpa: You're working pretty hard these days.", "Philip: I guess I am.", "Grandpa: When did you last go fishing with Robbie?", "Philip: I remember exactly.  It was on his birthday, June second, two years ago. [ He laughs. ] We didn't catch anything.", "Grandpa: Remember our fishing trips?", "Philip: Yes. I loved them.", "Grandpa: Remember catching your first fish?", "Philip: How can I forget? I fell out of the boat! We had some good times together.", "Grandpa: Yes, we did. Maybe we should do it again.", "Philip: How about tomorrow?", "Grandpa: Don't you have to work?", "Philip: My paper work will wait.", "Grandpa: Oh, Robbie will be thrilled. I am, too, Son.", "Philip: I want to spend more time with Robbie.", "Philip: Tomorrow. It'll be like old times for you and me. And Robbie will love it.", "Philip: Well, what's the weather going to be like?", "Grandpa: Radio says sunny and mild.", "Philip: Well, I'll tell Robbie. And thanks, Dad.", "Grandpa: Don't thank me. I'm just being a grandfather."]}, {"title": "Episode 5 The Right Magic ACT II", "mp3": "Episode 5 The Right Magic ACT II.mp3", "text": ["Watch the video then answer the question: What trouble is there?", "[ At a lake in upstate New York the next morning. Grandpa, Philip, and Robbie are preparing to fish. ]", "Robbie: This is really neat! When do we eat?", "Philip: First, we have to catch some fish. In order to catch fish, you have to do this. [ He prepares the fishing line. ] Here we go. That's it. Then drop it into the water. All of this comes before eating. OK?", "Robbie: How do you know so much about fishing?", "Philip: Grandpa taught me. We spent a lot of time fishing together. Now, the important thing is to get the hook close to the fish. All right? Like this. [ He puts his fishing line into the water. ]", "Robbie: I think I see some fish right under us, Dad.", "Philip: Oh, not a chance!", "Robbie: I just saw a big one!", "[ A young boy arrives with a fishing rod. ]", "Grandpa: Hi, there!", "Albert: Hi.", "Grandpa: What's your name?", "Albert: Albert.", "Grandpa: Are you all alone?", "Albert: Yes, sir.", "Grandpa: How old are you, Albert?", "Albert: I'm ten.", "Philip: Where's your father?", "Albert: He's up there at the lodge.", "Philip: Does he know you're here?", "Albert: Yes, sir.", "Philip: OK, Robbie, maybe you should watch him. The water's pretty deep here.", "Robbie: I'll watch him, Dad.", "[ A little while later. They are still fishing. ]", "Robbie: What time is it?", "Grandpa: It's almost lunchtime, and no fish yet.", "Robbie: I can go up to the lodge for some hot dogs and drinks.", "Philip: No way! We're here to catch our lunch.", "Grandpa: To catch fish, you need the right magic.", "Philip: That's right. I forgot! The right magic. Do it for Robbie, Dad.", "Grandpa: You remember?", "Philip: Sure. Come on.", "Grandpa: Well, first, you have to turn your hat around like this. Then you close your eyes and say the magic words. Fish, fish, send me a fish.", "Robbie: [ He closes his eyes. ] Fish, fish, send me a fish.... I got one!", "Grandpa: See, it works!", "Robbie: It's a big one!", "Philip: Well, it always worked for me, too.", "Robbie: Grandpa, get the net, please! [ Grandpa gets the net, and Robbie finally catches the fish. ]", "Robbie: Dad, you got one, too!", "Philip: You bet I have! [ Philip brings up a boot from the water. ]", "Grandpa: Easy, Philip, easy.", "Robbie: Sorry, Dad.", "Philip: Well, one more and I've got a pair of boots.", "Robbie: You didn't say the magic words.", "Grandpa: Robbie's right.", "Philip: Yes, but you did, and we've got our lunch. Let's build a fire and cook it! Come on, Albert, you can help us!", "Albert: I want to stay here and fish.", "Grandpa: All right, but be careful.", "[ A little later. Grandpa, Philip, and Robbie are around their campfire. ]", "Robbie: Is it finished yet?", "Philip: I think so.  I hope you like your fish well done.", "Grandpa: Burned, you mean.", "Philip: Hey, I'm a doctor, not a chef.", "[ They hear Albert calling from the lake. ]", "Albert: Help! Help! I can't swim!", "Robbie: Dad! Grandpa! He fell in!", "[ Robbie and philip rush to save Albert. They pull him from the water and place him on the dock. ]", "Philip: Easy does it, Robbie. That a boy. That's it.", "Grandpa: He's not breathing, Philip!", "Philip: Robbie, run to the car! Bring a blanket and my medical bag.", "Robbie: Yes, Dad.", "[ Philip slowly breathes into the boy's mouth. ]", "Philip: Now, come on, son. Come on, son.", "Grandpa: Breathe, Albert!"]}, {"title": "Episode 5 The Right Magic ACT III", "mp3": "Episode 5 The Right Magic ACT III.mp3", "text": ["Watch the video then answer the question: How will Robbie feel?", "[ A few minutes later. Robbie returns with Philip's medical bag. Philip is trying to save the boy's life. ]", "Robbie: Here's the bag. Will he be OK, Dad?", "Philip: I hope so. [ to Albert ] That's it. That's the way. That's it. There. Oh, it's going to be all right. That's it. [ to Grandpa ] Wrap him in the blanket, Dad! [ to Albert ] That's it. That's it. It's all right, Albert. You're going to be OK.", "Albert: I want my daddy!", "Philip: We'll take you to him. Easy now. Easy does it. That's it.", "[ Outside the lodge a little later. ]", "Grandpa: Your dad is quite a guy.", "Robbie: I know, Grandpa.", "[ Philip comes out of the lodge. Alber's father is with him. ]", "Grandpa: How is he, Philip?", "Philip: He's asleep. He's going to be fine.", "Albert's Dad: How can I thank all of you?", "Philip: Thank my son Robbie. He pulled him out of the water.", "Albert's Dad: I'm very grateful, Robbie.", "Robbie: Dad saved him, not me.", "Albert's Dad: I'm so thankful to all of you. [ He shakes their hands and leaves. ]", "Philip: So long.", "Grandpa: He's a lucky boy. Well, what do you say we get back to our fishing?", "Philip: That a great idea. [ His beeper sounds. ] Uh-oh. It's probably the hospital. I have to get to a phone. It probably means we can't stay.", "Robbie: That's OK.", "[ Philip goes into the lodge to telephone the hospital. A few minutes later, he returns. ]", "Philip: One of my patients has a high fever, and I have to go to the hospital. I'm sorry, Robbie. I guess I ruined your day.", "Robbie: You didn't ruin my day, Dad. I understand. I really do.", "[ In the Stewarts' kitchen later that day. Ellen is cooking. Grandpa and Robbie enter. ]", "Ellen: Why are you back so early?", "Grandpa: Philip had to go back to the hospital.", "Robbie: He had an emergency.", "Ellen: Oh, that's too bad, Robbie. Did it spoil your fun?", "Robbie: No, Mom. We had a great time.", "Ellen: Well, did you do any fishing?", "Robbie: Yeah, we caught lots of them. Look! [ He empties a bag onto the table. ] They had a special on frozen fish down at the supermarket.", "Ellen: [ She lifts the bag.] Oh, you really had a bad day.", "Grandpa: We had a good day. Robbie pulled a boy out of the water.", "Robbie: And Dad saved his life. He's a terrific doctor, Mom.", "Ellen: I know.", "[ In the Stewarts' kitchen that night. Grandpa and Robbie are doing the dishes. ]", "Philip: Hi, Pop. Hi, Son.", "Robbie: Hello, Dad.", "Philip: What a day!", "Grandpa: How about a cup of coffee, Son?", "Philip: I'd love a cup of coffee.", "Robbie: How was the patient?", "Philip: She'll be fine.", "Robbie: Was it serious?", "Philip: No.", "Robbie: Until today, I was never really interested in medicine.", "Philip: Well, it's hard work.", "Robbie: Now I know.", "Philip: [ He pats Robbie on the back. ] I had a good time today, Robbie.", "Robbie: Me, too.", "Philip: Why don't we do it again?", "Robbie: Can we? When?", "Philip: How about next Saturday?", "Robbie: Won't you be busy?", "Philip: I'm changing my schedule. Well, do we have a date?", "Robbie: We sure do, Dad. Grandpa, can you come?", "Grandpa: I have other plans, Robbie. But I think you two can have a good time together without me.", "Philip: No, Dad, and certainly not without the right magic."]}, {"title": "Episode 6 Thanksgiving ACT I", "mp3": "Episode 6 Thanksgiving ACT I.mp3", "text": ["Watch the video then answer the question:", "[ In the kitchen in the Stewarts' home on Thanksgiving morning. Philip is drinking coffee. ]", "Ellen: OK, Philip. This is your third cup of coffee. We should get to work, or we won't be finished by dinner time.", "Philip: I guess we must.", "Ellen: We must.", "Philip: OK. [ He walks to the table in the center of the room.] The beginning of my famous Thanksgiving apple pie.", "Philip: [ He picks up an apple. ] One apple. Two apples. Three apples. Four apples.", "Ellen: Come on, Philip! Get busy with your famous apple pie. There's much more to be done.", "Philip: [ thinking... ] Now, the ingredients. What goes into my apple pie besides apples? Ah, yes. Flour, sugar, butter.", "Philip: [ He looks in the refrigerator and carries the butter dish to the table. ] Butter, nice and cold and hard. OK, here are the walnuts. Last but not least, the reason my apple pie is famous--cinnamon.", "Philip: Cinnamon ... [ He begins to look for the cinnamon. ] Ellen, where's the cinnamon?", "Ellen: If there is any cinnamon, it's in the cabinet with the salt and pepper.", "Philip: [ He opens the cabinet. He brings the spice rack to the table. ] Salt, pepper, dill weed, garlic powder, cinnamon. Ellen?", "Ellen: Yes, Philip.", "Philip: Is it possible that we forgot to buy cinnamon?", "Ellen: Yes, it is possible that we forgot to buy cinnamon.", "Philip: Well, how can I make my famous apple pie without cinnamon?", "[ Robbie enters. ]", "Robbie: Good morning.", "Ellen: Oh, hi, Robbie. Good morning.", "Philip: Good morning. Robbie. Can you do me a favor?", "Robbie: Sure, Dad. What?", "Philip: Remember my apple pie on Thanksgiving? What do you love about it?", "Robbie: The apples?", "Philip: No. The sssss...", "Robbie: Cinnamon.", "Philip: Right. We don't have any cinnamon.", "Robbie: I'll go down to Henry's grocery. He's always open. I'll get some for you.", "Philip: That's my boy! [ He takes money from his pocket and hands it to Robbie. ]", "Ellen: Oh, put your heavy jacket on, Robbie. It's cold outside.", "Robbie: Alexandra might call. Tell her I'll call her right back.", "Robbie: OK.", "Philip: Thanks, Son. [ Robbie leaves. ]", "Ellen: Uh, why does he always have to slam the door?", "[ A little later. The telephone rings in the kitchen. Ellen answers it. ]", "Ellen: Hello.... Hello, Alexandra. How are you? ... Fine. Robbie just went to the store. He'll be back soon.  He said he'll call you. ... Oh, oh, I see.... Oh ... certainly.", "Ellen: Well, do you have the phone number there? ... Oh ... I see.... Please, I know he wants to talk to you.... Thank you, and happy Thanksgiving to you and your family, too. Try to come by later for dessert.... Bye.", "Ellen: [ To Philip ] That was Alexandra. She and the Molinas are going to spend Thanksgiving with their cousins. She doesn't have the phone number.", "Philip: Oh, Robbie will be disappointed.", "Ellen: He'll be grouchy.  Maybe she'll call back. She promised.", "[ He returns from the store. ]", "Robbie: Here's your cinnamon, Pop. It was a dollar and sixty cents. You forgot to ask me for the change.", "Philip: Or did you forget to give it to me?", "[ Robbie gives him the chane. Philip puts it in his pocket. ]", "Philip: Thanks, Son.", "Ellen: Alexandra called.", "Robbie: I'll call her back.", "Ellen: She said she'll call you later. She's not at home.", "[ Robbie dials Alexandra's telephone number anyway. She doesn't answer. ]", "Philip: You should have your breakfast, Son. Make you feel better. Protein, vitamins.", "Robbie: She said she'll call back?", "Ellen: Yes, she did.", "[ He enters the kitchen. ]", "Grandpa: Good morning, everyone! Happy Turkey Day! What's wrong?", "Robbie: Nothing. [ angry ] Absolutely nothing. [ He leaves the room. ]", "Grandpa: What's gotten into him?", "Ellen: He missed a phone call.", "Grandpa: From ...?", "Philip: Yes, Alexandra.", "Grandpa: It's nice to see young love.... Oh, to be young again! Where's the coffee?"]}, {"title": "Episode 6 Thanksgiving ACT II", "mp3": "Episode 6 Thanksgiving ACT II.mp3", "text": ["Watch the video then answer the question:", "[ In the Stewarts' living room later that day. Grandpa and Robbie are watching the Thanksgiving Day parade on television. ]", "Grandpa: I love parades. The Thanksgiving Day parade is always such great fun.", "Grandpa: Look at that Superman balloon! Wowee! Just floating along high above Central Park West.", "Grandpa: Don't you just love it? Oh, and the bands and the music. John Philip Sousa.", "Grandpa: I love his music. Da dada da da dada da da da da da da dada.", "Grandpa: Oh, look at that float, Robbie. Look at those funny-looking clowns.", "Robbie: It's for kids.", "Grandpa: Maybe so, but parades always make me feel like a kid. Remember when you and your dad and I went to the Thanksgiving Day parade? You were four or five years old, I think.", "[ The telephone rings in the kitchen. Robbie rushes to answer it. ]", "Robbie (on phone): Hello, hello.... Oh, hi, Susan. How are you?... Here's Mom. [ He hands the phone to Ellen and returns to the living room. ]", "Ellen: Hello, Susan. Yes, he missed a phone call from Alexandra. Yes, I know, but he'll get over it. Good. Then you'll be here about five? Oh, fine. I look forward to seeing you and Harry and Michelle. Drive carefully. Good-bye.", "[ He enters the living room with a bowl. ]", "Philip: Taste Ellen's turkey dressing. It's delicious.", "Grandpa: I'm not surprised. It's Grandma's recipe.", "Robbie: It's my favorite part of the meal.", "Philip: What about my famous apple pie?", "Robbie: Dad, your apple pie is my favorite dessert.", "Philip: How's the parade?", "Robbie: OK.", "[ The phone rings again. ]", "Robbie: [ calling ] Mom! Is it for me?", "Ellen: No, Robbie.", "Philip: Who was it?", "Ellen: [ She comes into the living room. ] Wrong number. Philip, would you join me in the kitchen, please? It's getting late. We have vegetables to prepare.", "Robbie: Can I help with anything?", "Ellen: No, honey. You just relax with Grandpa. I'll get you to help serve later. [ She and Philip leave the living room. ]", "Grandpa: Ellen reminds me so much of Grandma.", "Philip: [ He returns to the living room. ] What time does the Michigan football game come on?", "Robbie: Four.", "Ellen: [ calling from kitchen ] Philip! Philip!", "Philip: I'll be back to see the game. [ He returns to the kitchen. ]", "Robbie: Grandpa, when did Dad graduate from Michigan?", "Grandpa: Let me think. He graduated from medical school in 1960 and from the University of Michigan in 1956.", "Robbie: Did you go to Michigan, too, Grandpa?", "Grandpa: Yup. I graduated in 1937.", "Robbie: I've got to start thinking about college soon. [ The phone rings again. Robbie runs to answer it. ]"]}, {"title": "Episode 6 Thanksgiving ACT III", "mp3": "Episode 6 Thanksgiving ACT III.mp3", "text": ["Watch the video then answer the question:", "[ Later that afternoon. The Stewart family and Harry and Michelle are sitting around the table. They are ready to have their Thanksgiving Day dinner.]", "Philip: OK, everybody. I want to welcome Harry and his daughter Michelle to Thanksgiving with us.", "Harry: Thank you, Dr. Stewart.", "Philip: Call me Philip.", "Harry: OK.", "Philip: But first, I think we should take a moment and remember the meaning of Thanksgiving.", "Harry: Philip, I took Michelle to a school play about the first Thanksgiving.", "Philip: Well, why don't you tell us about that, Michelle?", "Michelle: Thanksgiving was about the Pilgrims, the first settlers in America. They shared the first harvest with the Indians and gave thanks.", "Philip: All right. Then in that spirit let each of us give thanks. Each in his own way. Who wants to begin?", "Grandpa: I will. I give thanks for being here with my family and for being well, so I can enjoy you all.", "Robbie: All right! We love you, Grandpa.", "Susan: I'd like to give thanks for a healthy year, a good job, and for meeting Harry and Michelle.", "Harry: We'd like to give thanks for meeting Susan and the Stewart family.", "Michelle: I love you, Daddy.", "Susan: [ speaking softly to Harry ] Thanks, Harry. That was very kind of you.", "Robbie: I'd like to give thanks for Grandpa coming to live with us. And I'd also like to thank my math teacher for giving me a passing grade.", "Robbie: [ with hope ] And call me, Alexandra.", "Ellen: Oh, Robbie!", "Grandpa: She'll call.", "Richard: You go first, Marilyn.", "Marilyn: I'm thinking. You go first.", "Richard: Well, you all know I'm working on my photo album. It's not finished yet.", "Richard: [ He looks at Marilyn. ] And I'd like to thank Marilyn for being so patient.", "Marilyn: Thanks, Richard. I should thank you for encouraging me to keep working on my fashion designs.  I'm lucky to have a husband with an artistic eye.", "Ellen: Oh, we have a lot to be thankful for. For the food on this table. Just like the Pilgrims.", "Philip: I'll go along with that, Ellen.", "Ellen: Well, help me serve, Robbie.", "[ They begin to serve the dinner. ]", "Harry: It was a wonderful meal, Mrs. Stewart. Thank you.", "Richard: And now to see the end of the football game.", "Philip: Exactly. [ He gets up. ]", "Ellen: Where are you going, Philip?", "Philip: Remember, the Michigan football game? And Michigan needs a touchdown.", "Ellen: Did you forget something?", "Robbie: Dad, your famous apple pie.", "Philip: Just let me see the score, Ellen.", "Marilyn: Go ahead, Philip. We should all take a little break before dessert.", "[ Philip and Richard go into the living room. The other members of the family take the dishes from the table. Then the doorbell rings.]", "Ellen: Oh, who could that be? Oh, it must be Alexandra.  I invited her to come by for dessert.", "Robbie: You did? [ Ellen and Robbie go to the front door. ]", "Grandpa: I like Ellen.", "[ Alexandra enters. ]", "Robbie: You know everyone, Alexandra.", "Ellen: No, she doesn't know Harry Bennett and his daughter Michelle.", "Alexandra: Nice to meet you.", "Harry & Michelle: Hi.", "Marilyn & Susan: Hello, Alexandra.", "Alexandra: Hi, Marilyn. Hi, Susan. Happy Thanksgiving.", "Ellen: And Alexandra brought us a pumpkin pie.", "Robbie: Please sit down, Alexandra. [ calling ] Dad, Richard--Alexandra's here.", "[ Richard and Philip come into the kitchen. ]", "Richard (shouting from living room): Michigan needs a touchdown. Three minutes to play. Hi, Alexandra. Welcome.", "Philip: Hello, Alexandra. Yes, Michigan needs a touchdown.  One tiny little touchdown, with just three minutes to play.", "Alexandra: You want Michigan to win.", "Grandpa: How'd you guess?", "Ellen: And Alexandra brought us a pumpkin pie.", "[ Philip walks to the oven. He turns around with a strange look on his face. ]", "Ellen: What happened?", "Philip: We forgot to turn the oven on.", "Ellen: We did? Philip, why don't you go watch the last three minutes of the game. I will serve coffee and pumpkin pie.", "Philip: [ He leaves. ] OK. I'll be back in a few minutes.", "Ellen: Robbie, would you bring the dessert plates. And, Marilyn, would you pour coffee, please.", "Marilyn: Sure, Ellen.", "Grandpa: How was your Thanksgiving dinner, Alexandra?", "Alexandra: Just wonderful, Mr. Stewart. The Molinas are a large family. I love being with them.", "Robbie: I'm glad you came by, Alexandra.", "Alexandra: I am, too.", "Philip (shouting): [ He shouts from the living room. ] Touchdown! Touchdown! Touchdown!", "Grandpa: Great Thanksgiving. Lots to be thankful for. Michigan scored a touchdown. Alexandra came by. And nobody misses Philip's famous apple pie.", "Ellen: Oh, Grandpa!"]}, {"title": "Episode 7 Man's Best Friend ACT I", "mp3": "Episode 7 Man's Best Friend ACT I.mp3", "text": ["Watch the video then answer the question:", "Robbie: This new Walkman is absolutely wonderful. Richard and Marilyn bought it for me for my birthday. They're so thoughtful.", "Alexandra: You are very lucky, Robbie, to have such a nice family.", "Robbie: Is something wrong, Alexandra?", "Alexandra: No, nothing.", "Robbie: Yes, there is. I can tell. What's the matter? Come on, you can tell me. What's up?", "Alexandra: I don't know. Something's wrong. OK, let's talk. I received a letter from my parents this morning.", "Robbie: Did they write some bad news?", "Alexandra: No.", "Robbie: Well, then why are you so sad?", "Alexandra: I miss them. I miss them very much.", "Robbie: I'm sorry, Alexandra. But I understand.", "Alexandra: The Molinas treat me so nicely, and I love being with your family so much ... but when I received the letter with photographs of my family, I cried. I cried because I miss them all.", "Robbie: You really miss your family, don't you?", "Alexandra: Yes. I know I must seem silly. It's not like I have nobody. I like the Molinas very much, and they're so kind to me.", "Robbie: Hey, why don't we go out for a cheeseburger and French fries? That'll cheer you up. And you can use my Walkman.", "Alexandra: That's a good idea. But if we go out, please don't complain about your math teacher or your math homework. I want to have fun.", "Robbie: So do I. I have to turn off the lights, or else my father will get really angry. He says I never turn them out when I leave. If they come home and they're on ...", "Robbie: Do you hear something?", "Alexandra: Yes. What was that?", "Robbie: It sounded like a dog barking. It sounded like a dog barking right here. Yeah. A dog! A springer spaniel! Come on in!", "Alexandra: Make yourself at home. Oh, you poor little thing. Come on. Poor baby. Where did you come from?", "Robbie: Her name's Gemma, and she belongs to Mr. and Mrs. Levinson. There's a phone number: 555-8448.", "Alexandra: Robbie, maybe you should call them and tell the Levinsons we have their cute little spaniel. I've always wanted a springer spaniel. She's so cute.", "Recording Voice: The number you are calling -- 555-8448 -- is no longer in service.", "Robbie: The number's no longer in service.", "Alexandra: Oh, you poor, poor baby. You've lost your family.", "Robbie: We'll find them. Don't worry, Alexandra."]}, {"title": "Episode 7 Man's Best Friend ACT II", "mp3": "Episode 7 Man's Best Friend ACT II.mp3", "text": ["Watch the video then answer the question:", "Robbie: Don't worry, Alexandra. We'll find the owner.", "Alexandra: How, Robbie?", "Robbie: Let me think. Gemma, sit. Good Gemma. Give me your paw. Good Gemma. This dog is well trained.", "Alexandra: She likes you, too. So how are we going to find the owners?", "Robbie: With a little help from the ASPCA, the American Society for the Prevention of Cruelty to Animals. They're the ones.", "Robbie: We once found a cat. She was caught in the branches of our tree. And Dad called the ASPCA. They came and solved the problem.", "Alexandra: Robbie, let's call them.", "Robbie: Let me see -- ASPCA... Here it is. ASPCA Animal Shelter. 555-7700.", "Robbie (on phone): Hello, ASPCA. My name is Robbie Stewart. I have a lost dog I'd like to bring to you. How late are you open?", "Worker: We're open till nine P.M.", "Robbie: Thank you. I'll bring the dog over by nine. Thanks. Bye.", "Alexandra: They're still open?", "Robbie: They're open until nine o'clock. We have two and a half hours. Let's take Gemma by there now. They'll find the owner.", "Alexandra: I hope so. I'm so sad to see this little dog without her family. But if they don't, I'll adopt her.", "Robbie: She's so cute. Look at those eyes. She's hard to resist. Don't you just love her?", "Alexandra: I'd like to keep her, too. But I'll be going home to Greece at the end of the semester. She just wants love and affection.", "Robbie: Come on, Robbie. Let's get her to the animal shelter. Don't worry, Gemma. We'll get you home.", "Alexandra: It's not easy being away from home. Come on, poochie. Atta girl! Let's go.", "Worker: Your name?", "Robbie: Robbie Stewart. And this is Alexandra Pappas.", "Worker: Your name will do, Mr. Stewart. Your address?", "Robbie: 46 Linden street, Riverdale.", "Worker: Where did you find the dog?", "Robbie: She found us.", "Worker: You tried calling the number on the collar? And there's no address on the dog tag?", "Robbie: Yes, but the number's no longer in service. There's no other information. No ID number.", "Worker: Without that, it's hard.", "Alexandra: You will try to find the dog's owner?", "Worker: Oh, we'll try, believe me.", "Alexandra: And if you don't? ... Can I adopt the dog?", "Worker: Why, yes. If the owners don't claim the dog in forty-eight hours, then you can apply for adoption.", "Alexandra: How do I do that?", "Worker: You really want to?", "Robbie: Yes, I'm serious. If no one comes to claim Gemma, I'd like to adopt her.", "Worker: It's not difficult."]}, {"title": "Episode 7 Man's Best Friend ACT III", "mp3": "Episode 7 Man's Best Friend ACT III.mp3", "text": ["Watch the video then answer the question:", "Linda: OK. If you want to adopt an animal, first we need to know some references .", "Alexandra: References? People we know? Friends, teachers....", "Linda: We need to talk to some people about you. We want to be sure that you're responsible and that you can take good care of an animal.", "Linda: Then you have to fill out this form about your family background.", "Robbie: Is that it?", "Linda: No, there's more. We need to know about your history with animals . Have you ever owned an animal?", "Robbie: Yes. We had a cat when I was eight years old. I love cats.", "Linda: Do you have any animals now?", "Robbie: Unfortunately, no.", "Linda: We also like to know your reasons for wanting an animal.", "Robbie: Just to hold it and cuddle with it. Just to have as a pet. I love animals. To have a friend -- a pal. You know, man's best friend is his dog.", "Linda: And one thing more. If you're under twenty-one years of age ... then an adult must sign for you.", "Robbie: Uh-oh. No problem. My parents will think it's a good idea. I'll be back with them.", "Waiter: Ready, folks?", "Robbie: Are you ready, Alexandra?", "Alexandra: Yes, I'm ready. I'll have the chef's salad , please.", "Robbie: I will have a cheeseburger, medium rare , with raw onion, and french fries, please.", "Waiter: Anything to drink?", "Alexandra: A diet cola , please.", "Robbie: Ginger ale with lots of ice for me, thank you.", "Robbie: Hello. Stewart residence.", "Linda: Hello. Is Robbie Stewart there? This is Linda Aborn from the animal shelter.", "Linda: We have good news and bad news , Robbie. The good news is that the Levinsons have come by to pick up the dog. The bad news is, you won't be able to adopt the dog.", "Robbie: That's OK. Thanks, Linda. Bye.", "Alexandra: The owners claimed Gemma?", "Robbie: That's right. I'm glad for the dog.", "Alexandra: I guess I am, too. Come on. Let's dance."]}, {"title": "Episode 8 You're Going to Be Fine ACT I", "mp3": "Episode 8 You're Going to Be Fine ACT I.mp3", "text": ["Watch the video then answer the question:", "Molly, I need your special talent for handling special matters. Molly, Like what special matters? Well, I have a scheduling problem.", "我需要你处理特殊情况的特殊才能。 什么样的特殊情况？ 嗯，我在安排工作方面遇到困难。", "Yes? I have three tonsillectomies set for Friday with Dr. Earl. Yes?", "是吗？ 我安排好要和Earl大夫在星期五进行三个扁桃腺切除手术。 是吗？", "I need to fit a fourth operation into his schedule. And ... I know you can do it. Who's thepatient?", "我得在他的工作日程上再加第四个手术。 这……我知道你能做到。 病人是谁？", "Carl Herrera. Carl Herrera。 The boy has infected tonsils, and we should remove them as soonas possible. Well, I'll try to arrange the schedule, Dr. Stewart.", "这孩子的扁桃腺受到感染了， 我们要尽快把它切除。 好吧，我尽力去安排，Stewart大夫。", "But it's not going to be easy. I know you'll be able to take care of it. Well, Mrs. Herrera,", "不过，这事可不容易。 我知道你能够处理好这件事。 你好，Herrera太太，", "Carl will be perfectly fine after we remove his tonsils. Thank you for your reassurance, Dr. Stewart. He's had so many colds and sore throats recently.", "切除扁桃腺之后，Carl会完全恢复健康的。 谢谢你消除了我的顾虑，Stewart大夫。 他最近常常感冒，并且喉咙痛。", "Well, it's a very easy operation, Carl. You won't feel a thing. But when do they do it?", "这是个很简单的手术，Carl。 你一点感觉也没有。 但是什么时候动手术？", "This Friday. But Saturday's my birthday. Well, we could reschedule the operation, Mrs. Herrera,", "这个星期五。 但星期六是我的生日。 这样吧，我们可以重新安排手术时间，Herrera太太。", "but I don't want to put it off too long. No, I think it's important to do it now. We can have abirthday party for you, Carl,", "但我希望不要拖得太久。 不，我觉得还是应该现在动手术。 我们可以给你举行生日派对，Carl，", "When you come out of the hospital. But it won't be on my birthday. But your health is moreimportant, Carl. Believe me.", "在你病好出院后。 但是那就不是在我生日那天了。 可是你的身体更重要，Carl。相信我的话。", "I don't want my tonsils out. Nurse Baker, would you come in, please? Hello, Mrs. Herrera. Hi, Carl, how you doing?", "我不想把扁桃腺割掉。", "I don't want my tonsils out. Come with me, Carl. You and I will talk this over.", "我不想切除扁桃腺。 跟我来，Carl。 我俩商量商量。", "She has a special way with kids. She sure does. Carl, does your throat hurt?", "她对孩子很有一套。 她的确如此。 Carl，你喉咙痛吗？", "Yes. OK. Do you want to get better? Yes.", "是的。 好，你想把病治好吗？ 是的。", "OK. We want you to get better, too. You'll have your tonsils out tomorrow, and you won't get somany colds anymore.", "我们也希望你能尽快康复。 明天，你的扁桃腺切除后， 你就不会老患感冒了。", "But if I have my tonsils out tomorrow, I'll miss my birthday party on Saturday. I know.", "但是，我如果明天切除扁桃腺， 就会错过星期六的生日派对。 我知道。", "It's a problem, isn't it? Let me try to work something out. What?", "这确实是个问题，不是吗？ 让我想个办法解决。 什么办法？", "I have to think about it. You're fooling me. Oh, I'm not, Carl.", "我得想一想。 你想骗我。 噢，我不骗你，Carl。", "Give me a chance to think about it, and I'll come up with something. A surprise?", "给我一个机会想想， 我会想出一个办法的。 一个惊喜？", "Maybe. But you just put on your pajamas and robe, and I'll think of a surprise.", "也许是。 你先把你的睡衣裤和长袍穿上， 我来想出一个绝好的主意。", "Will it hurt? No. There are other boys and girls here, and they're having their tonsils out.", "会痛吗？ 不痛。 还有其他男孩女孩在这，他们也将切除扁桃腺。", "You'll meet them. I don't want to.", "你会见到他们的。 我不想见。", "Change your clothes, Carl. Everything will be just fine.", "把衣服换了，Carl。 一切都会安好的。"]}, {"title": "Episode 8 You're Going to Be Fine ACT II", "mp3": "Episode 8 You're Going to Be Fine ACT II.mp3", "text": ["Watch the video then answer the question:", "OK. 好。", "Do you know how to play charades? 你们会打哑谜吗？", "Frank, you've never played charades? Frank，你从来没玩过哑谜。", "Nope. 没有。", "Carl, you're sure you've never played? Carl 你肯定你从没玩过吗？", "OK, Betty, Tim, and Frank. 好，Betty，Tim，Frank。", "We're going to pla ces. 留着点嗓子。", "Between now and tomorrow 从现在起到明天", "you're all going to have your tonsils out. 你们都要切除扁桃腺。", "And you won't be able to speak for a while. 有一段时间，你们没有办法讲话。", "So save your voices till then. 所以，省着点嗓子。", "Hi, gang. Hi, everybody. 嗨，各位。", "Well, what's going on? 噢，怎么啦？", "I sure I am glad to see you, Dr. Stewart. 真高兴见到你来，Stewart大夫。", "This is a rough group. 这是一群粗野的孩子。", "I didn't want to play charades, 我不想玩哑谜。", "so they're angry at me. 所以他们生我的气。?", "Why don't you want to play? 你为什么不玩？", "Because I don't want to be here. 因为我不想呆在这儿。", "I don't want my tonsils out. 我不想切除扁桃腺。", "Why not? 为什么不想？", "Because my birthday is tomorrow. 因为明天是我的生日。", "My mother promised me a birthday party with a clown. 我妈妈答应给我安排一个有小丑的生日派对。", "But you can have one when you go home, Carl. 但你回去以后还可以办一个呀，Carl。", "But my birthday is tomorrow. 但是我的生日就在明天。", "I'm sorry, Carl. 很抱歉，Carl。", "Carl, you'll have your party when you go home, Carl，你回去以后就可以开个生日派对了。", "But it won't be on my birthday! 但那就不是在我生日那天了！", "And you promised me a surprise. 而且你答应给我一个惊喜。"]}, {"title": "Episode 8 You're Going to Be Fine ACT III", "mp3": "Episode 8 You're Going to Be Fine ACT III.mp3", "text": ["Watch the video then answer the question:", "It hurts, doesn't it? 有点痛，是不是？", "You'll feel better tomorrow, Betty, believe me. 明天你就会好些，Betty，相信我。", "Only one day, and it won't hurt as much. 只要一天，就不会像现在这样痛了。", "Do you feel like eating? 想吃东西吗？", "Having some dinner? 吃点晚餐？", "Oh, don't look so sad. 噢，别显得那么无精打采。", "Let me tell you about your dinner. 我告诉你晚餐是什么。", "It's ice cream. 是冰淇淋喔。", "Ice cream. 冰淇淋。", "All kinds of flavors. 各种口味的都有。", "Chocolate. 巧克力的。", "Strawberry? 草莓的？", "Vanilla? 香草的？", "Vanilla, too? 香草的，也有吗？", "I see you're feeling better already, Betty. 我看得出来你已经感觉好些了，Betty。", "So you will have dinner? 那么要吃晚饭吗？", "OK, honey, we'll see to it 好，亲爱的，我们设法", "that you have strawberry and vanilla ice cream. 让你吃到草莓和香草的冰淇淋。", "Just rest now. 现在好好休息。", "You need some rest to help you get better quickly. 需要多休息才会好得快。", "Hi, , "What would you like? 你想要什么？", "Hmm? 嗯？", "You want to play charades? 你想玩哑谜？"]}, {"title": "Episode 9 It's Up to You ACT I", "mp3": "Episode 9 It's Up to You ACT I.mp3", "text": ["Watch the video then answer the question:", "Who is it? 是谁?", "Dad. 爸爸。", "Come on in, Dad. 请进来,爸爸。", "I thought you might be hungry. 我想你大概饿了。", "I brought you a chicken sandwich and a glass of milk. 我替你带来一份鸡肉三明治和一杯牛奶。", "I am hungry. 我真是饿了。", "Thanks, Dad. 谢谢，爸爸。", "What time is it, anyway? 几点了，顺便问一下？", "Ten o'clock. 十点钟。", "What are you working on? 你在干什么？", "I'm writing a story for the high-school paper. 我正在为高中校刊写篇东西。", "Can't you finish it tomorrow? 你明天完成它不行吗？", "No, I have to turn it in in the morning. 不行，明天上午我要交上去。", "What's it about? 是关于什么的？", "I'm writing an article on the feelings about graduation. 我在写一篇关于毕业感觉的文章。", "And ... how do you feel? 那……你的感觉是什么？", "Me? 我吗？", "A little scared. 有点害怕。", "And excited, too. 也很兴奋。", "I felt the same way. 我当时也有这种感觉。", "The scary part's leaving home and moving to college. 害怕的是要离开家到学校去。", "Oh, leaving home is part of growing up. 呵，离开家是成熟过程的一部分。", "Well, don't work all night. 好啦，别通宵工作。", "I don't mind. 我不在乎。", "I enjoy writing. 我喜欢写作。", "Well, 那么，", "maybe you should think about becoming a writer. 也许你应该考虑成为一名作家。", "Maybe I should. 也许我该这样。", "You have lots of time to decide. 你有很多时间做决定。", "That's the worst part--making decisions. 最伤脑筋的是做决定。", "You'll be OK. 你不会有问题的。", "Good night, Son. 晚安，孩子。", "Good night, Dad. 晚安，爸爸。", "\"Hail to the victors valiant, “向勇敢的胜利者致敬。", "Hail to the conquering heroes, 向进取的英雄们致敬，", "Hail, Hail to Michigan, 致敬，向Michigan致敬,", "The champions of the West!\" 西部的优胜者 ！”", "Ah, good morning, Robbie. 啊，早安，Robbie。", "Good morning, Dad. 早安，爸爸。", "How's my grandson? 我的孙子怎样啦？", "Fine, Grandpa. Fine! 很好，爷爷。很好！", "What's all the cheering about? 这么高兴是为什么？", "Did the University of Michigan win another football game? 是不是Michigan大学赢得了一场足球赛", "Better than that. 比那种事更值得高兴。", "Tell him, Philip. 告诉他，Philip。", "I just spoke with Charley Rafer. 我刚和Charley Rafer通了电话。", "Who's Charley Rafer? 谁是Charley Rafer？", "He's the Dean of Admissions for the University of Michigan. 他是Michigan大学招生办主任。", "And it turns out he's a classmate of Philip's. 有意思的是，他和Philip是同班同学。", "We were both on the tennis team. 我们都是网球队的成员。", "Great! 真棒！", "It is great. 的确是太好了。", "He's going to be in New York tomorrow 明天他要在纽约", "to interview applicants for admission. 与申请入学者面谈。", "And he's agreed to fit you into his schedule. 他同意明天把你安排进他的名单 。", "But I may not want to go to Michigan. 但是我可能不去Michigan。", "It's one of the best schools in the country, Robbie. 这是全国最好的大学之一，Robbie。", "I studied medicine there. 我在那儿学医学。", "Your grandfather went to the Engineering School there. 你爷爷进那儿的工学院。", "I know that, but ... 这我知道，但是……", "You said you wanted to be a doctor like your father. 你说过你希望像爸爸一样成为一名医生。", "Not exactly. 还不一定。", "You couldn't pick a finer medical school than Michigan. 你再也找不到一所比Michigan大学更好的医学院了。", "Yes, I know that. 是的，我知道。", "Let's meet with Charley at the university club. 我们就去大学俱乐部见Charley吧。", "Ten o'clock tomorrow morning. 明早十点钟。", "It doesn't mean you're going to Michigan. 这并不是说你就要上Michigan大学。", "It doesn't mean you have to be a doctor. 也并不意味着你一定要当医生。", "But the interview will be good experience for you. 但这次面谈对你来讲是一次很好的经验。", "In that case, it's OK. 这么说，我就去。", "Dad, growing up means 爸爸，长大了意味", "making my own decisions, doesn't it? 我自己能做决定，对吧？", "You're right, Robbie. 你说得对，Robbie。", "But, like your Grandpa suggested, 但是，照你爷爷所建议的", "have the interview. 去参加这次面谈。", "And then make your own decision. 然后你自己做决定。", "That sounds fine. 这样听起来蛮好的。", "I know it's sudden, Robbie, 我知道这件事很突然，Robbie。", "but this is an important opportunity. 但这是一次很重要的机会。", "We'll head down there first thing tomorrow morning. 明早第一件事就是这。", "OK? 好吗？", "Sure, Dad. 一定，爸爸。", "I want you to know something, Son. 我希望你知道一件事，孩子。", "I'm ... very proud of you. 我很……以你为荣。", "Thanks, Dad. 谢谢你，爸爸。", "Well, I've got an appointment at the hospital. 好啦，我在医院有个会。", "I'll see you all at dinnertime. 吃晚饭时见面了。", "Bye, Dad. 再见，爸爸。", "Is something still wrong, Robbie? 还有什么不对的，Robbie？", "I'll be OK. 没什么。", "Going away to college for the first time 第一次离家上大学", "always makes one a little nervous. 总是让人有些紧张。", "I guess so. 我猜是这样。", "I'll be OK. I just need time to think. 我会适应的。我只是需要时间思考。"]}, {"title": "Episode 9 It's Up to You ACT II", "mp3": "Episode 9 It's Up to You ACT II.mp3", "text": ["Watch the video then answer the question:", "Sorry, Robbie. Sorry to be late this morning, 对不起，Robbie。今天早上迟了点，", "but, well, we've still got some time for a cup of coffee. 不过，我们还有喝杯咖啡的时间。", "I can't wait to see my old pal Charley Rafer. 我真想早点见到老友Charley Rafer。", "Neither can I. 我也一样。", "So you thought about it, huh? 你考虑过了吗？", "Yes, I have, Dad. 是的，我考虑了，爸爸。", "Well, I'm glad. 那好，我很高兴。", "I knew you'd realize 我知道你会认识到", "that this interview could be an important experience for you. 这次面谈是一次很难得的经验。", "I came to that conclusion. 我的结论也是这样。", "That's very wise, Robbie. 这是很明智的，Robbie。", "Very wise. 非常明智。", "Now let's head off for the city and the university club. 现在我们进城去，到大学俱乐部。", "Thanks, Dad. 谢谢，爸爸。", "Thanks ... for what? 谢什么？", "Thanks for hearing me out. And ... 谢谢你听我的意见。而且……", "And ...? 而且……？", "And thanks for being such an understanding father. 而且谢谢你是这样一位善于了解我的父亲。", "Well, thank you, Robbie. Thank you. 嗯，谢谢你，Robbie。 谢谢你。", "Philip Stewart! Philip Stewart ！", "It's great to see you! 真高兴见到你！", "Charley Rafer--you look as young as ever. Charley Rafer ---你看起来就跟以前一样年轻。", "You must be Robbie. 你就是Robbie吧。", "Hi. 你好。", "Yes, this is my youngest son Robbie. 是的，这是我的小儿子Robbie。", "Robbie, I want you to meet Robbie，我要你见见", "one of the best tennis players on the Michigan team-- 当年Michigan球队最好的网球选手之一--", "Charley Rafer. Charley Rafer。", "Nice to meet you, Dean Rafer. 很高兴见到你，Rafer主任。", "Well, are you as good a tennis player as your dad? 嗯，你是否像爸爸那样是一名优秀的网球选手呢？", "No, I'm not very good at it. 不，我网球不行。", "Frankly, neither was I. 坦白的说，我当年也不行。", "Charley was the star of the team. Charley是当时队里的明星。", "Yeah. Thanks. 凑数的，谢谢你。", "Well, how're you been, Philip? 嗯，这些年来怎么样，Philip？", "Oh, working too hard. 噢，工作太累人了。", "Doesn't show. 倒是看不出来。", "How's Ellen? Ellen怎么样？", "Fine, thank you. 很好，谢谢。", "And how's Marge? Marge怎么样？", "She's still giving the toughest English history exams 她仍用最难的英语史试题考学生", "in the school and loving every minute of it. 在学校乐此不倦。", "And speaking of minutes, 谈到时间，", "I have interviews until noon, 我从现在到中午有一系列的面谈，", "so why don't we get right to work? 我们现在就开始工作，好吗？", "Can you have lunch with us later? 晚些时候，你能与我们一起共进午餐吗？", "I'd love to, Philip, but I'm afraid I can't. 我很想，Philip，但是我恐怕不行。", "I'm only here two days, 我只有两天时间，", "and I have interviews with twenty-six applicants. 而要面谈的申请人有二十六位。", "I understand. 我能了解。", "Well, thanks. 噢，谢了。", "I'll wait outside. 我到外面等。", "Good luck, Son. 祝你好运，孩子。", "Did you bring your transcript from high school? 你把高中的成绩单带来了吗？", "Yes, sir. 带来了，先生。", "Right here. 在这儿。", "Thank you. 谢谢。", "Please sit down. 请坐下。", "I see under \"activities\" that 我注意到在“活动”项目中提到", "you've been writing for the school paper. 你为校刊写文章。", "Yes, sir. 是的，先生。", "What kinds of articles have you written? 你写过一些什么样的文章？", "All kinds--sports, editorials, theater reviews. 各种各样的---体育，社论，剧评。", "You name it, I've written it. 你说得出的，我都写过。", "Hmmm. 嗯。", "Well, have you ever thought of becoming a journalist? 那好，你是否想过成为一名新闻记者？", "A professional writer? 职业写作人员？", "Not until recently. 最近才考虑到。", "Michigan has a fine School of Journalism. Michigan大学有一个很好的新闻学院。", "Yes, I know that. 是的，我知道。", "You seem to have some reservations. 看起来你还有些犹豫。", "I'm a little uncertain. 我有点犹豫不决。", "It's been very nice talking to you. 很高兴与你交谈。", "Nice talking to you, sir. 我也很高兴与您交谈，先生。", "One piece of advice. 给你一句忠告。", "The most important thing is for you to decide your own future. 最重要的是你要自己决定自己的未来。", "Yes, sir. 是的，先生。", "Good-bye, Dean Rafer. 再见，Rafer主任。", "Good-bye, Robbie. Good luck. 再见，Robbie，祝你好运。"]}, {"title": "Episode 9 It's Up to You ACT III", "mp3": "Episode 9 It's Up to You ACT III.mp3", "text": [ 那就说吧。", "Well, I know you and Mom have given up a lot 嗯，我知道你和妈省吃俭用", "to save money for my college tuition. 存钱准备我的大学学费。", "We want you to go to college, Robbie. 我们希望你上大学，Robbie。", "I know. I do. 我知道。我会的。", "But? 那还有什么事？", "Well, I've thought a lot about which college, 嗯，我为了上哪一个大学想了很多，", "and one of them is Columbia. 其中一所是Columbia大学。", "Columbia? Why Columbia? Columbia？为什么是Columbia？", "First, they have an excellent School of Journalism. 首先，那里有很优秀的新闻研究院。", "They do. 是的。", "And your friends are planning to go to Columbia? 而且你的朋友们也想去Columbia大学，对吗？", "That's only part of it. 这只是一部分原因。", "It's complicated. 原因很复杂。", "I'll try to explain. 我会尽量给你解释。", "Mike and I had a hamburger this afternoon, and we talked. 今天下午 Mike和我一起吃汉堡时讨论过。", "Yes? 是吗？", "Well, we talked about a lot of things. 嗯，我们谈了很多。", "He applied to Columbia, 他申请了Columbia，", "and his interview was very successful. 他的面谈很成功。", "He thinks he'll be accepted, 他觉得他会被录取，", "and he really wants to go there. 他确实很想去那儿。", "Dean Rafer called me today. Rafer主任今天打电话给我。", "He told me he was very impressed with you. 他告诉我他对你印象很好。", "He's a nice man. 他是个好人。", "He was very kind. 对人和蔼。", "He told me 他告诉我", "you had some doubts about wanting to go to Michigan. 你对上Michigan大学还有些疑虑。", "Yes. I do. 是的，我有疑虑。", "I'm just not sure about what I want to do. 我不知道该读什么。", "That's OK. 没关系的。", "You understand? 你能谅解？", "Let me tell you something, Robbie. 让我告诉你一件事，Robbie。", "Something that might be surprising to you. 一件也许会让你吃惊的事。", "What? Tell me. 什么事，说给我听听。?", "Well, Grandpa wanted me to study engineering, like him. 嗯，爷爷希望我像他一样学工程。", "Well, I wasn't clear about my future, 哦，我对自己的未来也不清楚，", "but I knew engineering was not for me. 但我知道工程对我不适合。", "What did you tell Grandpa? 那你是如何对爷爷讲的？", "The truth. 实话实说。", "Then you're not upset 那么你有没有感到不高兴", "about my not wanting to go into medicine? 对我不学医。", "I'm not upset at all. 一点也不。", "I'm just happy that we're able to talk about it. 我很高兴我们能够共同商讨这件事。", "I am too, Dad. 我也一样，爸爸。", "I suppose you want to apply to Columbia. 我猜想你会申请Columbia大学。", "Yes, but I also want to apply to several other colleges. 是的，但我还想申请几所其他的大学。", "I thought you wanted to go to Columbia. 我还以为你只想上Columbia大学。", "Well, I might want to go to Columbia. 嗯，我也许去Columbia大学。", "But I might not. 但也许不去。", "I just want to be able to make my own decision. 我只想能够自己决定。", "You're a real Stewart! 你真是我们Stewart家的人！", "And if I think about it long enough, you never know ... 如果我考虑成熟的话，说不定……", "Never know what? 说不定什么？", "If I make my own decision, 如果我自己作决定，", "I might choose Michigan. 我说不定选择Michigan大学。", "Robbie, you're something! Robbie，你真了不起！", "You know, when I was your age, 要知道，当我像你这么大的时候，", "I said exactly the same thing to Grandpa. 我跟你爷爷也是这么说的。"]}, {"title": "Episode 10 Smell the Flowers ACT I", "mp3": "Episode 10 Smell the Flowers ACT I.mp3", "text": ["Watch the video then answer the question:", "Good morning, Susan. 早安,Susan。", "Good morning, Sam. 早安,Sam。", "What's the schedule today? 今天的工作是怎么安排的？", "Ten o'clock, 十点钟，", "telephone FAO Schwarz about the new twin baby dolls. 打电话给FAO Schwarz谈关于双胞娃娃玩具的事。", "OK. 好的。", "Telephone Mrs. Zaskey at the advertising agency. 打电话给广告代理Zaskey夫人。", "I did that. Go on. 我已经打了。 继续说。", "Eleven o'clock, approve the sketches for the toy spaceship. 十一点钟，批玩具太空船的草图。", "Where are they? 草图在哪儿？", "Right here. 就在这儿。", "Did you look at them? 你看过了吗？", "Yes, I did. 是的，我看过了。", "What do you think of the spaceship? 你觉得那个太空船怎么样？", "I think the kids'll love it. 我觉得孩子们会喜欢。", "Would you show me the drawings, please? 请把草图给我看看好吗？", "Huh. 嗯。", "Now, what else is on the schedule today? 那么，今天的工作表还有些什么?", "Well, at one o'clock 嗯，一点钟", "you have a lunch appointment with Mr. Levine, 你跟Levine先生约好吃午饭，", "the client from the Toytown Stores. 这个客户来自Toytown Stores。", "Where? 在什么地方？", "At Rossano's. 在Rossano餐厅。", "Hmm. Anything else? 嗯，还有其他事吗？", "At four o'clock, 四点钟，", "you have a meeting with the production staff 要与生产部门人员开会", "in the conference room. 在会议室。", "Make sure everybody is at that meeting. 要确定每一位都出席这次会议。", "Will do. 没问题。", "At six you're meeting, Mr. Ozawa. 六点钟要会见Ozawa先生。", "Oh, yes. Are his models here? 噢，对啦。他的模型在这儿吗？", "They're in my office. 在我办公室。", "I'd like to see them. 我想看看。", "Right. 好的。", "What else? 还有什么？", "Come on, Sam ... 过来，Sam……", "You work too hard, Susan. 你太拼命工作了，Susan。", "When was your last day off? 上次休假是在什么时候？", "Hmm. I can't remember. 嗯，我记不起来了。", "You really ought to take some time off. 的确应该休一次假。", "What for? 为什么？", "To enjoy the simple things in life ... 享受人生乐趣……", "I know, Sam. 我知道，Sam。", "Maybe soon. 也许很快就会。", "To smell the flowers. 去轻松一下。", "Oh, wait a minute. What's today's date? 噢，等一等。今天几号？", "Today is the twelfth. Why? 今天是十二号。怎么了？", "It seems to me I scheduled something else. 好像我还安排了什么别的事情。", "There's nothing else in the appointment book. 在工作日程上没有别的的事了。", "I'm sure I did. 我确信我安排了什么事情。", "Oh, well, I'll probably remember it later. 噢，也许过一会我会想起来。", "I hope it isn't important. 希望不是什么重要的事。", "Hmm. It's probably nothing. 嗯，也许没什么事。", "OK, let's get started. 好吧，我们开始工作。", "Would you call Priscilla Smith at FAO Schwarz, please? 请拨电话给FAO Schwarz的Priscilla Smith，好吗？", "Right. 好的。", "These are the models from the Japanese film maker. 这些是那位日本电影制作人制作的模型。", "Thank you. Just put them on my desk. 谢谢。 把它们放在我桌上。", "And the new drawings for the toy spaceship. 还有玩具太空船的新草图。", "Wonderful. 真精采。", "That was fast. 而且又快。", "We have a new artist. 我们找来了一位新的美工人员。", "She's very talented. 她很有才华。", "What time is it, anyway? 几点钟了，顺便问一下？?", "My watch stopped. 我的表停了。", "It's eleven thirty. 十一点半。", "What time is my lunch date with Bill Levine? 我与Bill Levine 约好的中饭时间是几点？", "One o'clock. 一点钟。", "Remind me to leave at twelve forty-five. 提醒我十二点四十五分走。", "Did you remember your other appointment for today? 还记得今天的另一个约会吗？", "No, 记不起来了。", "but I have a feeling 但我觉得", "it's going to be too late when I do remember. 等我想起来时已经太晚了。", "Yes, Sam? 什么事，Sam？", "I just solved the mystery. 我刚刚把那个谜底解开了。", "What did I forget? 我忘记什么？", "You have some guests in the reception room. 有几位客人在接待室等你。", "What? Who? 什么？是谁？", "Mr. Harry Bennett and his daughter. Harry Bennett 先生和他女儿。", "I remember! 我记起来了！", "Oh ... Harry! 噢……Harry！", "I made a lunch date with him and his daughter weeks ago. 几星期前我约好和他以及他女儿共进午餐。", "Is he a client? 他是顾客吗？", "He's a friend. 他是我的一位朋友。", "Well, he's here with his daughter to have lunch. 嗯，他和他女儿已到这儿等候吃午餐了。", "I met her at Thanksgiving, 我在感恩节与她见面，", "and I promised to have lunch with both of them today. 我答应今天和他们共进午餐。", "Yes, indeed. 是的，原来如此。", "What are you going to do about your appointment 那该怎么办", "with Mr. Levine? 你与Levine先生的邀约？", "Any suggestions? 有什么建议吗？", "Oh! 噢！"]}, {"title": "Episode 10 Smell the Flowers ACT II", "mp3": "Episode 10 Smell the Flowers ACT II.mp3", "text": ["Watch the video then answer the question:", "Hi, Michelle. 嗨，Michelle。", "Hello, Harry. 你好，Harry。", "It's nice to see you again. 很高兴再见到你们。", "Hello. 你好。", "Hi, Susan. 嗨，Susan。", "We have both been excited about seeing you 我们两个很高兴见到你", "and having lunch with you today. 与我们一起吃午餐。", "Michelle picked these flowers out for you. Michelle选这些花送给你。", "Daddy, can we go soon? 爸爸，我们能快点走吗？", "We're going to go to lunch in a few minutes, honey. 我们一会就去吃午餐，亲爱的。", "But I'm thirsty. 可是我渴了。", "OK. You go out and get a drink of water at the fountain. 好。出去在饮水机那儿喝点水吧。", "The fountain is over there, Michelle. 饮水机在那儿，Michelle。", "Near the Exit sign. 就在出口附近。", "Thank you. 谢谢 。", "Michelle is a little shy. Michelle有点不好意思。", "I used to be that way when I was her age. 我像她这般年纪也是这样。", "Harry, if Michelle doesn't want to go, Harry，如果Michelle不想去，", "we don't have to. 我们不必勉强。", "She'll be fine. 她没有问题。", "Remember, 别忘了，", "I haven't dated any one else since her mother died. 自从她母亲去世之后，我从没有和别人约会过。", "This is a little difficult for her. 这对她来说有点不习惯。", "Are you ready to go? 准备好动身吗？", "Yes. But could you wait one minute? 是的。不过你能等一下吗？", "I have a call to make. 我需要打个电话。", "Would you excuse me? 失陪一下。", "Sam, get Mr. Levine at Toytown Stores Sam，给Toytown Stores的Levine先生", "on the telephone for me, please. 请替我拨电话。", "Right. 好的。", "Hello. Susan Stewart calling Mr. Levine, please. 喂，Susan Stewart想与Levine先生通话。", "He's on the phone. 他在电话上。", "Mr. Levine, Susan Stewart. Levine先生，我是Susan Stewart。", "I find myself in an embarrassing situation. 我现在有一件很为难的事。", "I made another lunch date for today 我和别人约好共进午餐", "and forgot to enter it in my appointment book. 但忘了写到工作日程。", "Can you and I meet for drinks tomorrow? 你和我能否在明天见面吗？", "I'd really appreciate it.... Yes.... Thank you.... 我非常感激……好的…谢谢你…", "Tomorrow at five o'clock at the Biltmore. 明天五点钟在Biltmore饭店。", "I'll see you then. 到时候见啦。", "Thank you, Mr. Levine. 谢谢你，Levine先生。", "Welcome to the South Street restaurant, folks. 欢迎光临南街餐馆，各位。", "What'll it be? 想来点什么？", "What do you recommend? 你推荐什么？", "Well, the crab salad's always a big hit. 嗯，蟹肉色拉一向是很受欢迎的。", "Susan, would you like the crab salad? Susan，要不要蟹肉色拉？", "I'd love the crab salad. 我要蟹肉色拉。", "Michelle, would you like to try the crab salad, too? Michelle，要不要也试试蟹肉色拉？", "OK, Daddy. 好的，爸爸。", "We'll have three crab salads 我们来三份蟹肉色拉。", "and a pitcher of lemonade. 和一壶柠檬汁。", "Help yourself to celery and carrots and other vegetables. 请你们自己盛芹菜，胡萝和其他蔬菜。", "We used to catch crabs. 我们以前常捉螃蟹。", "Where was that? 在什么地方？", "We had a summer house on Fire Island. 我们在火岛有一所避暑房屋。", "Do you remember, Michelle? 你还记得吗，Michelle？", "Sure. 当然记得。", "You and Mommy used to take me on the ferryboat. 你和妈妈常带我坐渡船。", "Sometimes, at night, 有时候，在夜里，", "we would go down to the beach and catch crabs, 我们走到海边抓螃蟹，", "remember? 记得吗？", "With a piece of meat on a string! 用一根绳子拴着一点肉。", "Right. 对。", "Well, I think I'm going to go get us all some vegetables. 好啦，我想我去给大家盛点蔬菜来。", "There you go. 东西来了。", "Thank you. 谢谢。", "And some ice-cold lemonade. 还有冰凉的柠檬汁。", "Thank you. 谢谢。", "Enjoy it. 请享用。", "Michelle, can I help you with the lemonade? Michelle，我帮你倒点柠檬汁，好吗？", "No, thank you. 不，谢谢你。", "I'll wait for my father. 我要等我爸爸。", "Michelle, can we have a talk? Michelle 我们能谈一谈吗？", "Sure. 当然。", "I know you miss your mother. 我知道你想念你妈妈。", "You do? 真的知道？", "Yes. And I'm not trying to take her place. 是的，我并不想取代她。", "Then why are you and Daddy 那为什么你和爸爸", "spending so much time together? 老是在一起呢？", "Because we like each other. 因为我们彼此喜欢。", "And right now, he needs a friend. 而且现在，他需要一个朋友。", "I'm his friend. 我是他的朋友。", "I know you are. 我知道你是。", "Sometimes he's very sad. 他有时很忧郁。", "And so are you, I think. 我想你也是如此。", "Sometimes. 有时候。", "I'd like to be your friend, too. 我也想成为你的朋友。", "Will you let me be your friend, Michelle? 愿意让我成为你的朋友吗，Michelle?", "So, what were you two talking about? 你们俩刚才谈什么了？", "Just girl talk, Daddy. 只是女孩子之间的谈话，爸爸。", "It's too hard to explain. 这很难解释清楚。", "You're probably right. 也许你们说得对。", "Well, let's get started. 好吧，我们开始吃吧。"]}, {"title": "Episode 10 Smell the Flowers ACT III", "mp3": "Episode 10 Smell the Flowers ACT III.mp3", "text": ["Watch the video then answer the question:", "Oh, it's a quarter to four,", "噢，差十五分就四点了。", "and I have a production meeting at four.", "我四点钟有个生产会议。", "I planned to take you for a ride in Central Park", "我原打算带你去中央公园", "in a horse and carriage.", "坐马车。", "Harry, I'd love to,", "Harry，我确实想去。", "but I have work to do.", "但我有工作要做。", "OK. We'll walk back to your office with you.", "好吧，我们陪你走回你的办公室去。", "It's so nice out.", "外面天气真好。", "I decided to forget about my accounting problems", "我已决定不再去想那些会计上的问题", "and just enjoy this beautiful spring day.", "尽情享受这美好的春天。", "Take the time, Susan.", "别那么忙，Susan。", "I know I should,", "我知道应该这样，", "but ... well, there are too many things to do.", "但是…我要做的事情太多了。", "I understand.", "我了解。", "I'll go for a ride with Michelle.", "我和Michelle一起去坐马车。", "Right.", "好的。", "Well, I had a really nice time.", "嗯，我玩得很开心。", "So did I.", "我也一样。", "So did I.", "我也一样。", "I'm sorry you can't come with us, Susan.", "很遗憾你不能同我们一起去，Susan。", "So am I.", "我也很遗憾。", "Bye-bye.", "再见。", "Harry! Michelle! Can you wait till I make a phone call?", "Harry！Michelle！你们等一下让我打个电话好吗？", "Sure.", "当然。", "Susan Stewart's office.", "Susan Stewart办公室。", "Sam, this is Susan.", "Sam，我是Susan。", "Hi. How was lunch?", "嗨，午餐怎么样？", "Fine.", "很好。", "You're late.", "你已经迟了。", "The production department's waiting in the conference room.", "生产部门的人正在会议室等你。", "I know.", "我知道。", "Ask Paul Smith to fill in for me.", "叫Paul Smith代替我出席。", "He knows everything about the production schedule,", "他知道生产进度的一切，", "and he can answer any questions.", "他也可以回答任何问题。", "Right.", "好的。", "Don't tell any one,", "别告诉别人，", "but I'm taking a little time to smell the flowers.", "我正利用一点时间轻松一下。", "Good for you.", "我真为你高兴。", "It'll be our secret.", "这只是你我之间的秘密。", "But schedule another production meeting for tomorrow.", "务必安排在明天举行另一次生产会议。", "I'll be back", "我会回来", "for my six o'clock appointment with Mr. Ozawa.", "参加六点钟与Ozawa先生的会议。", "OK, Susan.", "好的，Susan。", "And have a nice afternoon.", "祝你下午玩得愉快。", "Thanks.", "谢谢。", "She likes you.", "她喜欢你。", "I know. I like her.", "我知道。我喜欢她。", "How'd you do it?", "是如何办到的？", "We had a talk.", "我们谈了一下。", "About what?", "谈什么？", "Life.", "生活。", "And what did you decide?", "那你们有什么结论呢？", "That's a secret ... between us women.", "这是个秘密……我们女人间的秘密。"]}, {"title": "Episode 11 A Place of Our Own ACT I", "mp3": "Episode 11 A Place of Our Own ACT I.mp3", "text": ["Watch the video then answer the question:", "Ellen, I'd like your opinion.", "Ellen，我想听听你的意见。", "About what?", "关于什么？", "Well, Richard and I feel that with a baby coming", "嗯，Richard和我觉得孩子快要出生了", "we need to have our own place to live.", "我们应该有自己的房子。", "Oh.", "噢。", "Well, what do you think about Richard and me", "那么，你觉得我和Richard", "looking for a small house or an apartment", "找一个小住宅或公寓", "at this point in our lives?", "在这个时候怎么样？", "We love having you here,", "我们喜欢你们住这儿，", "and there is room,", "并且这儿有地方，", "and ... and when the baby comes,", "而且…而且婴儿出生以后，", "the baby can stay in your room for a while.", "可以住在你们房间一段时间。", "Richard feels we need to find a small house.", "Richard觉得我们应该要找一个小住宅。", "I remember when I was pregnant with Richard.", "我记得当我怀着Richard时。", "Philip and I were living with Grandma and Grandpa.", "Philip与我和爷爷奶奶住在一起。", "Philip was a young doctor,", "Philip当时是个年轻的大夫，", "and he kept talking about having a house of our own.", "他老说要有自己的家。", "It's natural.", "这是很自然的。", "What did you do?", "那你们怎么办呢？", "We looked at a lot of houses.", "我们看了好多房子。", "Did you find one?", "找到合适的吗？", "Oh, not at first.", "噢，没有马上找到。", "We couldn't afford it.", "我们当时钱不够。", "Grandpa wanted to lend us the money to buy one,", "爷爷要借给我们钱去买房，", "but Philip is too independent.", "但是Philip的独立性太强了。", "He didn't want to borrow any money.", "他不想借钱。", "Sounds like Richard.", "听起来跟Richard一样。", "They're all alike.", "他们都是一个样子。", "Richard is a real Stewart.", "Richard是个典型的Stewart家后代。", "He's independent,", "他的独立性强，", "and sometimes just stubborn.", "有时候甚至近乎顽固。", "When did you buy a house?", "那你们在什么时候买房子？", "After Richard was born.", "等生下Richard之后。", "I was teaching music,", "我当时教音乐，", "and Philip was opening his first medical office.", "而Philip则第一次开诊所。", "Where was the house?", "房子在什么地方？", "Right here in Riverdale.", "就在这Riverdale。", "Of course, it was a small house,", "当然，那是一栋小房子。", "but just right for us.", "但正好够我们住。", "It's funny. History repeats itself.", "真有意思。历史在重演。", "Now Richard and I are having a baby,", "现在 Richard和我有了孩子，", "and we probably won't be able to", "而我们也许也一样不能", "afford a house right away, either.", "马上负担得起一栋房子。", "Why don't you look at some houses, Marilyn?", "何不去看一看房子呢，Marily？", "Good idea.", "好主意。", "Look in the real-estate section of Sunday's Times.", "查一查星期天纽约时报的房地产版面。", "You'll learn a lot.", "会增长不少见识。", "Maybe we should", "也许我们应该", "speak to a real-estate agent about a house.", "和房地产中介商谈谈关于房子的事。", "And a bank about a mortgage.", "还要和银行谈谈。", "I'll talk to Richard about it.", "我会与Richard商量这些。", "I think it's a good idea, Ellen.", "我觉得这是个好主意，Ellen。", "We can learn a lot by asking.", "我们到处问问会学到不少东西。", "And if I can be of any help,", "如果我能有所帮忙的，", "let me know.", "告诉我。", "As a matter of fact,", "事实上，", "my friend Virginia Martinelli is a real-estate agent.", "我的朋友Virginia Martinelli就
