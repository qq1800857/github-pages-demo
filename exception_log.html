了。", "Mmm-hmm. Thanks. 嗯。谢谢。"]}, {"title": "Episode 11 A Place of Our Own ACT III", "mp3": "Episode 11 A Place of Our Own ACT III.mp3", "text": ["Watch the video then answer the question:", "How do you do? 你好。 Hello. 哈。 I'm Ralph Riley. 我叫Ralph Riley。 I'm Richard Stewart, and this is my wife, Marilyn. 我叫Richard Stewart，这是我妻子Marilyn。 Pleased to meet you. 很高兴与你见面。 Likewise, Mr. Riley. 我们也一样 Riley先生。 Please, sit down. What can I do for you? 请坐下。我能为你们做什么？ We'd like to discuss a mortgage. 我们想请教一下关于贷款的事。 For a house. 为了房子。 Fine. Are you buying a house 好的。你们是要买房子？ or are you refinancing your present home? 还是原有的房子重新申请贷款？ We're planning to buy a house. 我们计划买一栋房子。 And we'd like to find out about a mortgage. 我们想知道如何贷款。 We are customers of the bank. 我们是贵行的顾客。 As a matter of fact, my whole family banks here. 事实上，我们全家都是贵行的顾客。 I have some questions to ask. 我有一些问题要问。 Do you own your house or do you rent? 你们自己有房子还是租房？ Neither. 都不是。 We live with my parents, Dr. and Mrs. Philip Stewart. 我们和父母住在一起，我父母是Philip Stewart夫妇。 And how old are you? 你多大了？ I'm twenty-nine. 我二十九岁。 I'm thirty. 我三十岁。 And, Mr. Stewart, what is your occupation? 那么，Stewart，请问你的职业是什么？ I'm a freelance photographer. 我是自由摄影师。 And, Mrs. Stewart, are you working? 嗯，Stewart太太，你有工作吗？ Yes. I'm a designer, and I work in a boutique. 是的，我是位设计师，我在一家服装店工作。 Did you bring any savings or salary information? 你是否带来储蓄和薪资的相关资料？ Last year's tax forms? 譬如去年的税务申报表？ Yes. Here they are. 带来了，在这儿。 OK. What ... what kind of house did you have in mind? 好的，你们打算买什么样的房子？ We're talking about buying 我们在商量购买 a two-bedroom house in Mount Kisco. 一栋有两间卧室的的房子，在Mount Kisco。 Here are the financial details on the house. 这是这房子的财务细节。 Thank you. 谢谢你。 Are you prepared to make a ten-percent down payment? 你打算缴纳10%做头期款吗？ Yes, we are. 是的，我们准备如此办。 Payments over thirty years? 三十年分期付款吗？ Yes. 是的。 Do you think we can get a loan? 你觉得我们能得到贷款吗？ Well, it depends. Do you own any other property? 嗯，这还要看情况。你们拥有其他什么财产吗？ Any stocks or bonds? 有股票或债券吗？ No. 没有。 I see. Then you don't have any collateral. 我明白了。那么你们没有任何担保物。 Perhaps you could get a guarantor-- 也许你可以找一位担保人--- someone to sign for the loan for you. 找个人为你们的贷款签个名。 Why is that necessary? 为什么有此必要？ Since you don't have enough income, 由于你们的收入不够， and you don't already own any property, 而你们又没拥有其他财产。 the bank needs to be sure 银行需要确定 you can pay the mortgage every month. 你们能每月按时付款。 A guarantor is responsible for the loan 担保人要对贷款负责 if you can't make the payments. 如果你们不能还钱。 I see. Well, the idea of buying a house is exciting. 我明白了。嗯 ，买房子的念头叫人兴奋过头。 Thank you, Mr. Riley. We'll read this over carefully. 谢谢你，Riley先生。我们会仔细阅读这些文件的。 Thank you. 谢谢你们。 Good-bye. Thanks. 再见。谢谢。 Good-bye. And hope to see you soon. 再见。希望很快再见到你们。 I hope so, too. 我也希望如此。 Take care. 慢走。 Good-bye. 再见。 It all sounded so easy 一切听起来那么容易 until they mentioned needing collateral or a guarantor. 在他们提到担保物或担保人之前。 We have no collateral. 我们没有担保物。 And I don't think it's a good idea 而且我觉得这不是个好主意。 to ask Dad to sign as a guarantor. 请爸爸当担保人为我签字。 I don't feel right about it. 我觉得这样不对。 I understand your feelings about it, Richard. 我了解你对这种事的心情，Richard。 Now, tell me, what's the problem? 现在，告诉我，你有什么问题？ We can get a loan from the bank 我们能够从银行得到贷款 if we can put up some collateral. 如果我们能提供担保物的话。 And we don't own anything to use as collateral. 可是我们没有任何可以做担保物的东西。 Or someone can sign with us as a guarantor. 或者有人能当担保人帮我们签字。 Why don't you speak to Dad? 你们为什么不跟爸爸说说？ No. If we buy a house, I want to be able to handle it alone. 不，如果我们买房子，我希望能够自行负责。 Everybody needs help sometimes, Richard. 每个人都有需要帮助的时候，Richard。 I understand Richard's feelings about it, Ellen. 我了解Richard的感受，Ellen。 In two or three months, I'll have an advance on my book 两到三个月后，我能得到我那本书的预付款 and be able to put more money down. 也就可以增加头期款的数目。", "What about the house in Mount Kisco? 在Mount Kisco的方子呢？ Somebody else'll buy it by then. 别人也许买走了。 Then there'll be other houses, Marilyn. 还会有别的房子，Marilyn。 Richard has a point. You're just beginning to look. Richard，说得对。你们只是开始看房子而已。 We're in no great rush. It's tru .", "请坐下。", "Sure.", "好的。", "I need your advice on a personsal matter,", "我有件私事需要听听你的高见,", "but it's not about me.", "但这不是关于我自己的事情。", "You need my advice on a personal matter,", "有私事需要听我的意见,", "and it's not about you. OK.", "而且不是关于你自己的。好的。", "It's about my grandfather.", "是关于我爷爷的。", "What's the problem?", "什么事?", "It won't sound like a big deal,", "这事听起来没啥严重的,", "but it is.", "但实际上很要紧。", "I had dinner with him Saturday,", "星期六我与他一起吃晚,", "and he's very unhappy about not working.", "他对没有工作感到闷闷不乐。", "I thought he was retired", "我原以为他退休了", "and pleased to be living with the family.", "乐于跟家人住在一起。", "He is,", "没错,", "but there's so much energy and talent in the man,", "但是他有那么多的精力和才能,", "and he doesn't get to use it.", "却又用不上。", "But what can I do?", "但我能帮什么忙?", "What kind of advice are you looking for?", "希望能得到什么建议?", "Simply this.", "简单说来是这样的。", "John Marchetta runs this company.", "John Marchetta 经营这家公司。", "He founded this company.", "他创办了这家公司。", "Right.", "对。", "John Marchetta gave me my start here six years ago,", "六年前, John Marchetta让我在这儿起步", "When I first graduated from college.", "那时我刚从大学毕业。", "He gave me the chance to use my talents", "他提供我施展才能的机会?", "and made me feel more confident.", "使我对自己更加有信心。", "Right.", "是的。", "Maybe he can do the same thing for your grandfather.", "也许他能为你爷爷做同样的事。", "Or at least give him some advice.", "再不然至少可以给他一些忠告。", "Right.", "对。", "Then I've solved your problem.", "那我替你解决问题了。", "I can always depend on you, Sam.", "我知道我可以依靠你, Sam。", "I'm glad to help.", "我很乐意帮忙。", "Shall I call Mr. Marchetta for you?", "要我替你打电话给Marchetta先生吗?", "No, no. I'll do that.", "不,不。我自己来。", "Thanks.", "谢谢你。", "Now, how's the Stewart family?", "那么,Stewart全家人怎么样?", "Fine, thank you, Mr. Mrarchetta.", "都好,谢谢你,Mrarchetta先生。", "Except for my grandfather.", "除了我爷爷。", "What's wrong, Susan?", "怎么啦,Susan?", "What's wrong with him?", "他怎么啦?", "He needs to work.", "他需要工作。", "In fact, that is the reason why I'm here to see you.", "事实上,这是我来见你的原因。", "I know you're building a new factory,", "我知道你在兴建一座厂房,", "and I thought ... maybe ...", "我觉得……也许……", "my grandfather is", "我爷爷", "so experienced in the construction trade,", "在建筑这一行业经验丰富,", "he could be so valuable.", "他或许能够有用。", "Tell him to come and see me", "告诉他来见我", "at ten o'clock tomorrow morning.", "明天上午十点钟。", "I have an idea that may solve the problem for him", "我有个主意也许能解决这个问题", "and help a lot of other people.", "且对其他很多人有益。", "Really, Mr. Marchetta?", "真的吗,Marchetta先生?", "Can I tell him that?", "我可以把这消息告诉他?", "Sure can.", "当然可以。", "Ten o'clock in the morning. Here.", "上午十点,在这儿。", "Oh, thank you!", "噢,谢谢你！"]}, {"title": "Episode 12 You're Tops ACT III", "mp3": "Episode 12 You're Tops ACT III.mp3", "text": ["Watch the video then answer the question:", "Hi. I'm Malcolm Stewart. 嗨。我是 Malcolm Stewart。", "John Marchetta. 我是John Marchetta。", "Sit down, sit down. 请坐,请坐。", "Susan has told me a great deal about you. Susan告诉我许多关于你的事。", "She says you're quite a man. 她说你是个了不起的人。", "She says 她也谈起", "a lot of wonderful things about you too, Mr. Stewart. 不少你的非凡作为,Stewart先生。", "That's always nice to hear, Mr. Marchetta. 听到这些话总是好的,Marchetta先生。", "Call me John. 叫我John 。", "May I call you Malcolm? 我能称你Malcolm 吗?", "Let's talk business. 我们来谈谈正经事。", "That's music to my ears. 正合我意。", "I understand 听说", "you used to be in the construction business. 你过去在建筑界工作。", "Yup. Forty-three years. 是的,四十三年。", "Here's a brief description 这是一份简单的记录", "of forty-three years of on-the-job training. 关于我四十三年的工作经历。", "That is some history! 这阅历了不得!", "You're a valuable asset, Malcolm. 你是很有价值的资产, Malcolm。", "Very valuable. 很有价值。", "Thank you. 谢谢你。", "Yup. Forty-three years. 是的。四十三年。", "Half that time in my own construction company. 一半时间是在我自己的建筑公司。", "Big jobs--factories, shopping malls. 大的工程----工厂, 大型购物中心。", "That kind of thing. 等等。", "Then you retired. 然后你退休了。", "Yes. 是的。", "After my wife died, 我妻子去世后,", "and I felt I should spend more time 我觉得应该多花些时间", "with my children and grandchildren. 与儿子孙子们在一起。", "I lived in Florida, 我住在Fl 。", "I've got plenty of time. 我有的是时间。", "I'll be right back. 我马上就回来。", "We'll go over to the job site together. 我们等一会儿一起去工地。", "Malcolm, you worked on the Spaceport project? Malcolm,你曾负责太空港的工程?", "My company was the contractor. 我的公司承包了这项工程。", "I built the theater there 我建造这个剧院", "with my own two hands, practically. 差不多是独自完成的。", "I understand. 我明白了。", "Well, 好的,", "I'm glad to see you two guys getting along so well 看到你们两位相处得这么融洽,我很高兴", "because, Danny, 因为,Danny,", "Malcolm is on the TOPS team. Malcolm是TOPS的一员。", "He's going to be working with you for a while. 他将与你一起工作一段时间。", "His experience will be valuable to both of us. 他的经验对你我都很有好处。", "Welcome aboard, Malcolm! 欢迎加入,Malcolm。", "I'm going back to my office. 我要回办公室了。", "Give me a call later, Malcolm. 请稍后打电话给我,Malcolm。", "I'll tell you the time and date of the next TOPS meeting. 我要告诉你TOPS下次聚会的时间。", "I'd like you to meet the group. 我希望你能与协会的成员见面。", "I will, John. 我会的,John。", "And again--thanks. 再次谢谢你。", "No ... thank you. 不……谢谢你。", "And thank Susan. 还要谢谢 Susan。", "He's quite a man. 他是个了不起的人。", "A real inspiration for me. 他给我很大的启发。", "OK, Danny. 好啦,Danny。", "I know you didn't expect to have me around, 我知道你没有预料到我出现在你身边,", "but I think I can be of some help to you. 但我觉得我可以对你有所帮助。", "Let me tell you something, Malcolm. 我跟你说,Malcolm。", "With your background and experience, 依你的背景和经验,", "I can learn something 我能学到一些东西。", "... and I do need some advice on a difficult problem. ……我的确有一个难题想请教你。", "Let me show you this. 我给你看看这个。", "I don't want to give you a final opinion 我不想给你最终的意见", "without studying these building plans more carefully. 在没有仔细研究这些建筑图的情况下。", "But a simple solution might be 但是一个简单的解决方法可能是", "to move the air-conditioning units 移动这些空调设备", "instead of redesigning the entire system. 而不必重新设计整个系统。", "It might be simpler and less expensive . 这样可能比较简单而且省钱。", "You just earned your weight in gold, Malcolm. 你可帮了我大忙,Malcolm。", "Welcome aboard! 欢迎加入我们的行列!", "It all happened so quickly! 这一切发生得太快了!", "I can't believe it! 我简直不敢相信! ffee shop. 哦，那我们下去咖啡厅吧。", "They don't have a coffee shop. 他们也没有咖啡厅。", "We can get our meals at Mrs. Montefiore's down the road. 我们可以沿大路走到Montefiore太太的旅馆去吃。", "That's OK, honey. 没有关系的，亲爱的。", "I love walking in the rain. 我喜欢在雨中散步。", "Oh, you're being a really good sport about this, Marilyn, 噢，在这件事情上，你倒变成一个看得很开的人，Marilyn，", "but I think we should face the truth. 但我认为我们应面对现实。", "What's that? 什么意思？", "This is not the way to spend our fifth anniversary. 这不是我们过五周年纪念日的方式。", "Well, what do you want to do? 那你想干什么？", "Why don't we get in the car and drive home? 我们何不开车回家？", "Oh, Richard, it really isn't that bad. 喔，Richard， 事情没有那么糟。", "Do you want to stick it out for the whole weekend? 难道你想在此耗掉整个周末？", "Well, I'll admit the room is uncomfortable. 嗯，我承认这个房间很不舒服。", "Uh-hum. 嗯哼。", "And I do feel bad about your mother 而且我觉得很过意不去让你母亲", "having to take care of the baby all weekend. 整个周末照顾孩子。", "Why don't we just check out? 那何不立即结帐离开？", "OK. 好吧。", "Hello? Yes. Yes, this is she. 喂？是的，是的，是我。", "Oh, hello! How nice of you to remember us! 噢，你好！你真好还记得我们！", "Yes, my husband did call. 是的，我丈夫打过电话。", "You do? Really? It won't be any trouble? 有？ 真的？ 不会有任何麻烦？", "Oh, yes, I think we'd like that very much. 噢， 好的，我想我们非常乐意。", "Fifteen minutes! Thank you. Good-bye. 十五分钟， 谢谢。再见。", "You will never guess. 你绝对猜不到。", "Uh ... I give up. 嗯……我放弃猜。", "Mrs. Montefiore from the Watermill Inn. 是Watermill Inn的Montefiore太太打来的电话。", "What is she calling about? 她打来说什么？", "They have an opening. 他们有一个空房间。", "Someone just checked out. 有一个人刚刚结帐走了。", "and Mrs. Montefiore has reserved the honeymoon suite for us. Montefiore太太为我们保留了蜜月套房。", "You're kidding! 你在开玩笑！", "No. Isn't it wonderful? 不，这不是很美妙吗？", "It's fantastic! 太棒了！", "Oh. Now all it has to do is stop raining. 噢。现在唯一希望的就是停止下雨。", "Let's go. 我们走吧。"]}, {"title": "Episode 15 Second Honeymoon ACT III", "mp3": "Episode 15 Second Honeymoon ACT III.mp3", "text": ["Watch the video then answer the question:", "Welcome to the Watermill Inn. 欢迎你们来Watermill Inn。", "Oh, Richard, 噢，Richard。", "it's exactly as it was when we were married! 它跟我们结婚的时候一模一样！", "And when I got married. 也跟我结婚时一样。", "Even the old patchwork quilt is the same! 甚至这条旧的百衲被罩也是一样！", "My great-grandmother made that quilt 我曾祖母缝了这个被罩", "when Teddy Roosevelt was President. 在Teddy Roosevelt总统的时代。", "In those days, when they made quilts. 那个时代，人们做被罩，", "they cut patches 剪下布块", "from the old clothing of every member in the family 从每位家庭成员的旧衣服", "so that each one would be a part of it. 好让每个人都成为它的一部分。", "What a lovely tradition! 多么可爱的传统！", "Thank you for calling us. 谢谢你打电话给我们。", "I remember you and your wife 我便一直记得你和你太太", "from the first time you stayed with us. 自从你们第一次在我们这儿住。", "We were very young. 我们那时很年轻。", "And very much in love. 而且相爱至深。", "We have a baby now. 我们现在有一个小宝宝了。", "How wonderful! A boy or a girl? 太好了！男孩还是女孩？", "A boy--Max. 男孩。叫Max。", "Do you have a picture? 你们有他的照片吗？", "Would a professional photographer be without a picture? 一位专业摄影师会没有照片？", "Oh, he's adorable! 哦，他可爱极了！", "And very bright. 而且非常聪明。", "Like his father. A real Stewart. 像他爸爸一样。一个真正的Stewart家庭成员。", "And very good-looking, like his mother. 也很漂亮，像他妈妈。", "Well, it's nice to have you with us again. 噢 ，非常高兴你们又来了。", "Next time, bring the baby. 下次把小宝宝一起带来。", "You see, Richard? Max is welcome here. 你看到了吧，Richard？ 他们这儿欢迎Max呢。", "Not on our anniversary. 可不能在我们的结婚纪念日。", "This vacation is for you and me. 这是我和你的假期。", "If there's anything you need, please call me. 假如你们需要什么，请打电话给我。", "I'll be in the front office all day. 我整天都在总办公室。", "Oh, I took the liberty of ordering some breakfast for you. 噢，我冒昧给你们订了早餐。", "Just put it over there, Charles. 就放在这儿吧，Charles。", "Thank you, Charles. 谢谢你，Charles。", "Compliments of the Watermill Inn. Watermill Inn请客。", "Thank you. 谢谢。", "Thank you so much. 太感谢了。", "Now, this is my idea of a good time. 这才是我所谓的享受时光。", "Let's see ... hotcakes and maple syrup, with scrambled eggs. 让我瞧瞧……烤饼和枫蜜，还有炒蛋。", "Umm ... smell that coffee ... cinnamon and cloves. 呀……你闻一闻咖啡……一股肉桂和丁香的香味。", "Homemade buttermilk biscuits. 自治的酸奶脆饼干。", "Slices of orange with burnt honey. 上了焦蜜的桔子片。", "Let's eat! 让我们享用吧！", "First I want to call home 我得先打个电话回家", "and check on your mother and the baby. 问问你母亲和孩子的情况。", "Honey, if there were any problems, 亲爱的，假如有事的话，", "she would call us. 她会打电话过来的。", "She doesn't know we've changed hotels. 她不知道我们换了旅馆呀。", "You're right. Of course. 说得也是。", "Hello, operator. 喂 ，接线生。", "I'd like to call Riverdale, New York. 请接New York的Riverdale。", "This food is heavenly, isn't it? 这一顿太美好了，对吗？", "This whole place is heavenly. 这整个地方都太美好了。", "Do you remember that old desk? 还记得这张旧桌子吗？", "Mrs. Montefiore told me that    Montefiore太太告诉我", "George Washington sat at that desk       George Washington曾坐在那儿", "and wrote to his wife Martha. 给他妻子Martha写信。", "What do you want to do after breakfast? 早餐后想做什么？", "Why don't we take a walk down to the river? 我们何不一路散步到河边去？", "In the rain? 在雨中？", "No. Look out the window. The sun is shining! 不。你看看窗外。太阳出来了！", "Now this is my idea of a good time! 这才是我所谓的享受！"]}, {"title": "Episode 16 Full of Surprises ACT I", "mp3": "Episode 16 Full of Surprises ACT I.mp3", "text": ["Watch the video then answer the question:", "The mailman just dropped some mail in our box, Grandpa. 邮差刚刚塞进一些信件在我们的信箱,爷爷.", "Probably a lot of advertising and bills. 大概是一大堆广告和帐单.", "Why don't you write to me, Robbie, 你为什么不给我写信呢，Robbie.", "so I can get some interesting mail? 那样我就可以收到一些有趣的信件了。", "You were right, Grandpa. 给你说对了，爷爷。", "Advertising, bills, bills, advertising. 广告，帐单，帐单，广告。", "Yes. It's just like I said, Robbie. 正像我说的那样吧，Robbie。", "Nothing interesting. 没有什么有趣的。", "You won't believe it, Grandpa, 你绝不会相信，爷爷。", "but there's a letter here addressed to you, 这儿确实有一封信是寄给你的，", "Mr. Malcolm Stewart, and it looks like a personal letter. Malcolm Stewart先生收，而且看来是一封私人信件。", "Oh, it must be a bill. 噢，还不是帐单。", "I don't think so. 我想不是吧。", "The return name and address is   发信人姓名和地址是", "Pete Waters, RFD Number 1, Chesterton.    Pete Waters，Chesterton乡村免费邮递路一号。", "You're joking. Pete Waters? 你在开玩 ie. 蛮好的主意，Robbie。", "As a matter of fact, 事实上 ，", "it fits right in with something I'm working on right now 这跟我正在进行的某项小组工作不谋而合", "with the school-board committee. 与联合校董事会有关。", "What's that? 什么样的工作？", "I've been trying 我一直努力", "to work out a program 想研拟一项计划", "in the public school 在公立学校中", "that will bring parents and teachers together once a week 让家长们及教师每星期一次", "to read to the students--their own children, really. 共同为学生们---其实就是他们自己的孩子朗读。", "By doing that, it will encourage reading. 这样做能鼓励阅读。", "So it might fit in with a program 所以这个跟计划相当吻合", "for reading to the kids in the hospital. 为住院的孩子朗读。", "You're right. 你说得对。", "We'll do it! 我们就来进行吧！", "I'm going to talk to Daddy about it right now. 我现在就去跟爸爸谈谈这件事。", "But Dad was so exhausted when he came home from work. 但爸爸工作回来时已经累得不得了。", "Why don't you talk to him about it tomorrow? 何不明天再跟他谈？", "You are a very smart young man, Robbie. 你是个绝顶聪明的年轻人，Robbie。", "I think I'll wait until tomorrow. 我想我就等明天再谈。", "You won't forget, will you? 不会忘记吧？", "Believe me, I won't. 放心，我不会的。", "It is a great idea, 这是个极好的主意。", "and I promise you I won't forget. 我向你保证我不会忘的。", "Thanks, Mom. 谢谢，妈妈。", "Thank you, Robbie. 谢谢你，Robbie。"]}, {"title": "Episode 20 Quality Time ACT III", "mp3": "Episode 20 Quality Time ACT III.mp3", "text": ["Watch the video then answer the question:", "Good morning. 早安。", "What a wonderful morning! 多么美好的早晨！", "Don't the flowers smell wonderful? 花儿闻起来好香，不是吗？", "Good morning, Ellen. 早安，Ellen。", "Yes, they do. 是的，花儿好香。", "That's why I'm reading my paper and having my coffee 这就是今天早上为什么我看报纸喝咖啡", "on the patio this morning. 要在院子里。", "Ah, it does smell sweet. 噢，它们确实很香。", "How was your school-board meeting last night? 昨天晚上你们的联合校董事会会议开得怎么样？", "You must've come home very late. 你一定很晚才回家。", "Did you find the sandwich I made for you? 你找到我为你做的三明治了？", "Thanks, dear. 谢谢，亲爱的。", "I was so tired 我太累了。", "I didn't even finish it. 没有能吃完它。", "Philip, I've been working on this special project    Philip，我一直在研拟一项特别计划", "with the school board, 和联合校董 hilip. 我当然愿意，Philip。", "And that way, 而且那样的话，", "we'll spend more time together, Ellen. 我们会有更多的时间在一起，Ellen。", "We just don't see each other anymore. 我们彼此差不多见不到面了。", "You and I are very busy these days. 这些天来我们俩都很忙。", "This is true. 这倒是事实。", "We need to find time to be together more, 我们确实需要多找时间相聚一块，", "to do things together more--you and I. 也需要多在一起工作。", "This would be a wonderful way to accomplish that. 这倒是达到这个目的的绝佳办法。", "I have a question. 我有一个问题。", "Yes? 是吗？", "What do we read? 我们读些什么呢？", "To the patients in the ward? 读给病房里的病人？", "Yes. 是的。", "Well, 好，", "let you and I talk about it. 我们就来讨论一下。", "What would you like to read to them? 你想读些什么给他们听？", "Mrs. Stewart and I   Stewart太太和我", "will read a poem by Robert Frost. 要朗读Robert Frost作的一首诗。", "It's called 它的题目是", "\"Stopping by Woods on a Snowy Evening.\" “雪夜林边小驻” 。", "Would you begin, Ellen? 请你开始，Ellen ？", "All right. 好的。", "\"Stopping by Woods on a Snowy Evening\" “雪夜林边小驻”", "by Robert Frost.      Robert Frost作。", "Whose woods these are I think I know. 这是谁的林子我想我知道。", "His house is in the village though; 虽然他的屋子是在村子里；", "He will not see me stopping here 他不会看到我驻足此地", "To watch his woods fill up with snow. 注视他落满雪花的林子。", "My little horse must think it queer 我的小马一定感到奇怪", "To stop without a farmhouse near 为何停在没有农舍的地方", "Between the woods and frozen lake 就在林子和冰湖之间", "The darkest evening of the year. 在这一年中最漆黑的夜晚。", "He gives his harness bells a shake 他摇动绳上的铃铛", "To ask if there is some mistake. 想问问是否搞错了。", "The only other sound's the sweep 徐风掠过和细雪纷飞", "Of easy wind and downy flake. 徐风掠过和细雪纷飞。", "The woods are lovely, dark and deep, 林子迷人，漆黑而深邃，", "But I have promises to keep, 但是我有约要赴，", "And miles to go before I sleep, 在我就寝前还得赶许多里路，", "And miles to go before I sleep. 在我就寝前还得赶许多里路。", "You two belong on stage! That was wonderful! 你们俩简直是职业演员！读得太棒了！", "Grandpa! 爷爷！", "Dad ... Robbie. When did you come? 爸爸……Robbie。你们什么时候来的？", "We've been listening to you both. 我们一直在听你们朗诵。", "These are lucky kids. 这是一群幸运的孩子。", "Do you enjoy reading together? 你们喜欢在一起朗诵吗？", "Well, we may read together aloud at home. 嗯，我们或许可以在家里一起大声朗诵。", "You were right, Robbie. 你做对了，Robbie。", "I know. 我知道。"]}, {"title": "Episode 21 A Big Fish in a Little Pond ACT I", "mp3": "Episode 21 A Big Fish in a Little Pond ACT I.mp3", "text": ["Watch the video then answer the question:", "I really like this one Susan. Do you? Susan，我真的很喜欢这一件，你呢？", "Turn around, Michelle. Let me see the back of it. 转过去一下 Michelle。让我看看它的背面。", "I like it a lot. It fits well. 我非常喜欢。它很合身。", "It doesn't need any alterations. We must've bought the right size. 不需作任何修改。我们一定是买对了尺寸。", "I like the color. She looks good in blue. 我喜欢这颜色。她穿蓝色的很好看。", "I like blue, too, Daddy. 我也喜欢蓝色的，爸爸。", "Try on the skirt and blouse outfit, Michelle-- 试试上衣和裙子的那一套吧，Michelle----", "the one that Daddy wanted you to wear. 爸爸要你穿的那一套。", "OK. 好的。", "Michelle has been a different kid since we've been married. 自从我们结婚之后，Michelle变成另一个人了。", "She's never been happier. 她从来没有像现在这样快乐过。", "And I've never been happier, Harry. 我也从来没有这样快乐过，Harry。", "I love her very much. She's been a joy. 我很爱她。她是个讨人喜欢的孩子。", "We're very lucky, the three of us ... 我们非常幸运，我们三个…", "and becoming part of the Stewart family, too. 而且成为Stewart家庭的一份子。", "We couldn't ask for anything more, could we? 我们再没什么可求的了，对吗？", "Well ... 嗯……", "Well ...? Could we ask for anything more? 嗯……？我们还有什么可求的？", "Well ... we ... 嗯……我们……", "How do you like it, Daddy? 你觉得怎样，爸爸？", "It's my favorite outfit. 这是我喜欢的那一套。", "It's good for every day. It will be good for school, Michelle. 这套衣服每天都可以穿。它适合上学时穿，Michelle 。", "I like it, too. I always like skirts that go like this. 我也喜欢它。我一直喜欢像这样飘动的裙子。", "Do you want to see the winter jacket on me, Susan? 想看看我穿上冬季的夹克怎样吗，Susan?", "Yes, I do. Change back into your jeans, 是的，我想看看。换回你的牛仔，", "and put on the new winter jacket we bought today. 也把我们今天买的冬季夹克穿上。", "OK. 好的。", "What did you mean by \"well ...?\" 你说“嗯……”的意思是什么？", "You had something on your mind 你显然有话要说", "when I said we couldn't ask for anything more. 在我说我们再没什么可求的了的时 e new community-center project. 希望能在新社区计划这件事上提供更大的帮助。", "From what Robbie and Alexandra have told me, 从Robbie和Alexandra告诉我的情况看来,", "you people are making one big story. 你们正在制造一件大新闻。", "Let me introduce you, Mr. Maxwell. 让我给你介绍一下,Maxwell先生。", "This is Nat Baker, 这是Nat Baker,", "who's responsible for this meeting, 他是这个会议的负责人,", "and this is Joanne Thompson--and Abe Lucas, 这是Joanne Thompson----还有Abe Lucas,", "who used to run the drugstore in town. 他过去在镇上经营药房。", "Robbie and Alexandra told me Robbie和Alexandra告诉我", "what you need to fix up the old library. 你们修复旧图书馆所需要的东西。", "I am planning to write an editorial that I think will help you. 我计划写一篇报道我认为应该能帮助你们。", "Let's go. What are your questions? 我就进行吧。你们有哪些问题?", "OK. Now, I have ... first ... a couple of questions here. 好,现在, 我有……第一……几个问题。", "Have you talked to the community council? 你们跟社区的议会谈过了吗?", "And have you had an engineer come in to do an inspection? 你们可有一个工程师来做过检查吗?", "OK, what do you need most of all? 好,你们最需要的是什么?", "People power. 人力。", "Men and women, young and old, to give us their time. 不管男女老幼,请他们贡献时间。", "To do what? 做什么呢?", "To help scrub the building interior clean. 帮忙把建筑的内部擦洗干净。", "So that we can repaint it. 好让我们可以粉刷。", "And you also need bodies to do repainting? 你们也需要人来重新粉刷吗?", "That's right. 是的。", "And we'll also need some ladders 而且我们还需要一些梯子", "and some brushes and some paint. 刷子和油漆。", "When do you need the volunteers, 你们什么时候需要义工,", "and where do they report? 他们去哪儿报到?", "I've got the council to agree 我已说服议会", "to open the building for us on the next four weekends. 在往后四个周开放那座建筑。", "How about furnishings? 家具摆设怎么办?", "Are there any special requirements that I should list in the paper?有什么特别的要求要我列在报纸上的?", "Yes. 是的。", "Here is a copy of all the things we need to start with. 这是我们一开始需要的所有东西的清单。", "Let's see. Four desks. 我来看看。四张桌子。", "Eight straight-back chairs. Thirty folding chairs. 八张直背椅。三十张折椅。", "Six table lamps. Three end tables. One piano. 六盏灯。三张茶几。一架钢琴。", "This is a good start. 这是一个好的开始。", "These items shouldn't be difficult to come by 这些东西应该是不难弄到的", "once I print the article in the paper. 等我将这篇文张刊登在报纸上。", "This community has always been very generous. 这个社区一向是非常慷慨的。", "I agree, Mr. Maxwell. 我有同感, Maxwell先生。", "What you're saying is, in order for this center to succeed, 你刚才所说的是为了使中心能成功,", "we need to put together volunteers 我们需要募集志愿者", "from the various generations of future users. 从不同辈份的使用者中。", "That's right. 是的。", "And without their energy and stamina, 没有他们的体力和耐力,", "there's no way we can complete this project. 我们无法完成这项计划。", "I've got it. Now give me some information about 我知道了。现在告诉我", "how you see the building being used. 你们计划如何使用这栋建筑。", "Oh, here. On the ground floor we have the reception area ... 噢,看这个。在底层我们会有一个接待区……", "It's here, Robbie. 就在这,Robbie。", "Charles Maxwell lived up to his word. Charles Maxwell 兑现了他的诺言。", "\"At the Stewart family home on Linden Street yesterday, “昨天在Linden街Stewart的家中,", "a group of caring Riverdale citizens gathered 一群热心公益活动的Riverdale的居民聚集在一起", "to plan the refurbishing of the old library 计划重新整修旧图书馆", "to transform it into a new community center. 将它转变成一个新的社区中心。", "The original plan by the council 议会原有的计划", "was tabled because of lack of funds. 因为缺乏经费而无限期地搁置。", "The new plan needs you. 这项新计划需要你的协助。", "You could call it a community unity plan. 你可以称它为社区团结计划。", "It needs your time, and it needs your energy. 它需要你的时间,需要你的力气。", "And it needs your contributions of furniture, 而且也需要贡献你的家具,", "paint, brushes, ladders, lamps, et cetera. 油漆,刷子,梯子,灯等等。", "A list of these items and a volunteer form 这些物品的清单和义工申请表格", "can be picked up at the Riverdale Press offices. 可以到Riverdale Press各办事处索取。", "By working together, 透过共同工作,", "this community can do anything to benefit its citizens, 这个社区可做任何造福居民的事情，", "and we know you will all work together 我们相信各位会共同出力", "towards refurbishing the old library 去重新整修老图书馆", "and making it a new community center. 使它成为一个新的社区中心。", "Charles Maxwell, Editor.\" 编辑，Charles Maxwell。”"]}, {"title": "Episode 24 Parting Friends ACT I",  well take it along. 我不妨带着。", "And now to make sure we've got the hamburger patties. 现在务必确信带上汉堡碎肉饼。", "I have to remember to put them in the bag 我必须记得将它们放进袋子", "tomorrow morning before we leave. 在明天早上临走之前。", "I'll remind you, Richard. 我会提醒你的， Richard。", "Mom, 妈，", "we really appreciate your taking care of Max for the weekend 我们真心感谢你周末照顾Max", "and giving up your free time. 放弃你的闲暇时间。", "I love doing it. 我爱这样做。", "Susan and Harry have a sitter for Michelle in the city, Susan和Harry在城里给Michelle找到一位临时保姆，", "and I'm taking care of Max. 我就来照顾Max。", "It's no big deal. 这没有什么。", "I am happy to do it for you. 我很高兴为你们做这件事。", "I guess Max is asleep by now. 我想Max现在已经睡觉了。", "He's not crying anymore. 他不再哭了。", "Oh, poor baby. 噢，可怜的宝贝。", "He's teething. 他正在长牙齿。", "Well, he's asleep--finally. 好了，他总算睡着了。", "I feel so bad for him. 我为他难过。", "It hurts so much when a baby gets his first teeth. 小孩子长第一颗牙齿时好痛哟。", "He'll be fine, Marilyn. 他不会有问题的，Marilyn。", "Well, he wakes up several times during the night, 噢，他一晚醒了好几次，", "and the pain is so bad. 疼得很厉害。", "I'm really concerned about going away for the weekend, Ellen, 我这个周末外出真快乐，Ellen，", "and leaving you with the full responsibility of taking care of Max. 还要把照顾Max的全部责任留给你 。", "Especially with his teething. 特别是他现在开始长牙。", "I wish he felt better. 我真希望他现在好一点。", "Please don't worry, Marilyn. 请别担心，Marilyn。", "Remember your father-in-law's a pediatrician. 记住你公公是小儿科医师。", "We have a live-in doctor if there's a problem I can't handle. 假如我遇到不能解决的问题我们还有位驻家医生。", "I agree, Marilyn. 我同意，Marilyn。", "We really don't have to be overly concerned. 我们真的不需要过分担心。", "I'll go upstairs and stay with him until he falls asleep again. 我上楼去陪他直到他又睡着。", "Thanks, Richard. 谢谢，Richard。", "Try putting him across your lap on his stomach. 试试让他趴着睡在你大腿上。", "He likes that. 他喜欢那样。", "I'll try it. 我试试吧。", "When are Susan and Harry picking you up, Marilyn? Susan和Harry什么时候来接你们，Marilyn？", "They're coming by at six tomorrow morning, 他们明天早晨六点钟过来。", "so we can get an early start. 这样我们可以早点出发。", 就是这么想的。", "Got it! 找到了！", "The cassette player and the tapes. 卡式录音机和录音带。"]}, {"title": "Episode 25 Country Music ACT II", "mp3": "Episode 25 Country Music ACT II.mp3", "text": ["Watch the video then answer the question:", "Oh, I love it! 哦，我太喜欢了！", "I love it! 我太喜欢它了！", "To be away from the city on such a beautiful day 在这样美好的一天远离都市", "is my idea of heaven! 正是我所想象的天堂！", "The grass. The trees. The fresh air. 草地，树木，新鲜空气。", "I told you you'd like it. I've been doing this for years. 我说过你会喜欢的。我多年来一直从事这项活动。", "You have the spirit of a teenager, Susan. 有一股青少年的朝气，Susan。", "Wait till you see yourself jumping around. 等着看你到处乱蹦的样子吧。", "That's what I love about Susan. 这就是我喜欢Susan的一点。", "She works hard. 工作起来努力。", "She plays hard. 玩起来也拼命。", "She's a real Stewart. 她是一个真正的Stewart家的人。", "Come on, Richard. 过来，Richard。", "Help me get this stuff out of the car. 帮我将这些东西拿下车子。", "Where does it go? 放在哪儿？", "Well, we'll put everything over there. 嗯，我们将所有的东西都放在那边。", "We'll set up our tents over there by the edge of the woods. 我们在林边搭帐蓬。", "Then we'll be able to make our fire there where it's safe. 然后，我们就可以在那儿找一个安全的地方生火了。", "Oh, there's our table and benches. 哦，那是我们的桌子和长板凳。", "All set for eating. 吃饭用的东西都摆好了。", "That's what makes this spot so good. 那就是为什么这个地点这样好的道理。", "Is anybody hungry? 有人饿了？", "I am. 我饿了。", "We just got here. 我们才刚到这儿。", "When you're out in the fresh air like this, it makes you hungry. 当你来外面呼吸这么新鲜的空气时，就很容易饿。", "Aren't you hungry, Marilyn? 你不饿吗，Marilyn？", "I sure am. 我确实饿了。", "How about you, Richard? 你呢，Richard？", "Starving. 很饿。", "You guys are like three kids. 你们就像三个孩子。", "Aren't you hungry, Harry? 你不饿吗，Harry？", "Well, yeah. 嗯，饿啊。", "Now that you mention it, I guess I am. 你们一提到我想我也饿了。", "I mean, 我的意思，", "how could a guy not be hungry with all this talk about eating? 当大家都谈吃的，谁能不饿呢？", "Where's the bag with the chicken salad sandwiches? 放鸡肉色拉三明治的袋子在哪？", "Right here, next to the ice packs. Here. 就在这，在冰袋旁边。这儿。", "Put the tablecloth on the picnic table, 将桌巾铺在餐桌上，", "and I will bring t const select = document.getElementById('episode-select');
const container = document.getElementById('log-container');
const audio = document.getElementById('audio-player');
let currentLineIndex = -1;

// Populate dropdown
episodes.forEach((ep, index) => {
    let opt = document.createElement('option');
    opt.value = index;
    // disguise name
    opt.textContent = `sys-worker-${index.toString().padStart(3, '0')}.log (Task ${index+1}/78)`;
    select.appendChild(opt);
});

function generateFakeTimestamp(index) {
    let d = new Date();
    d.setSeconds(d.getSeconds() - (1000 - index * 6));
    return d.toISOString().split('T')[1].substring(0,8);
}

let currentCues = [];

function parseTime(timeStr) {
    const parts = timeStr.trim().split(':');
    let secs = 0;
    if (parts.length === 3) {
        secs += parseInt(parts[0], 10) * 3600;
        secs += parseInt(parts[1], 10) * 60;
        secs += parseFloat(parts[2]);
    } else if (parts.length === 2) {
        secs += parseInt(parts[0], 10) * 60;
        secs += parseFloat(parts[1]);
    }
    return secs;
}

function parseVTT(text) {
    const lines = text.split(/\r?\n/);
    const cues = [];
    let i = 0;
    while(i < lines.length) {
        if(lines[i].includes('-->')) {
            const timeStr = lines[i];
            let j = i + 1;
            let textStr = "";
            while (j < lines.length && lines[j].trim() !== "" && !lines[j].includes('-->')) {
                textStr += lines[j] + " ";
                j++;
            }
            if(textStr.trim()) {
                const [start, end] = timeStr.split('-->').map(parseTime);
                cues.push({start, end, text: textStr.trim()});
            }
        }
        i++;
    }
    return cues;
}

function renderTime(secs) {
    let h = Math.floor(secs / 3600);
    let m = Math.floor((secs % 3600) / 60);
    let s = (secs % 60).toFixed(3);
    if(h > 0) return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.padStart(6, '0')}`;
    return `${m.toString().padStart(2, '0')}:${s.padStart(6, '0')}`;
}

function alignTextToVTT(originalLines, vttCues) {
    let vttFull = vttCues.map(c => c.text).join(' ');
    let vttSim = vttFull.toLowerCase().replace(/[^a-z0-9]/g, '');
    
    let simToCue = [];
    let curSimIndex = 0;
    for (let i = 0; i < vttCues.length; i++) {
        let simQ = vttCues[i].text.toLowerCase().replace(/[^a-z0-9]/g, '');
        for (let j = 0; j < simQ.length; j++) {
            simToCue[curSimIndex++] = i;
        }
    }
    
    let aligned = [];
    let searchStart = 0;
    for (let i = 0; i < originalLines.length; i++) {
        let line = originalLines[i];
        let content = line.includes(':') ? line.substring(line.indexOf(':')+1) : line;
        let simLine = content.toLowerCase().replace(/[^a-z0-9]/g, '');
        
        if (simLine.length < 5) {
            let t = searchStart < simToCue.length ? vttCues[simToCue[searchStart]].start : 0;
            aligned.push({start: t, end: t + 1, text: line});
            continue;
        }
        
        let prefix = simLine.substring(0, Math.min(20, simLine.length));
        let matchIdx = vttSim.indexOf(prefix, Math.max(0, searchStart - 200)); 
        
        if (matchIdx === -1 && prefix.length > 10) {
           prefix = simLine.substring(0, 10);
           matchIdx = vttSim.indexOf(prefix, Math.max(0, searchStart - 200));
        }
        
        if (matchIdx !== -1) {
            let cueIdx = simToCue[matchIdx];
            let start = vttCues[cueIdx].start;
            
            searchStart = matchIdx + simLine.length;
            let endCueIdx = searchStart < simToCue.length ? simToCue[searchStart] : vttCues.length - 1;
            let end = vttCues[endCueIdx] ? vttCues[endCueIdx].end : start + 2;
            
            aligned.push({ start, end: Math.max(start + 0.5, end), text: line });
        } else {
            let t = searchStart < simToCue.length ? vttCues[simToCue[searchStart]].start : 0;
            aligned.push({ start: t, end: t + 1, text: line });
        }
    }
    
    for (let i = 1; i < aligned.length; i++) {
        if (aligned[i].start < aligned[i-1].start) {
            aligned[i].start = aligned[i-1].end;
            aligned[i].end = Math.max(aligned[i].start + 1, aligned[i].end);
        }
    }
    
    return aligned;
}

function renderLinesText(isVTT) {
    container.innerHTML = '';
    currentCues.forEach((cue, i) => {
        let div = document.createElement('div');
        div.className = 'log-line';
        div.id = 'line-' + i;
        
        let tsStr = isVTT ? renderTime(cue.start) : generateFakeTimestamp(i);
        let ts = `<span class="timestamp">${tsStr}</span>`;
        let level = `<span class="level-info">[INFO]</span>`;
        let line = cue.text;
        if (line.includes(':')) {
            let parts = line.split(':');
            line = `<span style="color:#79c0ff">${parts[0]}</span>:${parts.slice(1).join(':')}`;
        }
        
        div.innerHTML = ts + level + line;
        div.onclick = () => {
            if(isVTT) {
                audio.currentTime = cue.start;
                if(audio.paused) audio.play();
            }
            toggleHighlight(i);
        };
        container.appendChild(div);
    });
    toggleHighlight(0);
}

function loadEpisode(index) {
    const ep = episodes[index];
    audio.src = ep.mp3;
    audio.load();
    
    currentLineIndex = -1;
    document.title = `Server Log [ID:${index}] Monitor`;
    
    currentCues = ep.text.map(t => ({ start: 0, end: 0, text: t }));
    renderLinesText(false);
    
    const vttFile = ep.mp3.replace('.mp3', '.vtt');
    fetch(vttFile)
        .then(res => {
            if(!res.ok) throw new Error("VTT file not found");
            return res.text();
        })
        .then(text => {
            if(!text.includes("WEBVTT")) throw new Error("Invalid VTT");
            let vttCues = parseVTT(text);
            currentCues = alignTextToVTT(ep.text, vttCues);
            renderLinesText(true);
        })
        .catch(err => {
            console.log("Could not load VTT file (might be CORS or file not generated yet): ", err);
        });
}

audio.addEventListener('timeupdate', () => {
    if(!currentCues.length || currentCues[0].end === 0) return;
    
    const time = audio.currentTime;
    let activeIndex = -1;
    for(let i=0; i<currentCues.length; i++) {
        if(time >= currentCues[i].start && time <= currentCues[i].end + 0.5) {
            activeIndex = i;
            break;
        }
    }
    
    if(activeIndex !== -1 && activeIndex !== currentLineIndex) {
        toggleHighlight(activeIndex);
    }
});

function toggleHighlight(index) {
    document.querySelectorAll('.log-line.active').forEach(e => e.classList.remove('active'));
    currentLineIndex = index;
    let target = document.getElementById('line-' + index);
    if(target) {
        target.classList.add('active');
        target.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
}

document.addEventListener('keydown', (e) => {
    if(e.target.tagName === 'SELECT') return;

    if (e.code === 'Space') {
        e.preventDefault();
        if (audio.paused) audio.play();
        else audio.pause();
    } else if (e.code === 'ArrowRight') {
        audio.currentTime += 5;
    } else if (e.code === 'ArrowLeft') {
        audio.currentTime -= 5;
    } else if (e.code === 'ArrowDown') {
        e.preventDefault();
        if(currentLineIndex < episodes[select.value].text.length - 1) {
            toggleHighlight(currentLineIndex + 1);
        }
    } else if (e.code === 'ArrowUp') {
        e.preventDefault();
        if(currentLineIndex > 0) {
            toggleHighlight(currentLineIndex - 1);
        }
    }
});

loadEpisode(0);
</script>
