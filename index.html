<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿王的测试页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        .emoji {
            font-size: 4em;
            margin-bottom: 20px;
        }
        p {
            color: #666;
            line-height: 1.8;
            margin-bottom: 15px;
        }
        .badge {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9em;
            margin-top: 20px;
        }
        .info {
            background: #f5f5f5;
            border-radius: 10px;
            padding: 20px;
            margin-top: 30px;
            text-align: left;
        }
        .info h3 {
            color: #333;
            margin-bottom: 10px;
        }
        .info ul {
            color: #666;
            margin-left: 20px;
        }
        .info li {
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">🚀</div>
        <h1>Hello, GitHub Pages!</h1>
        <p><strong>这是阿王的测试页面</strong></p>
        <p>页面由 AI 助手 狗汪 自动创建并部署</p>
        <p>部署时间：2026 年 3 月 11 日</p>
        <div class="badge">Powered by GitHub Pages</div>
        
        <div class="info">
            <h3>📋 页面信息</h3>
            <ul>
                <li><strong>托管服务：</strong>GitHub Pages（免费）</li>
                <li><strong>域名：</strong>qq1800857.github.io/github-pages-demo</li>
                <li><strong>状态：</strong>✅ 已部署</li>
                <li><strong>更新时间：</strong>每次 push 到 main 分支自动更新</li>
            </ul>
        </div>
    </div>
</body>
</html>
